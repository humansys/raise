services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: rai
      POSTGRES_USER: rai
      POSTGRES_PASSWORD: rai_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rai"]
      interval: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: packages/raise-server/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      RAI_DATABASE_URL: postgresql+asyncpg://rai:rai_dev@postgres:5432/rai

  rai-agent:
    build:
      context: .
      dockerfile: packages/rai-agent/Dockerfile
    ports:
      - "8001:8000"
    env_file:
      - .env
    volumes:
      - rai-agent-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      retries: 3
      start_period: 15s

volumes:
  pgdata:
  rai-agent-data:
