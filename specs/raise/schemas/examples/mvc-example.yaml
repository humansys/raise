# Example: Minimum Viable Context (MVC) Output
# Validates against: mvc-schema.json
# This is the output format of `raise ctx get`

query:
  task: "implement user authentication service"
  scope: "src/services/"
  min_confidence: 0.80

primary_rules:
  - id: ts-service-suffix
    title: "Services must end with 'Service' suffix"
    intent: "Ensures consistent naming for service classes"
    confidence: 0.95
    enforcement: hard
    pattern:
      type: regex
      query: "Service$"
      scope: "src/services/**/*.ts"
    examples:
      positive:
        - code: "export class AuthenticationService { }"
      negative:
        - code: "export class Auth { }"

  - id: ts-async-error-handling
    title: "Use try-catch with typed errors in async functions"
    intent: "Ensures consistent error handling across async operations"
    confidence: 0.85
    enforcement: strong
    pattern:
      type: ast-grep
      query: "async $NAME($$$) { try { $$$ } catch ($ERR) { $$$ } }"
      scope: "src/services/**/*.ts"
    examples:
      positive:
        - code: |
            async validate(token: string): Promise<Result<User, AuthError>> {
              try {
                const decoded = await this.jwt.verify(token);
                return ok(decoded);
              } catch (error) {
                return err(new AuthError('Invalid token'));
              }
            }
      negative:
        - code: |
            async validate(token: string): Promise<User> {
              const decoded = await this.jwt.verify(token);
              return decoded;
            }

context_rules:
  - id: ts-repository-pattern
    title: "Data access must use Repository pattern"
    relevance: "Authentication service will need user data access via repository"

  - id: ts-jwt-pattern
    title: "JWT tokens must be validated with expiry check"
    relevance: "Related to authentication implementation"

warnings:
  - type: low_confidence
    rule_id: ts-jwt-pattern
    message: "Rule ts-jwt-pattern has 65% adoption, consider but don't enforce strictly"

graph_context:
  nodes:
    - ts-service-suffix
    - ts-async-error-handling
    - ts-repository-pattern
    - ts-jwt-pattern
  edges:
    - from: ts-service-suffix
      to: ts-repository-pattern
      type: related_to
    - from: ts-async-error-handling
      to: ts-jwt-pattern
      type: related_to

metadata:
  total_rules_matched: 12
  token_estimate: 1850
  retrieval_time_ms: 45
