---
id: run-gate
name: "Run Validation Gate"
type: skill
version: 1.0.0

description: |
  Ejecuta un gate de validación contra un artefacto.
  Evalúa criterios obligatorios y recomendados, retorna PASS/FAIL.

# Contrato de entrada
input:
  gate:
    type: string
    required: true
    description: "ID o path del gate a ejecutar (ej: gate-discovery, gates/gate-vision.md)"
  artifact:
    type: string
    required: true
    description: "Path al artefacto a validar"

# Contrato de salida
output:
  type: object
  properties:
    status:
      type: string
      enum: [PASS, PASS_WITH_WARNINGS, FAIL]
    gate_id:
      type: string
    artifact_path:
      type: string
    criteria:
      type: object
      properties:
        mandatory:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              description: { type: string }
              status: { type: string, enum: [PASS, FAIL] }
              evidence: { type: string }
        recommended:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              description: { type: string }
              status: { type: string, enum: [PASS, FAIL] }
              evidence: { type: string }
    issues:
      type: array
      items:
        type: object
        properties:
          criterion_id: { type: string }
          issue: { type: string }
          fix_suggestion: { type: string }

# Comportamiento
behavior:
  deterministic: true
  blocking: true
  description: "FAIL en mandatory bloquea avance"

# Gates disponibles
available_gates:
  - id: gate-discovery
    path: gates/gate-discovery.md
    validates: specs/main/project_requirements.md
  - id: gate-vision
    path: gates/gate-vision.md
    validates: specs/main/solution_vision.md
  - id: gate-architecture
    path: gates/gate-architecture.md
    validates: specs/main/tech_design.md
  - id: gate-design
    path: gates/gate-design.md
    validates: specs/main/tech_design.md
  - id: gate-backlog
    path: gates/gate-backlog.md
    validates: specs/main/project_backlog.md
  - id: gate-estimation
    path: gates/gate-estimation.md
    validates: specs/main/estimation_roadmap.md

# Implementación
implementation:
  type: inline
  steps:
    - "Cargar gate desde path"
    - "Cargar artefacto a validar"
    - "Para cada criterio mandatory, evaluar y registrar"
    - "Para cada criterio recommended, evaluar y registrar"
    - "Determinar status final"
    - "Generar sugerencias de fix para criterios fallidos"
    - "Retornar reporte"

# Jidoka
jidoka:
  on_gate_not_found: "FAIL con error claro"
  on_artifact_not_found: "FAIL con sugerencia de kata a ejecutar"
  on_mandatory_fail: "FAIL inmediato, no continuar"
---
