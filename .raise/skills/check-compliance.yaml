---
id: check-compliance
name: "Check Code Compliance"
type: skill
version: 1.0.0

description: |
  Verifica código contra las reglas aplicables del proyecto.
  Reporta violaciones con status PASS/WARN/FAIL y sugerencias de fix.

# Contrato de entrada
input:
  files:
    type: array
    required: false
    description: "Lista de archivos a verificar. Si vacío, usa staged files."
    items: { type: string }
  scope:
    type: string
    default: "."
    description: "Path o patrón alternativo si no hay files"

# Contrato de salida
output:
  type: object
  properties:
    status:
      type: string
      enum: [PASS, WARN, FAIL]
      description: "Status general del check"
    summary:
      type: object
      properties:
        pass_count: { type: integer }
        warn_count: { type: integer }
        fail_count: { type: integer }
    violations:
      type: array
      items:
        type: object
        properties:
          file: { type: string }
          line: { type: integer }
          rule_id: { type: string }
          status: { type: string, enum: [PASS, WARN, FAIL, SKIP] }
          issue: { type: string }
          suggestion: { type: string }

# Comportamiento
behavior:
  deterministic: true
  strict_on_fail: false
  description: "Reporta violaciones pero no bloquea"

# Implementación
implementation:
  type: inline
  steps:
    - "Determinar archivos a verificar"
    - "Para cada archivo, buscar reglas con globs que matcheen"
    - "Leer contenido del archivo"
    - "Verificar cumplimiento de cada instrucción de regla"
    - "Clasificar resultado: PASS/WARN/FAIL/SKIP"
    - "Generar sugerencia de fix para cada violación"
    - "Compilar reporte"

# Jidoka
jidoka:
  on_no_files: "Retornar PASS con nota de sin archivos"
  on_read_error: "Skip archivo y añadir warning"
  max_violations: 50
  on_max_exceeded: "Truncar y añadir nota"
---
