---
id: retrieve-mvc
name: "Retrieve Minimum Viable Context"
type: skill
version: 1.0.0

description: |
  Obtiene el Minimum Viable Context (MVC) para una tarea específica.
  Escanea las reglas del proyecto, aplica matching de globs y tags,
  y retorna las reglas relevantes clasificadas por prioridad.

# Contrato de entrada
input:
  task:
    type: string
    required: true
    description: "Descripción de la tarea a realizar"
  scope:
    type: string
    default: "."
    description: "Path o patrón de archivos donde se trabajará"
  min_confidence:
    type: number
    default: 0.80
    description: "Umbral mínimo de confianza para incluir reglas"

# Contrato de salida
output:
  type: object
  properties:
    query:
      type: object
      description: "Echo del query original"
    primary_rules:
      type: array
      description: "Reglas directamente aplicables (contenido completo)"
      items:
        type: object
        properties:
          id: { type: string }
          name: { type: string }
          content: { type: string }
    context_rules:
      type: array
      description: "Reglas relacionadas (solo resumen)"
      items:
        type: object
        properties:
          id: { type: string }
          name: { type: string }
          summary: { type: string }
    warnings:
      type: array
      description: "Conflictos, deprecaciones, baja confianza"
      items:
        type: object
        properties:
          type: { type: string, enum: [conflict, deprecated, low_confidence] }
          message: { type: string }
          affected_rules: { type: array, items: { type: string } }

# Comportamiento
behavior:
  deterministic: true
  description: "Mismo input siempre produce mismo output (sin LLM en retrieval)"

# Implementación
implementation:
  type: inline
  steps:
    - "Escanear .cursor/rules/*.mdc"
    - "Extraer YAML frontmatter de cada regla"
    - "Match globs contra scope del task"
    - "Match tags contra tipo de tarea"
    - "Clasificar en primary (match directo) vs context (match por tags)"
    - "Detectar conflictos entre reglas"
    - "Retornar MVC estructurado"

# Jidoka
jidoka:
  on_no_rules: "Retornar MVC vacío con warning explicativo"
  on_conflict: "Incluir en warnings, no fallar"
  on_malformed_rule: "Skip regla y añadir warning"
---
