artifact_type: story-design
version: 1
skill: rai-story-design
created: '2026-03-06'
story: 'S474.4'
epic: 'E474'
content:
  summary: 'Pre-commit hook that runs lint, format, and type-check commands from manifest. Installed via rai gate install-hook CLI command. Python module with bash shim.'
  complexity: small
  acceptance_criteria:
    - id: AC1
      description: 'rai gate install-hook creates .git/hooks/pre-commit with correct shim'
      verifiable: true
    - id: AC2
      description: 'Hook runs lint_command, format_command, type_check_command from manifest'
      verifiable: true
    - id: AC3
      description: 'Hook does NOT run test_command'
      verifiable: true
    - id: AC4
      description: 'Commit blocked (exit 1) when any check fails'
      verifiable: true
    - id: AC5
      description: 'Clear output shows which check passed/failed'
      verifiable: true
    - id: AC6
      description: 'rai gate uninstall-hook removes only rai-installed hooks'
      verifiable: true
    - id: AC7
      description: 'git commit --no-verify bypasses the hook (native git behavior)'
      verifiable: true
    - id: AC8
      description: 'Hook is opt-in, never auto-installed'
      verifiable: true
  integration_points:
    - module: 'gates/hook'
      change_type: new
      files: ['src/raise_cli/gates/hook.py']
    - module: 'cli/gate'
      change_type: modification
      files: ['src/raise_cli/cli/commands/gate.py']
    - module: 'tests'
      change_type: new
      files: ['tests/gates/test_hook.py', 'tests/cli/test_gate_hook_commands.py']
  decisions:
    - id: D1
      choice: 'Python hook module reusing manifest loader'
      rationale: 'Testable, DRY with existing gate infrastructure, no YAML parsing in bash'
      alternatives_considered: ['Shell script with yq', 'Shell script with grep/sed']
    - id: D2
      choice: 'Thin bash shim in .git/hooks delegates to uv run python -m'
      rationale: 'Works with project uv environment, git requires file in hooks dir'
      alternatives_considered: ['Symlink', 'Direct Python shebang']
    - id: D3
      choice: 'Marker comment in shim for safe uninstall'
      rationale: 'Prevents deleting user custom hooks'
      alternatives_considered: ['Always delete', 'Backup before delete']
    - id: D4
      choice: 'Skip test_command deliberately'
      rationale: 'Too slow for commit-time per scope'
      alternatives_considered: ['Run tests too']
    - id: D5
      choice: 'Check-only, no auto-fix'
      rationale: 'Scope requirement, developer fixes consciously'
      alternatives_considered: ['Auto-fix with ruff format']
refs:
