content:
  summary: 'Make gates language-agnostic by reading commands from manifest. Add FormatGate. Update gate-code.md.'
  complexity: moderate
  acceptance_criteria:
    - id: AC1
      description: 'FormatGate reads format_command from manifest'
      verifiable: true
    - id: AC2
      description: 'All 4 existing gates read from manifest instead of hardcoding'
      verifiable: true
    - id: AC3
      description: 'rai gate check --all shows 5 gates, all pass'
      verifiable: true
    - id: AC4
      description: 'Gates skip gracefully if command not configured'
      verifiable: true
    - id: AC5
      description: 'format_command added to detection for all 14 languages'
      verifiable: true
    - id: AC6
      description: 'gate-code.md updated to reference manifest-driven gates'
      verifiable: true
    - id: AC7
      description: 'Tests cover pass, fail, and not-configured scenarios'
      verifiable: true
  integration_points:
    - module: 'raise_cli.gates.builtin._runner'
      change_type: new
      files: ['src/raise_cli/gates/builtin/_runner.py']
    - module: 'raise_cli.gates.builtin.format'
      change_type: new
      files: ['src/raise_cli/gates/builtin/format.py']
    - module: 'raise_cli.gates.builtin.tests'
      change_type: modification
      files: ['src/raise_cli/gates/builtin/tests.py']
    - module: 'raise_cli.gates.builtin.lint'
      change_type: modification
      files: ['src/raise_cli/gates/builtin/lint.py']
    - module: 'raise_cli.gates.builtin.types'
      change_type: modification
      files: ['src/raise_cli/gates/builtin/types.py']
    - module: 'raise_cli.gates.builtin.coverage'
      change_type: modification
      files: ['src/raise_cli/gates/builtin/coverage.py']
    - module: 'raise_cli.onboarding.manifest'
      change_type: modification
      files: ['src/raise_cli/onboarding/manifest.py']
    - module: 'raise_cli.onboarding.detection'
      change_type: modification
      files: ['src/raise_cli/onboarding/detection.py']
  decisions:
    - id: D1
      choice: 'Shared helper reads manifest and runs command'
      rationale: 'DRY — 5 gates share identical pattern'
      alternatives_considered: ['Each gate reads manifest independently']
    - id: D2
      choice: 'Skip (pass) if command not configured'
      rationale: 'Non-blocking for projects without that tool'
      alternatives_considered: ['Fail if not configured']
    - id: D3
      choice: 'command.split() for execution'
      rationale: 'Simple, covers manifest command format'
      alternatives_considered: ['shlex.split()']
