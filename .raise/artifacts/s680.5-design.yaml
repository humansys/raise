artifact_type: story-design
version: 1
skill: rai-story-design
created: '2026-03-23T00:00:00Z'
story: 'S680.5'
epic: 'E680'
content:
  summary: >
    Execute 6 end-to-end smoke tests against v2.3.0 features (session roundtrip,
    ACLI adapter, clean install, rai doctor, pattern scope, CLI extensions) and
    document results. Document-only — no bug fixes in scope.
  complexity: simple
  acceptance_criteria:
    - id: AC1
      description: 'All 6 verifications executed and results captured'
      verifiable: true
    - id: AC2
      description: 'Results documented with pass/fail status and evidence per verification'
      verifiable: true
    - id: AC3
      description: 'Any failures documented with severity assessment'
      verifiable: true
    - id: AC4
      description: 'Clean install tested in isolated venv'
      verifiable: true
    - id: AC5
      description: 'No bug fixes attempted — issues documented only'
      verifiable: true
  verifications:
    - id: V1
      name: 'Session roundtrip'
      command: 'rai session start --project . --context && rai session close --summary "smoke test" --type maintenance --project .'
      pass_criteria: 'Both complete without error'
    - id: V2
      name: 'ACLI adapter'
      command: 'rai backlog search "RAISE-680" -a jira'
      pass_criteria: 'Returns results, no adapter errors'
    - id: V3
      name: 'Clean install'
      command: 'uv venv /tmp/raise-smoke && uv pip install -e . --python /tmp/raise-smoke/bin/python && /tmp/raise-smoke/bin/rai --help'
      pass_criteria: 'Install succeeds, help shows'
    - id: V4
      name: 'rai doctor'
      command: 'rai doctor'
      pass_criteria: 'Runs without crash, shows ACLI status'
    - id: V5
      name: 'Pattern add scope'
      command: 'rai pattern add "smoke test pattern" -c "test" -t process'
      pass_criteria: 'Pattern added to project scope (not personal)'
    - id: V6
      name: 'CLI extensions'
      command: 'rai --help'
      pass_criteria: 'Extensions listed or no crash'
  decisions:
    - id: D1
      choice: 'Document only, no fixes'
      rationale: 'Smoke test validates release readiness; fixes go to separate stories'
      alternatives_considered: ['Fix as found (scope creep risk)']
    - id: D2
      choice: '6 verifications covering major v2.3.0 features'
      rationale: 'Covers session (E654), ACLI (E494), doctor (RAISE-614), pattern scope (RAISE-608), install, extensions'
      alternatives_considered: ['Only 3 verifications (original plan)', 'Full regression suite (overkill for S-size)']
