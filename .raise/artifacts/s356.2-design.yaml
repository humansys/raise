  related_artifacts:
    - work/epics/e356-website-migration/stories/s356.2-story.md
    - work/epics/e356-website-migration/stories/s356.2-scope.md
    - work/epics/e356-website-migration/stories/s356.1-retrospective.md
content:
  summary: >
    Update website content across all pages and languages to reflect v2.2 reality.
    Fix metrics bar (replace test coverage with "37 Skills"), update landing page
    code example to use real CLI commands, correct pricing skill count (37 not 20),
    review docs for CLI accuracy, mirror all changes to Spanish content. Also address
    hygiene items from S356.1 AR (delete boilerplate README, deduplicate .gitignore,
    add .wrangler/ to root .gitignore).
  complexity: moderate
  acceptance_criteria:
    - id: AC-1
      description: >
        MetricsBar shows accurate v2.2 numbers: "37 Skills" replaces "90.27% Test coverage",
        "97% Token savings" and "15.8 Story points/day" and "1 Engineer" retained.
      verifiable: true
    - id: AC-2
      description: >
        Landing page code example uses real CLI patterns (rai session start, rai graph query)
        instead of fictional raise_core Python imports.
      verifiable: true
    - id: AC-3
      description: >
        Pricing page shows "37 skills" instead of "20 skills" and includes
        "MCP server support" and "Multi-agent support" in community features.
      verifiable: true
    - id: AC-4
      description: >
        Docs content (getting started, concepts, CLI reference) matches v2.2 CLI commands
        as verified against rai --help output.
      verifiable: true
    - id: AC-5
      description: >
        Spanish content (es/ pages) mirrors all English content updates.
      verifiable: true
  integration_points: []
  decisions:
    - id: D-1
      choice: >
        Replace "Test coverage 90.27%" metric with "37 Skills" in MetricsBar.
      rationale: >
        Test coverage is not a meaningful public metric for marketing. Skill count
        communicates framework capability directly to evaluators.
      alternatives_considered:
        - "3,700+ Tests — impressive but less meaningful for feature evaluation"
        - "Keep test coverage — accurate but not compelling for prospects"
    - id: D-2
      choice: >
        Code example should show actual CLI usage, not fictional Python API.
      rationale: >
        The CLI is the primary user interface. Showing real commands builds trust
        and gives visitors an immediate sense of the developer experience.
      alternatives_considered:
        - "Python SDK example — SDK doesn't exist as public API"
        - "YAML config example — less dynamic, doesn't show interaction model"
    - id: D-3
      choice: >
        Don't update waitlist API code — that's infrastructure scope (S356.3).
      rationale: >
        Mixing content updates with infrastructure changes increases risk and
        blurs story boundaries.
      alternatives_considered:
        - "Update everything at once — violates single-responsibility story design"
metadata:
  approach: >
    1. Update MetricsBar.astro with v2.2 numbers.
    2. Rewrite landing page code example with real CLI commands.
    3. Update pricing page skill counts and feature lists.
    4. Review and update Starlight docs against rai --help.
    5. Mirror all changes to es/ Spanish content.
    6. Hygiene: delete site/README.md, deduplicate site/.gitignore, add .wrangler/ to root .gitignore.
  files_affected:
    - site/src/components/MetricsBar.astro
    - site/src/pages/index.astro
    - site/src/pages/es/index.astro
    - site/src/pages/pricing.astro
    - site/src/pages/es/pricing.astro
    - site/src/content/docs/**
    - site/README.md (delete)
    - site/.gitignore
    - .gitignore
  examples_provided: true
  no_code_changes: false
