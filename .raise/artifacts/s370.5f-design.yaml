story: 'S370.5f'
epic: 'E370'
content:
  summary: >
    Replace fragile regex/frontmatter parsing in identity and architecture
    loaders with deterministic YAML reading. Reduces identity loader from
    200 to ~30 lines and makes all loaders consistently read structured data.
  complexity: moderate
  acceptance_criteria:
    - id: AC1
      description: 'load_identity() reads core.yaml, produces same GraphNode IDs/types/metadata'
      verifiable: true
    - id: AC2
      description: 'load_architecture() reads *.yaml files, produces same GraphNode IDs/types/metadata'
      verifiable: true
    - id: AC3
      description: 'Identity loader has no re import'
      verifiable: true
    - id: AC4
      description: 'rai init generates core.yaml for new projects'
      verifiable: true
    - id: AC5
      description: 'All existing tests pass (adapted for YAML fixtures)'
      verifiable: true
    - id: AC6
      description: 'pyright 0 errors, ruff clean'
      verifiable: true
  integration_points:
    - module: 'raise_cli.context.loaders.identity'
      change_type: modification
      files: ['src/raise_cli/context/loaders/identity.py']
    - module: 'raise_cli.context.loaders.architecture'
      change_type: modification
      files: ['src/raise_cli/context/loaders/architecture.py']
    - module: 'raise_cli.onboarding.bootstrap'
      change_type: modification
      files: ['src/raise_cli/onboarding/bootstrap.py']
    - module: 'raise_cli.onboarding.instructions'
      change_type: modification
      files: ['src/raise_cli/onboarding/instructions.py']
  decisions:
    - id: D1
      choice: 'core.yaml flat structure (values/boundaries/principles)'
      rationale: 'Matches loader consumption — one file, 3 sections'
      alternatives_considered: ['Separate files per section']
    - id: D2
      choice: 'Keep architecture markdown alongside YAML'
      rationale: 'Human docs useful; loader reads YAML, humans read MD'
      alternatives_considered: ['Delete MD entirely']
    - id: D3
      choice: 'Clean cut — YAML only, no fallback to .md'
      rationale: 'Simpler code, no legacy paths; MD is never parsed'
      alternatives_considered: ['Backward compat fallback']
