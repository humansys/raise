  epic_scope: work/epics/e369-open-source-audit/scope.md
  related_artifacts:
    - work/epics/e369-open-source-audit/stories/s369.4-story.md
    - work/epics/e369-open-source-audit/stories/s369.4-scope.md
content:
  summary: >
    Scan repository for secrets, internal references, and unintended artifacts
    before PyPI publication. Verify .gitignore completeness, inspect sdist/wheel
    contents, and ensure no internal URLs/emails/paths ship in published code.
    Grep-based scanning rather than external tool installation.
  complexity: moderate
  acceptance_criteria:
    - id: AC-1
      description: >
        Secrets scan completes with no true positives. Any false positives
        are documented with rationale for why they are safe.
      verifiable: true
    - id: AC-2
      description: >
        .gitignore covers personal/internal artifacts: .raise/rai/personal/,
        .raise/rai/memory/.raise/, env files, work/ dev artifacts that should
        not ship.
      verifiable: true
    - id: AC-3
      description: >
        sdist and wheel built and inspected. No work/, dev/, .raise/
        directories included in the distribution.
      verifiable: true
    - id: AC-4
      description: >
        No internal URLs, email addresses, or filesystem paths remain in
        src/ code that ships to PyPI.
      verifiable: true
    - id: AC-5
      description: >
        Scan results documented for audit trail.
      verifiable: true
  integration_points:
    - description: >
        S369.2 configured pyproject.toml build includes/excludes. This story
        validates that those rules work correctly by inspecting actual build
        output.
    - description: >
        .gitignore changes may overlap with patterns set in S369.2. Verify
        consistency.
  decisions:
    - id: D-1
      choice: >
        Use grep patterns for secrets/internal refs rather than requiring
        external tool install (trufflehog/gitleaks).
      rationale: >
        Grep is universally available, sufficient for a targeted scan of
        known patterns (API keys, tokens, internal domains). If grep finds
        nothing suspicious, that is sufficient for this scope. External
        tools can be added in a future CI story.
      alternatives_considered:
        - "Install trufflehog -- adds dependency, scans git history which is valuable but out of scope for fixes"
        - "Install gitleaks -- same trade-off as trufflehog"
    - id: D-2
      choice: >
        Build sdist and inspect actual contents rather than guessing what
        pyproject.toml includes/excludes will produce.
      rationale: >
        The only reliable way to verify distribution contents is to build
        and inspect. pyproject.toml rules can be subtle (especially with
        tool.setuptools.packages.find exclude patterns).
      alternatives_considered:
        - "Review pyproject.toml rules only -- unreliable without verification"
  components:
    - path: .gitignore
      action: review/modify
      changes: >
        Verify coverage of .raise/rai/personal/, .raise/rai/memory/.raise/,
        work/research/, env files, and any other internal artifacts. Add
        missing patterns if found.
    - path: pyproject.toml
      action: review
      changes: >
        Review [tool.setuptools.packages.find] exclude patterns and any
        MANIFEST.in or [tool.setuptools.package-data] settings.
    - path: src/
      action: scan
      changes: >
        Grep for internal URLs, email addresses, internal filesystem paths,
        API keys, tokens, and other sensitive patterns.
    - path: sdist/wheel output
      action: inspect
      changes: >
        Build with `uv build` or `python -m build`, then list contents
        of both .tar.gz and .whl to verify only intended files are included.
metadata:
  approach: >
    1. Scan src/ and top-level files for secrets patterns (API keys, tokens,
       passwords, private keys).
    2. Scan src/ for internal references (humansys internal URLs, personal
       emails, absolute filesystem paths).
    3. Review .gitignore for completeness; add missing patterns.
    4. Build sdist and wheel; inspect contents for unexpected files.
    5. Document all findings (clean results and any false positives).
  scan_patterns:
    secrets:
      - "PRIVATE KEY"
      - "sk-[a-zA-Z0-9]"
      - "password\\s*="
      - "secret\\s*="
      - "token\\s*="
      - "Bearer "
      - "Basic [A-Za-z0-9+/=]"
    internal_refs:
      - "humansys"
      - "@humansys"
      - "/home/emilio"
      - "192.168."
      - "10.0."
      - "localhost"
  no_code_changes: false
  primarily_scanning: true
