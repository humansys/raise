artifact_type: story-design
version: 1
skill: rai-story-design
created: '2026-03-06T21:30:00Z'
story: 'S493.2'
epic: 'E493'
content:
  summary: 'Portable profile export/import commands for developer identity transfer between machines'
  complexity: moderate
  acceptance_criteria:
    - id: AC1
      description: 'Export produces valid YAML bundle with _meta and profile (minus machine-local fields)'
      verifiable: true
    - id: AC2
      description: 'Import creates/updates developer.yaml, strips active_sessions/current_session/projects'
      verifiable: true
    - id: AC3
      description: 'Import warns on overwrite unless --force'
      verifiable: true
    - id: AC4
      description: 'Export fails gracefully without profile'
      verifiable: true
    - id: AC5
      description: 'Import rejects invalid bundle with clear error'
      verifiable: true
  integration_points:
    - module: 'rai_cli.onboarding.profile_portability'
      change_type: new
      files: ['src/rai_cli/onboarding/profile_portability.py']
    - module: 'rai_cli.cli.commands.profile'
      change_type: modification
      files: ['src/rai_cli/cli/commands/profile.py']
  decisions:
    - id: D1
      choice: 'Export to stdout by default'
      rationale: 'Unix convention, pipeable'
      alternatives_considered: ['Always write to file']
    - id: D2
      choice: 'Confirm overwrite on import'
      rationale: 'Prevent accidental data loss'
      alternatives_considered: ['Always overwrite', 'Merge profiles']
    - id: D3
      choice: 'Strip active_sessions, current_session, projects'
      rationale: 'Machine-local state that causes confusion on new machine'
      alternatives_considered: ['Strip only active_sessions']
refs:
  epic_scope: 'work/epics/e493-setup-experience/scope.md'
