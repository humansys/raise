artifact_type: story-design
version: 1
skill: rai-story-design
created: '2026-04-02T10:00:00'
story: 'S1040.1'
epic: 'E1040'
content:
  summary: >
    FilesystemAdapter — single class with 4 atomic I/O primitives (write, append,
    read, list). Uses temp file + os.rename for crash-safe writes. Zero domain
    knowledge — stewards handle validation. Foundation for Steward + Adapter
    architecture (DD-1).
  complexity: simple
  acceptance_criteria:
    - id: AC1
      description: 'write() produces identical file content to direct write_text()'
      verifiable: true
    - id: AC2
      description: 'write() is atomic — crash mid-write leaves original file unchanged'
      verifiable: true
    - id: AC3
      description: 'append() adds exactly one line with trailing newline'
      verifiable: true
    - id: AC4
      description: 'append() to non-existent file creates it with parent dirs'
      verifiable: true
    - id: AC5
      description: 'read() returns content, raises FileNotFoundError for missing files'
      verifiable: true
    - id: AC6
      description: 'list() returns paths matching glob pattern relative to root'
      verifiable: true
    - id: AC7
      description: 'All methods resolve paths relative to constructor root'
      verifiable: true
    - id: AC8
      description: 'Stale temp files from crashed writes do not accumulate indefinitely'
      verifiable: true
    - id: AC9
      description: 'No domain knowledge in adapter (no YAML parsing, no Pydantic validation)'
      verifiable: true
    - id: AC10
      description: 'No concurrency handling (single-process only)'
      verifiable: true
  integration_points:
    - module: 'adapters'
      change_type: new
      files: ['src/raise_cli/adapters/filesystem_adapter.py']
  decisions:
    - id: DD-4
      choice: 'Single concrete class, no protocol/ABC'
      rationale: 'No protocol until second backend exists. YAGNI.'
      alternatives_considered: ['Protocol from day one', 'ABC with single implementation']
    - id: DD-3
      choice: 'Zero domain knowledge in adapter'
      rationale: 'Stewards own validation. Adapter handles bytes only.'
      alternatives_considered: ['Adapter validates YAML/JSONL format', 'Adapter enforces file extension rules']
