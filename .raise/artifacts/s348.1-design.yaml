artifact_type: story-design
version: 1
skill: rai-story-design
story: S348.1
epic: E348
created: "2026-03-05"
content:
  summary: "Documentation audit — gap matrix approach"
  complexity: simple
  acceptance_criteria:
    - id: AC1
      description: "Gap matrix produced"
      verifiable: true
  integration_points: []
  decisions: []

problem: |
  RaiSE v2.2 documentation has grown organically. The Astro doc site covers
  ~40% of CLI commands (under deprecated `rai memory` namespace), has zero
  developer/extension docs, no llms.txt, and a placeholder AGENTS.md. Before
  writing or restructuring anything, we need a systematic inventory of what
  exists, what is missing, and what is stale — per audience and Diataxis type.

value: |
  A prioritized gap matrix gives every subsequent story (S348.2-S348.6) a
  concrete, auditable input. Without it, documentation work is driven by
  guesswork rather than evidence. The matrix also serves as the acceptance
  artifact for the audit itself.

approach:
  description: |
    Walk every documentation artifact, assess against three dimensions
    (audience, Diataxis type, status), and produce a gap matrix.
  steps:
    - id: 1
      action: "Inventory all doc artifacts"
      detail: |
        Enumerate: docs/ Astro pages (en), root files (README, CONTRIBUTING,
        CODE_OF_CONDUCT, CHANGELOG, LICENSE, AGENTS.md), llms.txt (absent),
        CLI reference page, CLAUDE.md, SKILL.md files.
    - id: 2
      action: "Validate CLI reference completeness"
      detail: |
        Compare `rai --help` command tree (20 top-level groups, ~60 subcommands)
        against the CLI reference page. Record coverage percentage and list
        every undocumented command.
    - id: 3
      action: "Assess each artifact"
      detail: |
        For each doc: Is it accurate for v2.2? Which audience(s) does it serve?
        What Diataxis type is it? Status: exists/partial/missing/stale.
    - id: 4
      action: "Produce gap matrix"
      detail: |
        Rows = doc topics/pages. Columns = status, audience, Diataxis type,
        priority (P0/P1/P2), assigned story (S348.2-S348.6).
    - id: 5
      action: "Summarize findings"
      detail: |
        Top-level stats: total pages, coverage %, critical gaps. Prioritized
        action list informing story sequencing.

gap_matrix_format:
  description: "Each row in the gap matrix follows this structure"
  columns:
    - name: Topic/Page
      type: string
      example: "CLI ref: backlog commands"
    - name: Status
      type: enum
      values: [exists, partial, missing, stale]
    - name: Audience
      type: list
      values: [user, developer, agent]
    - name: Diataxis
      type: enum
      values: [tutorial, how-to, reference, explanation, meta]
    - name: Priority
      type: enum
      values: [P0, P1, P2]
    - name: Story
      type: string
      example: "S348.2"

acceptance_criteria:
  - id: AC1
    must: true
    criterion: "Gap matrix document produced with every doc artifact assessed"
  - id: AC2
    must: true
    criterion: "CLI reference coverage percentage validated against actual `rai --help` output for all 20 command groups"
  - id: AC3
    must: true
    criterion: "All three audiences (user, developer, agent) have explicit coverage assessment"
  - id: AC4
    must: true
    criterion: "Every row has a priority (P0/P1/P2) and assigned story (S348.2-S348.6)"
  - id: AC5
    must: true
    criterion: "Output written to work/epics/e348-documentation-refresh/stories/s348.1-audit.md"
