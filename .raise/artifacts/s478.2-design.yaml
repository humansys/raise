id: s478.2-design
story: S478.2
epic: E478
type: design
status: complete
created: "2026-03-11"

title: "Clean entry points and dependencies — lean spec"

problem: |
  raise-cli pyproject.toml declares pro-only entry points (jira, confluence,
  jira-sync) and pro-only dependencies (atlassian-python-api, authlib,
  cryptography, requests, urllib3, certifi). Community installs pull 6+
  unnecessary packages.

approach:
  d1_create_pro_package:
    description: "Create packages/raise-pro/ workspace package"
    artifacts:
      - packages/raise-pro/pyproject.toml
    details:
      - "name: raise-pro"
      - "depends on raise-cli (shared models, bridge, protocols)"
      - "pro-only deps: atlassian-python-api, authlib, cryptography, requests, urllib3, certifi"
      - "entry points: jira (rai.adapters.pm), confluence (rai.docs.targets), jira-sync (rai.hooks)"
      - "wheel packages: src/rai_pro"
      - "NOTE: src/rai_pro/ stays at repo root (not moved into packages/) — same pattern NOT required"

  d2_clean_raise_cli:
    description: "Remove pro entry points and deps from raise-cli pyproject.toml"
    changes:
      - "Remove entry points: jira (rai.adapters.pm), confluence (rai.docs.targets), jira-sync (rai.hooks)"
      - "Remove dependencies: atlassian-python-api, authlib, cryptography, requests, urllib3, certifi"
      - "Remove src/rai_pro from wheel packages and sdist include"
    verified:
      - "requests, urllib3, certifi: NOT imported by raise_cli or raise_core — safe to remove"

  d3_workspace_config:
    description: "Workspace auto-discovers via members = ['packages/*']"
    changes:
      - "Add raise-pro to [tool.uv.sources] for workspace resolution"
      - "Add --cov=src/rai_pro to pytest config"

decisions:
  - id: D-478.2-1
    decision: "Move all 6 deps (including requests/urllib3/certifi) to raise-pro"
    rationale: "Grep confirms zero imports of requests/urllib3/certifi in raise_cli and raise_core"

  - id: D-478.2-2
    decision: "Keep src/rai_pro/ at repo root, reference from packages/raise-pro/pyproject.toml"
    rationale: "Avoids file moves (already done in S478.1). Hatch wheel config can point to repo-root src/"

  - id: D-478.2-3
    decision: "raise-pro depends on raise-cli (not the reverse)"
    rationale: "Community package must be standalone. Pro extends community."

risks:
  - id: R-478.2-1
    risk: "Hatch may not support wheel packages outside package directory"
    mitigation: "Verify with hatch build --dry-run. Fallback: move src/rai_pro into packages/raise-pro/src/"

  - id: R-478.2-2
    risk: "Tests importing rai_pro need raise-pro in dev deps"
    mitigation: "Workspace uv sync installs all members. Add raise-pro to dev optional-deps if needed."

acceptance_criteria:
  - "pip install raise-cli has zero atlassian/authlib/cryptography/requests deps"
  - "packages/raise-pro/pyproject.toml exists with correct entry points and deps"
  - "uv sync in workspace installs both packages, all tests pass"
  - "No jira/confluence/jira-sync entry points in raise_cli pyproject.toml"
  - "No behavioral changes to adapters or hooks"
