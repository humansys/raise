artifact_type: story-design
version: 1
skill: rai-story-design
created: "2026-03-06"
story: S370.2
epic: E370
content:
  summary: >
    Expand Ruff configuration from 9 to 20 rule sets, add import-linter with
    ADR-001 layer contracts, and set McCabe max-complexity = 10. Each rule set
    enabled incrementally: enable, fix violations (prefer fix over noqa), commit.
    After this story, every commit automatically enforces security, complexity,
    performance, and architecture rules.
  complexity: moderate
  approach: >
    Three changes, executed incrementally. (1) Ruff expansion: enable 11 new
    rule sets one at a time in risk-first order (S, C90, PL, PERF, FURB, RET,
    ARG, ERA, PT, TC, A). For each: enable, run ruff check, fix violations or
    add justified noqa, commit. (2) import-linter: add as dev dependency,
    configure layer contracts in pyproject.toml per ADR-001 layer model.
    (3) McCabe complexity cap as part of C90 enablement.
  acceptance_criteria:
    - id: AC1
      description: "All 11 new Ruff rule sets enabled in pyproject.toml [tool.ruff.lint] select"
      verifiable: true
    - id: AC2
      description: "ruff check src/ tests/ passes with zero violations"
      verifiable: true
    - id: AC3
      description: "import-linter contracts defined in pyproject.toml per ADR-001 layers"
      verifiable: true
    - id: AC4
      description: "lint-imports passes with zero violations"
      verifiable: true
    - id: AC5
      description: "McCabe max-complexity = 10 configured and all functions comply"
      verifiable: true
  should_criteria:
    - id: SC1
      description: "Violations fixed rather than ignored (total noqa count < 20 new additions)"
    - id: SC2
      description: "Each rule set enabled in a separate commit for traceability"
  must_not_criteria:
    - id: MN1
      description: "Must NOT add noqa without justification comment on same or preceding line"
    - id: MN2
      description: "Must NOT change functional behavior (only config + style fixes)"
  integration_points:
    - module: config
      change_type: modify
      files:
        - "pyproject.toml"
    - module: source
      change_type: modify
      files:
        - "src/**/*.py (violation fixes)"
        - "tests/**/*.py (violation fixes)"
  decisions:
    - id: D1
      choice: "Fix over Ignore — prefer code fixes to noqa annotations"
      rationale: >
        noqa suppresses the rule permanently. Fixing the code raises quality.
        Only use noqa when: false positive, fix requires larger refactor
        (deferred to S370.5), or pattern is intentional (e.g., PAT-E-589
        module-level Path constants as test seams).
      alternatives_considered:
        - "Blanket noqa for all initial violations (faster, lower quality)"
        - "Strict zero-noqa policy (may require large refactors in this story)"
    - id: D2
      choice: "Risk-first rule set ordering (S first, A last)"
      rationale: >
        Security rules (S) have highest impact — finding a hardcoded secret is
        more valuable than finding a shadowed builtin. Complexity (C90) and
        Pylint (PL) next because they catch structural issues. Cosmetic rules
        (A, TC) last because they are lower risk.
      alternatives_considered:
        - "Alphabetical order"
        - "Expected-violation-count order (easiest first)"
    - id: D3
      choice: "import-linter layer contracts match ADR-001 actual module layout"
      rationale: >
        ADR-001 defines 4 conceptual layers. The actual raise_cli package has
        ~25 subpackages. The contracts map the real modules to ADR-001 layers:
        Presentation (cli, output, viz) -> Application (session, context,
        onboarding, handlers, doctor, governance, artifacts, skills, backlog,
        hooks, gates, publish, agents) -> Domain (engines, discovery, graph,
        tier, memory) -> Core (core, config, schemas, compat, exceptions,
        adapters, rai_base). This preserves ADR-001 intent while matching
        actual code structure.
      alternatives_considered:
        - "Only enforce top-level 4-layer contract (too coarse)"
        - "Module-level independence contracts (too many, maintenance burden)"
    - id: D4
      choice: "import-linter added to dev dependencies, not main dependencies"
      rationale: >
        import-linter is a development/CI tool, not a runtime dependency.
        Users installing raise-cli do not need it. Aligns with D5.6 dependency
        justification — import-linter has 700+ stars, is the standard tool for
        Python architecture enforcement, referenced in code-standards-draft.md.
      alternatives_considered:
        - "Separate lint dependencies group"
        - "Pre-commit only (no pyproject.toml dep)"
  components:
    - path: pyproject.toml
      action: modify
      changes: >
        Add 11 rule sets to [tool.ruff.lint] select. Add [tool.ruff.lint.mccabe]
        max-complexity = 10. Add per-file-ignores for test files if needed
        (e.g., S101 assert in tests, ARG unused fixture args). Add import-linter
        to dev dependencies. Add [tool.importlinter] contracts section.
    - path: "src/**/*.py"
      action: modify
      changes: >
        Fix violations found by new rules. Types of fixes expected: remove
        commented-out code (ERA), add TYPE_CHECKING imports (TC), fix return
        consistency (RET), remove unused arguments (ARG), modernize patterns
        (FURB), fix security warnings (S), reduce complexity (C90), fix pytest
        style (PT), avoid builtin shadowing (A), apply pylint suggestions (PL),
        optimize performance patterns (PERF).
    - path: "tests/**/*.py"
      action: modify
      changes: >
        Fix test-file violations. Expected: PT style fixes, ARG unused fixture
        parameters, ERA commented-out test code. S101 (assert usage) will need
        per-file-ignores since pytest uses assert statements.
