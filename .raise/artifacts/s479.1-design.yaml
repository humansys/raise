artifact: design
story: S479.1
epic: E479
title: "YAML control mapping with Pydantic models for ISO 27001 A.8 controls"
created: "2026-03-13"
status: draft

problem: |
  Teams preparing for ISO 27001 audits have no structured mapping between
  Annex A.8 controls and the evidence artifacts RaiSE already produces.
  Evidence collection is manual and ad-hoc.

value: |
  A validated YAML config establishes the foundation for automated evidence
  collection. All downstream extractors and report generators depend on this
  mapping to know what to collect and where to find it.

approach: |
  Create a compliance package with three components:
  1. A YAML config file mapping 8 ISO 27001:2022 Annex A.8 controls to
     RaiSE evidence sources (git, gate, session).
  2. Pydantic models (ControlMapping, ControlConfig, EvidenceSourceConfig)
     that validate the YAML structure on load.
  3. A loader function that reads the YAML, validates it, and returns a
     typed ControlMapping instance. Supports both default (package-bundled)
     and custom config paths.

components:
  create:
    - path: src/raise_cli/compliance/__init__.py
      purpose: Package init
    - path: src/raise_cli/compliance/controls.yaml
      purpose: Default mapping of 8 A.8 controls to evidence sources
    - path: src/raise_cli/compliance/models.py
      purpose: "Pydantic models: EvidenceSourceConfig, ControlConfig, ControlMapping"
    - path: src/raise_cli/compliance/loader.py
      purpose: "load_control_mapping(path?) -> ControlMapping"

controls_mapped:
  - id: "A.8.4"
    name: "Access to source code"
    evidence_type: git
    extractor: permissions
  - id: "A.8.9"
    name: "Configuration management"
    evidence_type: git
    extractor: "history, branches, tags"
  - id: "A.8.15"
    name: "Logging"
    evidence_type: session
    extractor: "journals, audit_trail"
  - id: "A.8.25"
    name: "Secure development lifecycle"
    evidence_type: gate
    extractor: "tests, types, lint"
  - id: "A.8.26"
    name: "Application security requirements"
    evidence_type: session
    extractor: "story_designs, adrs"
  - id: "A.8.27"
    name: "Secure system architecture"
    evidence_type: session
    extractor: "design_docs, architecture_reviews"
  - id: "A.8.32"
    name: "Change management"
    evidence_type: git
    extractor: "commits, pull_requests, approvals"
  - id: "A.8.33"
    name: "Test information"
    evidence_type: gate
    extractor: "test_results, coverage"

models:
  EvidenceSourceConfig:
    fields:
      - name: type
        type: 'Literal["git", "gate", "session"]'
      - name: extractor
        type: str
      - name: description
        type: str
  ControlConfig:
    fields:
      - name: id
        type: str
      - name: name
        type: str
      - name: description
        type: str
      - name: evidence_sources
        type: "list[EvidenceSourceConfig]"
  ControlMapping:
    fields:
      - name: version
        type: str
      - name: standard
        type: str
      - name: controls
        type: "list[ControlConfig]"

acceptance_criteria:
  must:
    - "AC1: YAML config with all 8 A.8 controls and their evidence source mappings"
    - "AC2: Pydantic models validate config on load (invalid YAML raises ValidationError)"
    - "AC3: Default config ships with package and loads without arguments"
    - "AC4: Custom config path supported via load_control_mapping(path)"
  should:
    - "AC5: Helpful error messages on invalid control config"
  must_not:
    - "No evidence extraction logic (that's S479.2-4)"
    - "No report generation"

risks:
  - risk: Evidence source types may need extending beyond git/gate/session
    mitigation: Literal type is easy to extend; YAML is forward-compatible
