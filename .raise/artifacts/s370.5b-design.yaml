artifact_type: story-design
version: 1
skill: rai-story-design
created: "2026-03-06"
story: S370.5b
epic: E370
content:
  summary: >
    Decompose 25+ functions exceeding 100 lines across CLI commands (6 files),
    governance parsers (3 files), discovery scanner, hooks emitter, and MCP Jira
    adapter into focused helper functions. Each extraction preserves module
    boundaries (no file moves). The R4 global (_current_output_format) requires
    architecture analysis to remove safely.
  complexity: moderate
  type: refactoring
  acceptance_criteria:
    - id: AC1
      description: "No function exceeds 100 lines in targeted CLI command modules (init, session, signal, graph, discover, release)"
      verifiable: true
    - id: AC2
      description: "No function exceeds 100 lines in governance parsers (extractor.py, parsers/epic.py, parsers/backlog.py)"
      verifiable: true
    - id: AC3
      description: "No function exceeds 100 lines in discovery/scanner.py"
      verifiable: true
    - id: AC4
      description: "ThreadPoolExecutor in hooks/emitter.py has proper lifecycle (context manager or shared instance with shutdown)"
      verifiable: true
    - id: AC5
      description: "adapters/mcp_jira.py flat/nested branching consolidated via shared helper"
      verifiable: true
    - id: AC6
      description: "All existing tests pass (uv run pytest)"
      verifiable: true
    - id: AC7
      description: "Type checks pass (uv run pyright)"
      verifiable: true
    - id: AC8
      description: "Linting passes (uv run ruff check)"
      verifiable: true
  should_criteria:
    - id: SC1
      description: "GovernanceParser Protocol defined matching can_parse/parse interface used by 9 parser classes"
    - id: SC2
      description: "Legacy except Exception clauses in governance/extractor.py have justifying comments"
    - id: SC3
      description: "McCabe complexity <=10 for all modified functions"
  must_not_criteria:
    - id: MN1
      description: "Must NOT change public API or CLI behavior"
    - id: MN2
      description: "Must NOT move files between modules (S370.5c/d/e scope)"
    - id: MN3
      description: "Must NOT change function signatures of public APIs"
  decisions:
    - id: D1
      choice: "Extract helpers within same module, not into new files"
      rationale: >
        Minimizes import changes and merge conflicts. Each helper is private
        (underscore-prefixed) and stays close to its caller. File moves are
        S370.5c/d/e scope.
      alternatives_considered:
        - "Create helper modules per command (premature, adds import complexity)"
        - "Move to shared utils (couples unrelated commands)"
    - id: D2
      choice: "Defer R4 (_current_output_format global removal) to separate task within this story"
      rationale: >
        The global is read in __main__.py error handler which runs outside Typer
        context. Removing it requires either (a) wrapping app() in a class that
        captures format, or (b) passing format through exception attributes.
        Both need architecture analysis. Can be done as last task after
        mechanical extractions.
      alternatives_considered:
        - "Remove global first (blocks all other work on architecture question)"
        - "Defer to separate story (R4 is in scope per story definition)"
    - id: D3
      choice: "Use GovernanceParser Protocol to formalize the can_parse/parse interface"
      rationale: >
        9 parser classes already implement the same interface (can_parse + parse).
        A Protocol makes this explicit, enables static type checking, and
        documents the contract. No runtime changes needed.
      alternatives_considered:
        - "Abstract base class (adds inheritance coupling)"
        - "Leave implicit (misses documentation opportunity)"
    - id: D4
      choice: "Fix ThreadPoolExecutor by using context manager pattern"
      rationale: >
        Current code creates a new ThreadPoolExecutor per hook call and shuts it
        down with wait=False. Using a context manager (with statement) ensures
        proper cleanup. Alternative: share a single executor on the EventEmitter
        class and shut down in a cleanup method.
      alternatives_considered:
        - "Shared executor with atexit cleanup (adds complexity)"
        - "Leave as-is (resource leak on timeout scenarios)"
    - id: D5
      choice: "DRY mcp_jira.py flat/nested by extracting _extract_issue_fields helper"
      rationale: >
        _parse_issue_detail and _parse_search_results both branch on is_flat
        and extract nearly identical field sets. A shared helper reduces
        duplication and makes the format contract explicit.
      alternatives_considered:
        - "Strategy pattern (over-engineered for 2 callers)"
        - "Leave duplicated (violates DRY, both branches must stay in sync)"
    - id: D6
      choice: "Extract language-specific functions in scanner.py into helpers within the same file"
      rationale: >
        R7 calls for splitting into sub-modules but that's file movement (S370.5c scope).
        For this story, we extract the nested walk() functions and long extraction
        functions into standalone helpers within scanner.py. This alone brings
        them under 100 lines and makes future sub-module extraction trivial.
      alternatives_considered:
        - "Split into language sub-modules now (file moves are out of scope)"
