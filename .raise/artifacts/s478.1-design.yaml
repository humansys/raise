artifact: design
story: S478.1
epic: E478
title: Move pro adapters from raise_cli to rai_pro
created: "2026-03-11"
status: approved

problem: |
  Pro-only adapter code (mcp_jira.py, mcp_confluence.py, jira_sync.py) lives
  inside raise_cli, leaking enterprise code into the open-source package wheel.

value: |
  Community users get a clean install without enterprise adapter code or
  dependencies they don't need.

approach: |
  Pure file-move refactor. Move 3 source files from raise_cli to rai_pro.
  Update import paths in the moved files and their tests. No logic changes.
  Shared infrastructure (models.py, bridge.py, events.py) stays in raise_cli
  and continues to be imported from there.

files_to_move:
  - from: src/raise_cli/adapters/mcp_jira.py
    to: src/rai_pro/adapters/mcp_jira.py
  - from: src/raise_cli/adapters/mcp_confluence.py
    to: src/rai_pro/adapters/mcp_confluence.py
  - from: src/raise_cli/hooks/builtin/jira_sync.py
    to: src/rai_pro/hooks/jira_sync.py

tests_to_update:
  - path: tests/adapters/test_mcp_jira.py
    change: "Update import from raise_cli.adapters.mcp_jira to rai_pro.adapters.mcp_jira"
  - path: tests/adapters/test_mcp_confluence.py
    change: "Update import from raise_cli.adapters.mcp_confluence to rai_pro.adapters.mcp_confluence"
  - path: tests/test_hooks/test_jira_sync.py
    change: "Update import from raise_cli.hooks.builtin.jira_sync to rai_pro.hooks.jira_sync"

imports_that_stay:
  - module: raise_cli.adapters.models
    reason: Shared adapter model types (IssueRef, IssueDetail, etc.)
  - module: raise_cli.mcp.bridge
    reason: Shared MCP bridge infrastructure
  - module: raise_cli.hooks.events
    reason: Shared hook event types (HookEvent, HookResult, etc.)
  - module: raise_cli.cli.commands._resolve
    reason: Lazy import in jira_sync.py for adapter resolution

new_init_files:
  - src/rai_pro/adapters/__init__.py
  - src/rai_pro/hooks/__init__.py

acceptance_criteria:
  must:
    - All 3 source files moved to rai_pro
    - All tests pass with updated import paths
    - No raise_cli.adapters.mcp_jira or mcp_confluence imports remain in raise_cli source
    - __init__.py files exist in new rai_pro subdirectories
  must_not:
    - Change any adapter logic or behavior — pure move
    - Move shared infrastructure (models.py, bridge.py, protocols.py, events.py)

risks:
  - risk: Entry point registrations in pyproject.toml still point to raise_cli paths
    mitigation: Out of scope — separate story handles entry point updates
