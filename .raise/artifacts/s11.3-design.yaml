story: 'S11.3'
epic: 'E11'
content:
  summary: >
    Convert raise-commons to a proper uv workspace monorepo by moving raise-core
    and raise-cli to packages/ with independent pyproject.toml files, moving tests
    per-package, and updating the GitHub sync script to selective exclusion.
  complexity: moderate
  acceptance_criteria:
    - id: AC1
      description: 'packages/raise-core/ exists with own pyproject.toml, src/raise_core/, and tests/'
      verifiable: true
    - id: AC2
      description: 'packages/raise-cli/ exists with own pyproject.toml, src/raise_cli/, and tests/'
      verifiable: true
    - id: AC3
      description: 'Root pyproject.toml has no [project] section — workspace-only'
      verifiable: true
    - id: AC4
      description: 'uv sync succeeds with all workspace members'
      verifiable: true
    - id: AC5
      description: 'uv run pytest passes for all packages'
      verifiable: true
    - id: AC6
      description: 'uv run ruff check and uv run pyright pass'
      verifiable: true
    - id: AC7
      description: 'sync-github.sh excludes only proprietary packages (raise-pro, raise-server)'
      verifiable: true
  integration_points:
    - module: 'raise_core'
      change_type: modification
      files: ['packages/raise-core/pyproject.toml', 'packages/raise-core/src/raise_core/']
    - module: 'raise_cli'
      change_type: modification
      files: ['packages/raise-cli/pyproject.toml', 'packages/raise-cli/src/raise_cli/']
    - module: 'root'
      change_type: modification
      files: ['pyproject.toml']
    - module: 'sync'
      change_type: modification
      files: ['scripts/sync-github.sh']
  decisions:
    - id: D1
      choice: 'Tests per package based on import analysis'
      rationale: 'Auto leak prevention — proprietary tests excluded by directory, not manual list'
      alternatives_considered: ['Tests in root with selective sync (fragile)', 'Whitelist-only sync (still manual)']
    - id: D2
      choice: 'Root pyproject.toml keeps all tool config'
      rationale: 'Single source for ruff/pyright/pytest config, workspace-wide consistency'
      alternatives_considered: ['Per-package tool config (duplication)']
    - id: D3
      choice: 'raise-core deps: only pydantic + networkx'
      rationale: 'Verified by grep — only third-party imports in raise_core source'
      alternatives_considered: ['Include all deps (over-specification)']
    - id: D4
      choice: 'Selective sync exclusion (exclude only raise-pro and raise-server)'
      rationale: 'Minimal change to existing script, inverts what is excluded'
      alternatives_considered: ['Separate GitHub repos per OSS package (triple maintenance)', 'Whitelist include approach']
    - id: D5
      choice: 'Same version 2.3.0 for both packages initially'
      rationale: 'Matches current release, independent versioning comes later'
      alternatives_considered: ['Start raise-core at 0.1.0 (confusing for existing users)']
