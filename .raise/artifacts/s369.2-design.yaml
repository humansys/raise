story: S369.2
epic: E369
refs:
  epic_scope: work/epics/e369-open-source-audit/scope.md
  related_artifacts:
    - work/epics/e369-open-source-audit/stories/s369.2-story.md
    - work/epics/e369-open-source-audit/stories/s369.2-scope.md
content:
  summary: >
    Add project URLs to PyPI listing, remove dead tomli dependency,
    add Python 3.13 classifier, and run pip-audit vulnerability scan.
    Direct edits to pyproject.toml only.
  complexity: simple
  acceptance_criteria:
    - id: AC-1
      description: >
        [project.urls] section present with Homepage, Documentation,
        Repository, and Changelog entries.
      verifiable: true
    - id: AC-2
      description: >
        tomli dependency removed from [project.dependencies] or
        [project.optional-dependencies].
      verifiable: true
    - id: AC-3
      description: >
        Python 3.13 classifier added to [project.classifiers].
      verifiable: true
    - id: AC-4
      description: >
        pip-audit scan shows no critical/high vulnerabilities
        (or findings documented as accepted risk).
      verifiable: true
  integration_points: []
  decisions:
    - id: D-1
      choice: Direct pyproject.toml edits, no migration tooling.
      rationale: >
        Single file, 3 small changes. No tooling needed.
      alternatives_considered:
        - "automated metadata generator -- overkill for one file"
    - id: D-2
      choice: >
        Verify no runtime tomli imports before removal.
      rationale: >
        Scope doc flags this risk. Quick grep confirms safety.
      alternatives_considered: []
  components:
    - path: pyproject.toml
      action: modify
      changes: "Add [project.urls] with Homepage, Documentation, Repository, Changelog"
    - path: pyproject.toml
      action: modify
      changes: "Remove tomli from dependencies"
    - path: pyproject.toml
      action: modify
      changes: "Add Programming Language :: Python :: 3.13 classifier"
metadata:
  approach: >
    1. Grep for tomli imports to confirm no runtime usage.
    2. Edit pyproject.toml (urls, remove tomli, add classifier).
    3. Run pip-audit to check for vulnerabilities.
  no_code_changes: true
