artifact_type: story-design
version: 1
skill: rai-story-design
created: '2026-03-23T12:00:00Z'
story: 'S680.2'
epic: 'E680'
content:
  summary: >-
    Create CHANGELOG.md v2.3.0 entry in Keep a Changelog format and draft
    GitHub release notes. Source from git log v2.2.3..dev, Jira tickets,
    and epic documentation produced in S680.1.
  complexity: simple
  acceptance_criteria:
    - id: AC1
      description: CHANGELOG.md has v2.3.0 entry with Added/Changed/Fixed/Security sections
      verifiable: true
    - id: AC2
      description: Every entry traceable to a commit, ticket, or epic
      verifiable: true
    - id: AC3
      description: Keep a Changelog format compliance (## [version] - date, ### Section)
      verifiable: true
    - id: AC4
      description: Release notes draft ready at stories/s680.2-release-notes-draft.md
      verifiable: true
    - id: AC5
      description: Known issues (RAISE-539, RAISE-634, RAISE-213) documented in release notes
      verifiable: true
    - id: AC6
      description: No unreleased or v2.4.0 roadmap items included
      verifiable: true
  integration_points:
    - module: CHANGELOG.md
      change_type: modify
      files: ['CHANGELOG.md']
    - module: release-notes-draft
      change_type: new
      files: ['work/epics/e680-release-v2.3.0-prep/stories/s680.2-release-notes-draft.md']
  decisions:
    - id: D1
      choice: Keep a Changelog format with Added/Changed/Fixed/Security sections
      rationale: Industry standard, already established in existing CHANGELOG.md
      alternatives_considered: ['Conventional Changelog', 'Free-form notes']
    - id: D2
      choice: Source changes from git log + Jira + epic docs, not automated tooling
      rationale: ~200 commits need human curation to group meaningfully; automated generation deferred to parking lot
      alternatives_considered: ['git-cliff', 'conventional-changelog']
    - id: D3
      choice: Release date set to 2026-03-30 (planned release)
      rationale: Aligned with epic plan; can be updated if release date shifts
      alternatives_considered: ['Use actual release date at publish time']
