artifact_type: story-design
version: 1
skill: rai-story-design
created: '2026-03-05T12:00:00Z'
story: 'S348.2'
epic: 'E348'
content:
  summary: >
    Replace the stale CLI reference (100% deprecated rai memory namespace) with complete
    documentation for all 72 current v2.2 subcommands across 20 command groups. Multi-file
    Astro/Starlight pages organized in workflow order, agent-friendly (<5000 chars/page).
  complexity: moderate
  acceptance_criteria:
    - id: AC1
      description: All 72 current subcommands documented with description, flags, example, exit codes
      verifiable: true
    - id: AC2
      description: One .mdx file per command group (multi-file structure under docs/cli/)
      verifiable: true
    - id: AC3
      description: Deprecated rai memory and rai publish docs removed entirely
      verifiable: true
    - id: AC4
      description: Each page <5000 chars (agent-friendly, per research findings)
      verifiable: true
    - id: AC5
      description: Astro sidebar updated to list all command group pages
      verifiable: true
    - id: AC6
      description: Documented flags match rai <command> --help output exactly
      verifiable: true
  integration_points:
    - module: docs
      change_type: modification
      files:
        - 'docs/src/content/docs/docs/cli/index.mdx'
        - 'docs/astro.config.mjs'
    - module: docs
      change_type: new
      files:
        - 'docs/src/content/docs/docs/cli/init.mdx'
        - 'docs/src/content/docs/docs/cli/session.mdx'
        - 'docs/src/content/docs/docs/cli/graph.mdx'
        - 'docs/src/content/docs/docs/cli/pattern.mdx'
        - 'docs/src/content/docs/docs/cli/signal.mdx'
        - 'docs/src/content/docs/docs/cli/backlog.mdx'
        - 'docs/src/content/docs/docs/cli/skill.mdx'
        - 'docs/src/content/docs/docs/cli/discover.mdx'
        - 'docs/src/content/docs/docs/cli/adapter.mdx'
        - 'docs/src/content/docs/docs/cli/mcp.mdx'
        - 'docs/src/content/docs/docs/cli/gate.mdx'
        - 'docs/src/content/docs/docs/cli/doctor.mdx'
        - 'docs/src/content/docs/docs/cli/docs.mdx'
        - 'docs/src/content/docs/docs/cli/artifact.mdx'
        - 'docs/src/content/docs/docs/cli/release.mdx'
        - 'docs/src/content/docs/docs/cli/info.mdx'
        - 'docs/src/content/docs/docs/cli/profile.mdx'
        - 'docs/src/content/docs/docs/cli/base.mdx'
  decisions:
    - id: D1
      choice: Multi-file structure (one .mdx per command group)
      rationale: >
        Agent-friendly (<5000 chars/page), enables llms.txt linking per group,
        Starlight supports sidebar autogenerate for subdirectories
      alternatives_considered:
        - 'Single file (current) — too large for LLM context'
    - id: D2
      choice: 'Per-command format: description + flags table + examples + exit codes + see-also'
      rationale: >
        Lean but complete. Exit codes matter for scripting/CI. See-also enables
        discovery. No common-mistakes section (that lives in CLAUDE.md for agents).
      alternatives_considered:
        - 'Minimal (desc + flags only) — insufficient for scripting users'
        - 'Full (add caveats, common mistakes) — belongs in CLAUDE.md, not user docs'
    - id: D3
      choice: Remove deprecated rai memory and rai publish entirely
      rationale: No installed user base on deprecated namespace. Clean break.
      alternatives_considered:
        - 'Migration table — unnecessary, no users to migrate'
        - 'Deprecation notices — adds noise for zero benefit'
    - id: D4
      choice: Workflow order for command groups
      rationale: >
        Mirrors how users discover the CLI: init → session → graph → backlog →
        skills → release. Creates a progressive narrative.
      alternatives_considered:
        - 'Alphabetical — easy lookup but no teaching value'
        - 'Frequency-based — hard to maintain, subjective'
refs:
  backlog_item: 'RAISE-348'
  epic_scope: 'work/epics/e348-documentation-refresh/scope.md'
  gap_analysis: 'work/epics/e348-documentation-refresh/stories/s348.1-gap-analysis.md'
metadata:
  plan_impl_merged: true
  rationale: >
    Documentation story with mechanical tasks (one per command group). Plan is
    obvious — parallelize implementation during planning phase.
