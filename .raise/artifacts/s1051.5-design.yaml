story: 'S1051.5'
epic: 'E1051'
content:
  summary: >-
    Extend AdapterDoctorCheck to validate Confluence config references against
    the live backend: space_key existence (via ConfluenceDiscovery) and routing
    parent_title page existence (via client.get_page_by_title). Actionable
    fix_hints list available spaces or suggest page creation. All checks gated
    behind context.online with error isolation.
  complexity: simple
  acceptance_criteria:
    - id: AC1
      description: 'PASS when configured space_key exists on live instance'
      verifiable: true
    - id: AC2
      description: 'ERROR with available spaces list when space_key is missing'
      verifiable: true
    - id: AC3
      description: 'PASS for each routing parent_title that exists on instance'
      verifiable: true
    - id: AC4
      description: 'ERROR with page title and space for each missing routing parent'
      verifiable: true
    - id: AC5
      description: 'Discovery/client exceptions produce ERROR, never crash doctor'
      verifiable: true
    - id: AC6
      description: 'Routing parent checks skipped when space check fails'
      verifiable: true
    - id: AC7
      description: 'Check IDs follow adapter-confluence-* naming convention'
      verifiable: true
  integration_points:
    - module: 'doctor.checks.adapters'
      change_type: modification
      files: ['packages/raise-cli/src/raise_cli/doctor/checks/adapters.py']
    - module: 'tests.doctor.checks.test_adapters'
      change_type: modification
      files: ['packages/raise-cli/tests/doctor/checks/test_adapters.py']
  decisions:
    - id: D1
      choice: 'Inline checks as private methods in existing AdapterDoctorCheck'
      rationale: 'Class already handles Confluence; 2 methods (~40 LOC) maintain cohesion'
      alternatives_considered: ['Separate ConfluenceDoctorCheck class', 'ConfluenceDiscovery.validate() method']
    - id: D2
      choice: 'ConfluenceDiscovery for space check, client.get_page_by_title for parent pages'
      rationale: 'Discovery wraps space lookup with ConfluenceNotFoundError (includes available spaces). get_page_by_title is simpler for existence check than full tree traversal.'
      alternatives_considered: ['client.get_spaces() directly', 'Build full SpaceMap for both']
    - id: D3
      choice: 'Skip routing parent checks when space check fails'
      rationale: 'Cascading errors are confusing; if space is wrong, parent pages cannot exist in it'
      alternatives_considered: ['Run all checks independently']
