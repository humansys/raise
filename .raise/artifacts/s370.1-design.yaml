artifact_type: story-design
version: 1
skill: rai-story-design
created: "2026-03-06"
story: S370.1
epic: E370
content:
  summary: >
    Codify 5-dimension code quality framework as governance draft with concrete
    verifiable criteria. Each criterion has What/How/Why triple and is classified
    as Tool-Verifiable or Human-Judgment. Synthesizes 24 sources and 8 triangulated
    claims from research into an actionable governance artifact.
  complexity: moderate
  acceptance_criteria:
    - id: AC1
      description: "Document exists at .raise/governance/code-standards-draft.md"
      verifiable: true
    - id: AC2
      description: "All 5 dimensions covered with specific criteria (not platitudes)"
      verifiable: true
    - id: AC3
      description: "Each criterion has What/How/Why triple"
      verifiable: true
    - id: AC4
      description: "Criteria classified as Tool-Verifiable or Human-Judgment"
      verifiable: true
    - id: AC5
      description: "Architecture dimension references ADR-001 layer model"
      verifiable: true
  should_criteria:
    - id: SC1
      description: "Criteria map to specific Ruff rules where applicable"
    - id: SC2
      description: "Include AI-generated tells as anti-patterns to check"
  must_not_criteria:
    - id: MN1
      description: "Must NOT be prescriptive about implementation details"
    - id: MN2
      description: "Must NOT be final -- explicitly marked as DRAFT"
  integration_points:
    - module: governance
      change_type: new
      files:
        - ".raise/governance/code-standards-draft.md"
  decisions:
    - id: D1
      choice: "DRAFT status -- standard evolves from practice"
      rationale: >
        Cannot know which criteria matter until we audit real code (S370.4).
        Premature finalization risks criteria that don't match codebase reality.
      alternatives_considered:
        - "Final standard from research alone"
        - "No standard -- ad hoc review"
    - id: D2
      choice: "Tool-Verifiable vs Human-Judgment classification"
      rationale: >
        Enables S370.2 (tooling) to know what to automate and S370.3 (skill)
        to know what to evaluate manually. Clear separation of concerns between
        machine-checkable rules and human review items.
      alternatives_considered:
        - "Single flat checklist"
        - "Separate tool config and review guide"
    - id: D3
      choice: "What/How/Why triple for every criterion"
      rationale: >
        What: makes the criterion concrete and unambiguous.
        How: makes it actionable (tool command or review step).
        Why: traces back to research sources for credibility.
        Without all three, criteria become vague platitudes.
      alternatives_considered:
        - "Simple rule list without rationale"
        - "Detailed prose per dimension without structured criteria"
    - id: D4
      choice: "5 dimensions match research report structure exactly"
      rationale: >
        The research already organized 24 sources into 5 coherent dimensions
        with triangulated claims. Changing the structure would lose traceability
        to evidence.
      alternatives_considered:
        - "Reorganize by tool (Ruff section, Pyright section, manual section)"
        - "Reorganize by severity (critical, important, nice-to-have)"
  components:
    - path: .raise/governance/code-standards-draft.md
      action: create
      changes: >
        New governance document. 5 dimension sections, each with numbered criteria.
        Each criterion has What/How/Why/Verifiable-by structure. Header marks
        document as DRAFT. References ADR-001 and ADR-002 where applicable.
