    - work/epics/e350-experience-portability/stories/s350.1-scope.md
content:
  summary: >
    Systematic audit and classification of every artifact that constitutes
    the Rai experience. Produces a classification document mapping each
    file/directory to one of four portability layers (base, project,
    personal, derived) with distribution mechanism and mixed-concern flags.
    Foundation for all other E350 stories.
  complexity: simple
  acceptance_criteria:
    - id: AC-1
      description: >
        Every file/directory that affects Rai behavior is listed in the
        classification document, verified by glob/grep audit against actual
        file tree.
      verifiable: true
    - id: AC-2
      description: >
        Each artifact is classified as exactly one of: base, project,
        personal, or derived.
      verifiable: true
    - id: AC-3
      description: >
        At least one artifact exists in each of the four layers, and layer
        definitions are documented with clear boundaries.
      verifiable: true
    - id: AC-4
      description: >
        Artifacts with mixed concerns are flagged with a note and resolution
        recommendation.
      verifiable: true
    - id: AC-5
      description: >
        Classification document exists at the expected path
        (work/epics/e350-experience-portability/stories/s350.1-classification.md).
      verifiable: true
    - id: AC-6
      description: No code changes in this story — documentation only.
      verifiable: true
  integration_points: []
  decisions:
    - id: D-1
      choice: >
        Use four layers: base (ships with package), project (git-tracked shared),
        personal (per-developer git-ignored), derived (generated/regenerable).
      rationale: >
        Matches ADR-044 architecture and the three-level pattern model design.
        The "derived" layer is essential to distinguish artifacts that should
        be regenerated from those that are source-of-truth.
      alternatives_considered:
        - "Three layers without 'derived' — rejected because generated artifacts need distinct handling"
        - "Five layers with 'organization' — rejected as premature per ADR-044"
    - id: D-2
      choice: >
        Classification document is a markdown table, not YAML or JSON.
      rationale: >
        Human readability is the primary goal — this document will be reviewed
        by humans and referenced by all subsequent stories. Markdown tables
        are scannable and diff-friendly.
      alternatives_considered:
        - "YAML inventory — machine-readable but harder to scan visually"
        - "JSON manifest — overkill for a documentation-only deliverable"
    - id: D-3
      choice: >
        Flag mixed-concern artifacts inline in the table with a dedicated
        "Issues" column rather than a separate section.
      rationale: >
        Keeps the flag co-located with the artifact it describes. Easier to
        spot and act on when reading the table sequentially.
      alternatives_considered:
        - "Separate 'Issues' section at bottom — loses context proximity"
metadata:
  approach: >
    Systematic filesystem audit of .raise/, .claude/, src/rai_cli/skills_base/,
    src/rai_cli/identity/, CLAUDE.md, and .gitignore. Walk every relevant
    directory, identify every file/config that affects Rai behavior, classify
    into the four layers.
  examples_provided: true
  no_code_changes: true
