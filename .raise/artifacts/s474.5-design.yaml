content:
  summary: 'Document the CI=Skills parity guardrail: CI pipeline and local gates check the same things via manifest.yaml. Single governance doc plus cross-reference in gate-code.md.'
  complexity: simple
  acceptance_criteria:
    - id: AC1
      description: 'CI=Skills parity principle documented as a governance guardrail'
      verifiable: true
    - id: AC2
      description: 'Explains how gates read commands from manifest.yaml'
      verifiable: true
    - id: AC3
      description: 'Explains how to add or modify gate commands'
      verifiable: true
    - id: AC4
      description: 'References the pre-commit hook (S474.4)'
      verifiable: true
    - id: AC5
      description: 'Document is discoverable and linked from gate-code.md'
      verifiable: true
  integration_points:
    - module: 'governance/guardrails'
      change_type: new
      files: ['.raise/governance/guardrails/ci-skills-parity.md']
    - module: 'gates/gate-code'
      change_type: modification
      files: ['.raise/gates/gate-code.md']
  decisions:
    - id: D1
      choice: 'Place in .raise/governance/guardrails/ (new directory)'
      rationale: 'Governance guardrails are distinct from gate definitions'
      alternatives_considered: ['docs/guardrails/', '.raise/gates/']
    - id: D2
      choice: 'Document known asymmetries explicitly'
      rationale: 'Prevents confusion about intentional differences between pre-commit, CI, and rai gate check'
      alternatives_considered: ['Only document the happy path']
    - id: D3
      choice: 'No CLAUDE.md update'
      rationale: 'Guardrail is a governance artifact, discoverable via directory structure'
      alternatives_considered: ['Add to CLAUDE.md critical rules']
