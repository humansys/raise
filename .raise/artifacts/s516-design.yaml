story: 'RAISE-516'
epic: 'RAISE-144'
content:
  summary: >
    Move raise-core from packages/raise-core/ into src/raise_core/ to eliminate
    uv workspace pattern. Fixes GitHub CI failure and simplifies project structure.
  complexity: moderate
  acceptance_criteria:
    - id: AC1
      description: src/raise_core/ exists with all modules from packages/raise-core/
      verifiable: true
    - id: AC2
      description: packages/raise-core/ is deleted
      verifiable: true
    - id: AC3
      description: No [tool.uv.workspace] or [tool.uv.sources] in pyproject.toml
      verifiable: true
    - id: AC4
      description: uv run pytest passes (all tests green)
      verifiable: true
    - id: AC5
      description: uv run pyright passes (no new errors)
      verifiable: true
  integration_points:
    - module: raise_core
      change_type: modification
      files:
        - packages/raise-core/src/raise_core/ -> src/raise_core/
    - module: build-config
      change_type: modification
      files:
        - pyproject.toml
    - module: sync
      change_type: modification
      files:
        - scripts/sync-github.sh
  decisions:
    - id: D1
      choice: Move into src/ alongside raise_cli (flat sibling)
      rationale: >
        raise-core and raise-cli are always released together. The workspace
        pattern adds complexity for no value. src/ is already in the Python path.
      alternatives_considered:
        - Keep workspace but patch pyproject.toml during sync (rejected: fragile)
        - Merge raise_core modules into raise_cli (rejected: different domain boundaries)
    - id: D2
      choice: Zero import changes needed
      rationale: >
        All imports use from raise_core.X which resolves via src/ being in
        sys.path. Physical location changes, logical module path stays the same.
      alternatives_considered:
        - Rename to raise_cli.core.* (rejected: unnecessary churn, breaks API)
    - id: D3
      choice: Remove raise-core from dependencies entirely
      rationale: >
        It was only a dependency because it was a separate workspace package.
        Now it's part of the same package tree — no dependency declaration needed.
      alternatives_considered:
        - Keep as vendored dependency (rejected: over-engineering)
