artifact_type: story-design
version: 1
skill: rai-story-design
created: "2026-03-06"
story: S370.3
epic: E370
content:
  summary: >
    Create /rai-code-audit skill as SKILL.md in skills_base. The skill systematically
    evaluates codebase modules against code-standards-draft.md, focusing on the 15
    HUMAN-only and 11 BOTH criteria that tooling (Ruff, Pyright, import-linter)
    cannot enforce. Produces per-module scorecards with severity-categorized findings.
  complexity: moderate
  acceptance_criteria:
    - id: AC1
      description: "Skill file exists at src/raise_cli/skills_base/rai-code-audit/SKILL.md"
      verifiable: true
    - id: AC2
      description: "Covers all 5 dimensions (D1-D5) with focus on HUMAN/BOTH criteria"
      verifiable: true
    - id: AC3
      description: "Produces per-module scorecard with severity-categorized findings"
      verifiable: true
    - id: AC4
      description: "Groups evaluation by ADR-001 architectural layer"
      verifiable: true
    - id: AC5
      description: "uv run rai skill validate rai-code-audit passes"
      verifiable: true
  should_criteria:
    - id: SC1
      description: "References code-standards-draft.md criteria IDs (D1.1, D2.6, etc.)"
    - id: SC2
      description: "Includes guidance on what to skip (TOOL-only criteria)"
  must_not_criteria:
    - id: MN1
      description: "Must NOT duplicate /rai-quality-review (diff-based, story-level)"
    - id: MN2
      description: "Must NOT evaluate TOOL-only criteria already enforced by S370.2 gates"
  integration_points:
    - module: skills_base
      change_type: new
      files:
        - "src/raise_cli/skills_base/rai-code-audit/SKILL.md"
  decisions:
    - id: D1
      choice: "Evaluate by ADR-001 architectural layer, not alphabetically"
      rationale: >
        Grouping by layer (Presentation, Application, Domain, Core) enables
        pattern detection within layers — e.g., all CLI commands share similar
        issues, all engines share domain purity concerns. Alphabetical order
        loses this structural insight.
      alternatives_considered:
        - "Alphabetical by module name"
        - "By dimension (all D1 first, then D2, etc.)"
    - id: D2
      choice: "HUMAN + BOTH criteria only — skip TOOL-only"
      rationale: >
        S370.2 already enforces TOOL-only criteria via Ruff, Pyright, and
        import-linter. Re-evaluating them in an AI skill wastes inference
        and produces duplicate findings. For BOTH criteria, evaluate only
        the HUMAN judgment portion.
      alternatives_considered:
        - "Evaluate all 37 criteria including TOOL"
        - "Only HUMAN criteria, skip BOTH entirely"
    - id: D3
      choice: "Findings reference specific file:line like quality-review"
      rationale: >
        Actionable findings require precise location. quality-review established
        this convention; code-audit should be consistent.
      alternatives_considered:
        - "Module-level findings without line references"
    - id: D4
      choice: "Simple pass/partial/fail per dimension, not numeric scores"
      rationale: >
        Numeric scores (e.g., 7.5/10) create false precision. pass/partial/fail
        communicates whether action is needed without implying quantitative rigor
        that a judgment-based review cannot provide.
      alternatives_considered:
        - "Numeric score per dimension (1-10)"
        - "Letter grades (A-F)"
  components:
    - path: src/raise_cli/skills_base/rai-code-audit/SKILL.md
      action: create
      changes: >
        New skill file. YAML frontmatter with metadata, markdown body with
        Purpose, Mastery Levels, Context, Steps (5 steps: scope identification,
        layer grouping, per-module evaluation, findings generation, scorecard
        aggregation), Output format, Quality Checklist, References.
  differences_from_quality_review:
    quality_review: "Story-level, diff-based, catches semantic bugs in changed files"
    code_audit: "Codebase-level, module-based, evaluates against governance standard"
refs:
  backlog_item: null
  epic_scope: work/epics/e370-code-beauty-standards/scope.md
  related_artifacts:
    - work/epics/e370-code-beauty-standards/stories/s370.3-story.md
    - work/epics/e370-code-beauty-standards/stories/s370.3-scope.md
    - .raise/governance/code-standards-draft.md
    - src/raise_cli/skills_base/rai-quality-review/SKILL.md
    - src/raise_cli/skills_base/rai-architecture-review/SKILL.md
