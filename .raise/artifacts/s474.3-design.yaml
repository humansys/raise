      choice: 'Keep reportUnknownMemberType=false'
      rationale: 'Third-party libs without stubs cause false positives'
      alternatives_considered: ['Enable it']
    - id: D4
      choice: 'Do not add import-linter to CI (S474.5 scope)'
      rationale: 'Avoid scope creep; verify locally only'
      alternatives_considered: ['Add to CI now']
