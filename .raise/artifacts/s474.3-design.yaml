      description: 'Ruff config includes ANN and D rule families'
      verifiable: true
    - id: AC2
      description: 'McCabe max-complexity set to 10'
      verifiable: true
    - id: AC3
      description: 'ruff check src/ tests/ exits 0 with expanded rules'
      verifiable: true
    - id: AC4
      description: 'pyright exits 0 in strict mode'
      verifiable: true
    - id: AC5
      description: 'lint-imports exits 0'
      verifiable: true
    - id: AC6
      description: 'Audit results document lists all 5 dimensions with pass/fail/deferred'
      verifiable: true
    - id: AC7
      description: 'All deferred items have written justification'
      verifiable: true
