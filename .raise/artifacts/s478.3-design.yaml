id: s478.3-design
story: S478.3
epic: E478
type: design
status: complete
created: "2026-03-11"

title: "Clean pro-specific CLI logic — lean spec"

problem: |
  src/raise_cli/cli/commands/adapters.py contains a hardcoded `rai adapter status`
  command (lines 258-367) with Jira-specific helpers: _JIRA_ENV_VARS constant,
  _check_jira_config() function, and status_command() that only checks Jira env
  vars and config. This couples the community CLI to a specific pro adapter.

approach:
  d1_remove_status_command:
    description: "Remove `rai adapter status` command and Jira-specific helpers"
    file: src/raise_cli/cli/commands/adapters.py
    changes:
      - "Delete _JIRA_ENV_VARS constant (lines 263-267)"
      - "Delete _check_jira_config() function (lines 270-295)"
      - "Delete status_command() (lines 298-367)"
      - "Remove unused import: os"
    rationale: |
      Status checking is a nice-to-have diagnostic. If needed in future, it
      should be a protocol method (health()/status()) on each adapter, not
      hardcoded Jira logic in the community CLI.

  d2_assess_other_references:
    description: "Evaluate remaining Jira/Confluence references in raise_cli source"
    findings:
      acceptable:
        - "backlog/sync.py — docstring 'e.g., Jira' (generic example)"
        - "mcp/bridge.py — docstring 'e.g. jira_get_issue' (generic example)"
        - "adapters/protocols.py — docstring 'JQL for Jira' (protocol docs)"
        - "adapters/models.py — example 'e.g., jira' (generic)"
        - "cli/commands/backlog.py — help text 'JQL for Jira' (adapter-specific format docs)"
        - "governance/parsers/backlog.py — comments about Jira link parsing (generic parser)"
      contextual:
        - "onboarding/instructions.py — generates CLAUDE.md; gated on jira.yaml existence"
        - "hooks/builtin/backlog.py — _JiraConfig, lifecycle sync; reads jira.yaml"
        - "doctor/checks/project.py — checks jira.yaml existence"
        - "tier/context.py — JIRA_INTEGRATION feature flag"
        - "skills_base/*.md — workflow instructions mentioning Jira"
      verdict: |
        The 'acceptable' references are adapter-agnostic examples in docstrings/help text.
        The 'contextual' references (hooks, doctor, onboarding, tier, skills) read
        .raise/jira.yaml which is a user-provided config file — the logic is
        configuration-driven, not hardcoded to Jira internals. These are out of
        scope for this XS story but should be tracked for future cleanup (E478
        follow-up stories).

decisions:
  - id: D-478.3-1
    decision: "Remove `rai adapter status` command entirely"
    rationale: "Hardcoded Jira-specific, not generic. Future: adapter.health() protocol method."

  - id: D-478.3-2
    decision: "Keep docstring/help-text Jira examples (backlog, protocols, bridge)"
    rationale: "These are adapter-agnostic examples, not coupling."

  - id: D-478.3-3
    decision: "Defer hooks/doctor/onboarding/tier Jira references to future stories"
    rationale: "Config-driven logic, not hardcoded. Bigger scope than XS."

acceptance_criteria:
  - "Zero Jira-specific logic in adapters.py (status command removed)"
  - "rai adapter list/check/validate still work"
  - "All tests, types, lint pass"
