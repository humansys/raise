artifact: design
story: S479.2
epic: E479
title: "Git evidence extractor with subprocess + date range filtering"
created: "2026-03-14"
status: draft

problem: |
  No automated way to extract ISO 27001 evidence from git history.
  Teams manually copy-paste git logs into audit spreadsheets.

value: |
  Covers 3+ Annex A.8 controls (A.8.4, A.8.9, A.8.32) with traceable
  EvidenceItem instances extracted from existing git data. Eliminates
  manual evidence collection for git-sourced controls.

approach: |
  Create an evidence extractor that:
  1. Reads ControlMapping to identify controls with type: "git" evidence sources
  2. Calls git via subprocess to extract commits, tags, branches, merge commits
  3. Maps extracted data to EvidenceItem Pydantic model instances
  4. Supports date range filtering for audit periods

  Git commands used:
  - git log --format for commits and merge commits
  - git tag --format for version tags
  - git branch -a --format for branch naming patterns

components:
  create:
    - path: src/raise_cli/compliance/evidence.py
      purpose: "EvidenceItem Pydantic model shared across all extractors"
    - path: src/raise_cli/compliance/extractors/__init__.py
      purpose: "Extractors package init"
    - path: src/raise_cli/compliance/extractors/git.py
      purpose: "GitEvidenceExtractor — subprocess git calls + date range filtering"
    - path: tests/unit/compliance/extractors/__init__.py
      purpose: "Test package init"
    - path: tests/unit/compliance/extractors/test_git.py
      purpose: "Unit tests for git evidence extraction"

models:
  EvidenceItem:
    fields:
      - name: control_id
        type: str
        description: "ISO control ID (e.g. A.8.32)"
      - name: control_name
        type: str
        description: "Human-readable control name"
      - name: evidence_type
        type: 'Literal["git", "gate", "session"]'
        description: "Evidence source category"
      - name: title
        type: str
        description: "Short evidence title"
      - name: description
        type: str
        description: "Detailed evidence description"
      - name: timestamp
        type: datetime
        description: "When the evidence was produced"
      - name: source_ref
        type: str
        description: "Commit hash, tag name, branch name, etc."
      - name: url
        type: "str | None"
        description: "Optional link to remote (e.g. GitHub commit URL)"

extractor_api:
  class: GitEvidenceExtractor
  constructor:
    - name: repo_path
      type: Path
      description: "Path to the git repository root"
  methods:
    - name: extract
      params:
        - name: mapping
          type: ControlMapping
        - name: start_date
          type: date
        - name: end_date
          type: date
      returns: "list[EvidenceItem]"
      description: "Extract all git evidence for controls in the mapping within the date range"

git_commands:
  commits: 'git log --after={start} --before={end} --format="%H|%an|%aI|%s"'
  tags: 'git tag --sort=-creatordate --format="%(refname:short)|%(creatordate:iso-strict)|%(subject)"'
  branches: 'git branch -a --format="%(refname:short)|%(committerdate:iso-strict)"'
  merge_commits: 'git log --merges --after={start} --before={end} --format="%H|%an|%aI|%s"'

control_evidence_mapping:
  - control: "A.8.4"
    extractors: [commits]
    evidence_for: "Source code access patterns via commit authors"
  - control: "A.8.9"
    extractors: [commits, branches, tags]
    evidence_for: "Configuration management via versioning discipline"
  - control: "A.8.32"
    extractors: [commits, merge_commits]
    evidence_for: "Change management via commit history and review process"

acceptance_criteria:
  must:
    - "AC1: EvidenceItem Pydantic model created and shared across all extractors"
    - "AC2: GitEvidenceExtractor extracts commits as evidence for A.8.32 and A.8.9"
    - "AC3: GitEvidenceExtractor extracts tags as evidence for A.8.9"
    - "AC4: GitEvidenceExtractor extracts merge commits as evidence for A.8.32"
    - "AC5: Date range filtering works (start_date, end_date params)"
  should:
    - "AC6: Branch extraction for workflow discipline evidence (A.8.9)"
  must_not:
    - "No report generation (that's S479.5)"
    - "No gate or session extraction (S479.3, S479.4)"

risks:
  - risk: "Git subprocess calls may behave differently across OS/git versions"
    mitigation: "Use standard --format options; test with mock subprocess"
  - risk: "Large repositories may produce many commits"
    mitigation: "Date range filtering limits scope; pagination not needed for v1"

dependencies:
  - "S479.1 (ControlMapping, ControlConfig, EvidenceSourceConfig models)"
