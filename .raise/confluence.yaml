# instances.<name>.url: Confluence base URL
# instances.<name>.space_key: target space
# instances.<name>.routing: artifact type → parent page + labels
#
default_instance: humansys
instances:
  humansys:
    url: https://humansys.atlassian.net/wiki
    space_key: RaiSE1
    instance_name: humansys
    routing:
      adr:
        parent_title: Architecture
        labels:
        - adr
        - architecture
      developer:
        parent_title: Developer Docs
        labels:
        - developer-docs
      roadmap:
        parent_title: Product
        labels:
        - roadmap
      retrospective:
        parent_title: Work
        labels:
        - retrospective
