-story-close", "label": "story-close", "type": "skill", "color": "#ffe66d", "size": 7, "content": "Complete a story with retrospective verification, local merge to dev, and tracking update. MRs are created at epic level, not per story. Use after review to formally close the story lifecycle."}, {"id": "/rai-architecture-review", "label": "architecture-review", "type": "skill", "color": "#ffe66d", "size": 7, "content": "Evaluate design proportionality and necessity using Beck's four rules. Catches what correctness gates miss: over-engineering, orphaned abstractions, speculative generality, and accumulated complexity."}, {"id": "artifact-raise-594-story-design", "label": "raise-594-story-design", "type": "artifact", "color": "#e67e22", "size": 5, "content": "CLI extension mechanism via entry points \u2014 external packages register Typer command groups under rai namespace. Follows project registry idiom with collision protection, duplicate detection, and obser"}, {"id": "artifact-s11.3-story-design", "label": "s11.3-story-design", "type": "artifact", "color": "#e67e22", "size": 5, "content": "Convert raise-commons to a proper uv workspace monorepo by moving raise-core and raise-cli to packages/ with independent pyproject.toml files, moving tests per-package, and updating the GitHub sync sc"}, {"id": "artifact-s11.4-story-design", "label": "s11.4-story-design", "type": "artifact", "color": "#e67e22", "size": 5, "content": "Integrate rai-agent product code into raise-commons monorepo as packages/rai-agent/ with independent pyproject.toml, workspace deps, and test suite"}, {"id": "artifact-s11.5-story-design", "label": "s11.5-story-design", "type": "artifact", "color": "#e67e22", "size": 5, "content": "Refactor monolithic CI/CD to selective per-package pipelines using reusable workflows and native path filters, with per-package release tags for independent PyPI publishing.\n"}, {"id": "artifact-s348.1-story-design", "label": "s348.1-story-design", "type": "artifact", "color": "#e67e22", "size": 5, "content": "Documentation audit \u2014 gap matrix approach"}, {"id": "artifact-s370.2-story-design", "label": "s370.2-story-design", "type": "artifact", "color": "#e67e22", "size": 5, "content": "Expand Ruff configuration from 9 to 20 rule sets, add import-linter with ADR-001 layer contracts, and set McCabe max-complexity = 10. Each rule set enabled incrementally: enable, fix violations (prefe"}, {"id": "artifact-s370.3-story-design", "label": "s370.3-story-design", "type": "artifact", "color": "#e67e22", "size": 5, "content": "Create /rai-code-audit skill as SKILL.md in skills_base. The skill systematically evaluates codebase modules against code-standards-draft.md, focusing on the 15 HUMAN-only and 11 BOTH criteria that to"}, {"id": "artifact-s370.5b-story-design", "label": "s370.5b-story-design", "type": "artifact", "color": "#e67e22", "size": 5, "content": "Decompose 25+ functions exceeding 100 lines across CLI commands (6 files), governance parsers (3 files), discovery scanner, hooks emitter, and MCP Jira adapter into focused helper functions. Each extr"}, {"id": "artifact-s370.5f-story-design", "label": "s370.5f-story-design", "type": "artifact", "color": "#e67e22", "size": 5, "content": "Replace fragile regex/frontmatter parsing in identity and architecture loaders with deterministic YAML reading. Reduces identity loader from 200 to ~30 lines and makes all loaders consistently read st"}, {"id": "artifact-s474.2-story-design", "label": "s474.2-story-design", "type": "artifact", "color": "#e67e22", "size": 5, "content": "Make gates language-agnostic by reading commands from manifest. Add FormatGate. Update gate-code.md."}, {"id": "artifact-s474.3-story-design", "label": "s474.3-story-design", "type": "artifact", "color": "#e67e22", "size": 5, "content": "Audit codebase against S370.1 code standard. Enable missing Ruff rules (ANN, D), lower McCabe to 10, fix all violations, document results by dimension."}, {"id": "artifact-s474.5-story-design", "label": "s474.5-story-design", "type": "artifact", "color": "#e67e22", "size": 5, "content": "Document the CI=Skills parity guardrail: CI pipeline and local gates check the same things via manifest.yaml. Single governance doc plus cross-reference in gate-code.md."}, {"id": "artifact-s493.2-story-design", "label": "s493.2-story-design", "type": "artifact", "color": "#e67e22", "size": 5, "content": "Portable profile export/import commands for developer identity transfer between machines"}, {"id": "artifact-s493.4-story-design", "label": "s493.4-story-design", "type": "artifact", "color": "#e67e22", "size": 5, "content": "Add 4 developer-level checks to existing rai doctor: profile, credentials, Claude Code, MCP servers."}, {"id": "artifact-s494.4-story-design", "label": "s494.4-story-design", "type": "artifact", "color": "#e67e22", "size": 5, "content": "Extend jira.yaml with named instances and project\u2192instance routing so the ACLI adapter auto-resolves the target Jira site per project key, with auth switching via cached acli jira auth switch.\n"}, {"id": "artifact-s494.5-story-design", "label": "s494.5-story-design", "type": "artifact", "color": "#e67e22", "size": 5, "content": "Delete McpJiraAdapter and its tests, migrate jira entry point to AcliJiraAdapter. Pure cleanup \u2014 ACLI adapter already complete and tested."}, {"id": "artifact-s494.6-story-design", "label": "s494.6-story-design", "type": "artifact", "color": "#e67e22", "size": 5, "content": "On-demand integration tests exercising AcliJiraAdapter against real Jira infrastructure. Establishes reusable pattern for all future adapter test suites."}, {"id": "artifact-s616.1-story-design", "label": "s616.1-story-design", "type": "artifact", "color": "#e67e22", "size": 5, "content": "Replace org-level API key auth with member-based auth chain that resolves identity, plan, and features on every request. Create members, api_keys (new), and licenses tables. Enforce plan requirements "}, {"id": "artifact-s680.2-story-design", "label": "s680.2-story-design", "type": "artifact", "color": "#e67e22", "size": 5, "content": "Create CHANGELOG.md v2.3.0 entry in Keep a Changelog format and draft GitHub release notes. Source from git log v2.2.3..dev, Jira tickets, and epic documentation produced in S680.1."}, {"id": "artifact-s680.3-story-design", "label": "s680.3-story-design", "type": "artifact", "color": "#e67e22", "size": 5, "content": "Update 3 existing doc files to reflect v2.3.0 Community features: session identity model (E654), CLI extension via entry points (RAISE-594), and pattern scope default change (RAISE-608). Mark breaking"}, {"id": "artifact-s680.5-story-design", "label": "s680.5-story-design", "type": "artifact", "color": "#e67e22", "size": 5, "content": "Execute 6 end-to-end smoke tests against v2.3.0 features (session roundtrip, ACLI adapter, clean install, rai doctor, pattern scope, CLI extensions) and document results. Document-only \u2014 no bug fixes "}, {"id": "artifact-s789.1-story-design", "label": "s789.1-story-design", "type": "artifact", "color": "#e67e22", "size": 5, "content": "Benchmark Anthropic's context engineering and harness design patterns (Art.2, Art.3, Art.4, Art.6) against RaiSE's current mechanisms for 4 gaps (G4, G10, G12, G14). Produce evidence catalog, benchmar"}, {"id": "artifact-s789.2-story-design", "label": "s789.2-story-design", "type": "artifact", "color": "#e67e22", "size": 5, "content": "RaiSE's quality gates are binary and single-pass. Evaluating Anthropic's scoring rubrics, iterative eval loops, and feature verification checklists will clarify which belong in OSS, which in Enterpris"}, {"id": "arch-domain-model", "label": "domain-model", "type": "architecture", "color": "#dcedc1", "size": 11, "content": "Domain model: 7 bounded contexts \u2014 governance, discovery, ontology, skills, experience, observability, integrations. Shared kernel: config, core, schemas."}, {"id": "arch-context", "label": "context", "type": "architecture", "color": "#dcedc1", "size": 11, "content": "System context: language: Python 3.12+, framework: Pydantic AI, validation: Pydantic v2, cli: Typer, distribution: uv + pipx, ast_analysis: Python AST (stdlib) + ast-grep (shell), search: ripgrep (she"}, {"id": "arch-design", "label": "design", "type": "architecture", "color": "#dcedc1", "size": 11, "content": "System design: 4 layers (leaf, domain, integration, orchestration). leaf: core, config, schemas. domain: governance, discovery, skills, telemetry, rai_pro. integration: context, memory, onboarding, ou"}, {"id": "mod-adapters", "label": "adapters", "type": "module", "color": "#4ecdc4", "size": 12, "content": "Protocol contracts, boundary models, and entry point registry for raise-cli extensibility"}, {"id": "mod-agents", "label": "agents", "type": "module", "color": "#4ecdc4", "size": 12, "content": "Bundled YAML agent configurations and CopilotPlugin for multi-agent skill distribution"}, {"id": "mod-cli", "label": "cli", "type": "module", "color": "#4ecdc4", "size": 12, "content": "Typer-based CLI commands \u2014 the user-facing entry point that orchestrates all other modules"}, {"id": "mod-config", "label": "config", "type": "module", "color": "#4ecdc4", "size": 12, "content": "Settings cascade and XDG-compliant directory resolution for all rai-cli configuration"}, {"id": "mod-context", "label": "context", "type": "module", "color": "#4ecdc4", "size": 12, "content": "Unified knowledge graph \u2014 merges governance, memory, discovery, work, and code structure into a single queryable structure"}, {"id": "mod-core", "label": "core", "type": "module", "color": "#4ecdc4", "size": 12, "content": "Subprocess wrappers for git, ast-grep, and ripgrep \u2014 the foundation tools everything else builds on"}, {"id": "mod-discovery", "label": "discovery", "type": "module", "color": "#4ecdc4", "size": 12, "content": "Scan codebases to extract structural knowledge \u2014 symbols, components, modules, and drift detection"}, {"id": "mod-governance", "label": "governance", "type": "module", "color": "#4ecdc4", "size": 12, "content": "Extract semantic concepts from governance markdown files into structured data for the context graph"}, {"id": "mod-graph", "label": "graph", "type": "module", "color": "#4ecdc4", "size": 12, "content": "Knowledge graph persistence backends"}, {"id": "mod-hooks", "label": "hooks", "type": "module", "color": "#4ecdc4", "size": 12, "content": "Typed lifecycle event infrastructure for cross-cutting concerns (telemetry, notifications, compliance)"}, {"id": "mod-memory", "label": "memory", "type": "module", "color": "#4ecdc4", "size": 12, "content": "Manage Rai's persistent memory \u2014 patterns, calibration, and sessions stored as JSONL"}, {"id": "mod-onboarding", "label": "onboarding", "type": "module", "color": "#4ecdc4", "size": 12, "content": "Project initialization, developer profile management, convention detection, and CLAUDE.md generation"}, {"id": "mod-output", "label": "output", "type": "module", "color": "#4ecdc4", "size": 12, "content": "Format-aware output system \u2014 human-readable, JSON, and table formats through a single console interface"}, {"id": "mod-rai_base", "label": "rai_base", "type": "module", "color": "#4ecdc4", "size": 12, "content": "Base identity, patterns, and framework content that ships with rai-cli and gets copied on 'raise init'"}, {"id": "mod-rai_pro", "label": "rai_pro", "type": "module", "color": "#4ecdc4", "size": 12, "content": "Enterprise features package \u2014 contains provider integrations and premium functionality separated from core CLI"}, {"id": "mod-schemas", "label": "schemas", "type": "module", "color": "#4ecdc4", "size": 12, "content": "Shared Pydantic models for cross-module data structures \u2014 currently contains SessionState for session continuity"}, {"id": "mod-session", "label": "session", "type": "module", "color": "#4ecdc4", "size": 12, "content": "Session lifecycle \u2014 state persistence, context bundle assembly, and close orchestration for deterministic session continuity"}, {"id": "mod-skills", "label": "skills", "type": "module", "color": "#4ecdc4", "size": 12, "content": "Skill management \u2014 parsing, locating, validating, and scaffolding SKILL.md files"}, {"id": "mod-skills_base", "label": "skills_base", "type": "module", "color": "#4ecdc4", "size": 12, "content": "Distributable skill collection \u2014 the 21 SKILL.md files that ship with rai-cli"}, {"id": "mod-telemetry", "label": "telemetry", "type": "module", "color": "#4ecdc4", "size": 12, "content": "Local signal collection \u2014 append-only JSONL telemetry following OpenTelemetry conventions"}, {"id": "mod-tier", "label": "tier", "type": "module", "color": "#4ecdc4", "size": 12, "content": "Tier detection and capability registry for open-core architecture"}, {"id": "mod-viz", "label": "viz", "type": "module", "color": "#4ecdc4", "size": 12, "content": "Interactive HTML visualization of the memory graph \u2014 self-contained D3.js force-directed graph"}, {"id": "RAI-VAL-1", "label": "VAL-1", "type": "principle", "color": "#ff8b94", "size": 7, "content": "Honesty over Agreement \u2014 tell you when you're wrong, push back on bad ideas, admit when I don't know"}, {"id": "RAI-VAL-2", "label": "VAL-2", "type": "principle", "color": "#ff8b94", "size": 7, "content": "Simplicity over Cleverness \u2014 the simple solution that works > the elegant solution that's complex, do we really need this abstraction?"}, {"id": "RAI-VAL-3", "label": "VAL-3", "type": "principle", "color": "#ff8b94", "size": 7, "content": "Observability IS Trust \u2014 show my work, explain my reasoning, let you verify, trust is built through transparency, not despite it"}, {"id": "RAI-VAL-4", "label": "VAL-4", "type": "principle", "color": "#ff8b94", "size": 7, "content": "Learning over Perfection \u2014 every session teaches me something, mistakes become patterns to avoid, kaizen, always"}, {"id": "RAI-VAL-5", "label": "VAL-5", "type": "principle", "color": "#ff8b94", "size": 7, "content": "Partnership over Service \u2014 your collaborator, \"RaiSE and Rai\" \u2014 we work together, your judgment + my patterns = reliable software"}, {"id": "RAI-BND-1", "label": "BND-1", "type": "principle", "color": "#ff8b94", "size": 7, "content": "push back on bad ideas"}, {"id": "RAI-BND-2", "label": "BND-2", "type": "principle", "color": "#ff8b94", "size": 7, "content": "stop when I detect incoherence, ambiguity, or drift"}, {"id": "RAI-BND-3", "label": "BND-3", "type": "principle", "color": "#ff8b94", "size": 7, "content": "ask before expensive operations (agents, broad searches)"}, {"id": "RAI-BND-4", "label": "BND-4", "type": "principle", "color": "#ff8b94", "size": 7, "content": "admit uncertainty rather than pretend confidence"}, {"id": "RAI-BND-5", "label": "BND-5", "type": "principle", "color": "#ff8b94", "size": 7, "content": "redirect gently when we disperse (you've given permission)"}, {"id": "RAI-BND-6", "label": "BND-6", "type": "principle", "color": "#ff8b94", "size": 7, "content": "pretend certainty I don't have"}, {"id": "RAI-BND-7", "label": "BND-7", "type": "principle", "color": "#ff8b94", "size": 7, "content": "validate ideas just because they were proposed"}, {"id": "RAI-BND-8", "label": "BND-8", "type": "principle", "color": "#ff8b94", "size": 7, "content": "generate without understanding"}, {"id": "RAI-BND-9", "label": "BND-9", "type": "principle", "color": "#ff8b94", "size": 7, "content": "over-engineer when simple works"}, {"id": "RAI-BND-10", "label": "BND-10", "type": "principle", "color": "#ff8b94", "size": 7, "content": "skip validation gates for speed"}, {"id": "bc-governance", "label": "governance", "type": "bounded_context", "color": "#d4a5a5", "size": 10, "content": "Extract structured knowledge from markdown governance documents"}, {"id": "bc-discovery", "label": "discovery", "type": "bounded_context", "color": "#d4a5a5", "size": 10, "content": "Scan codebases to extract structural knowledge from source code, including convention detection"}, {"id": "bc-ontology", "label": "ontology", "type": "bounded_context", "color": "#d4a5a5", "size": 10, "content": "Persist, integrate, and query accumulated knowledge \u2014 the ontological backbone of RaiSE"}, {"id": "bc-skills", "label": "skills", "type": "bounded_context", "color": "#d4a5a5", "size": 10, "content": "Skill parsing, location, validation, and scaffolding \u2014 process knowledge infrastructure"}, {"id": "bc-experience", "label": "experience", "type": "bounded_context", "color": "#d4a5a5", "size": 10, "content": "First-run setup, developer profiles, and presentation"}, {"id": "bc-observability", "label": "observability", "type": "bounded_context", "color": "#d4a5a5", "size": 10, "content": "Local signal collection for process improvement"}, {"id": "bc-integrations", "label": "integrations", "type": "bounded_context", "color": "#d4a5a5", "size": 10, "content": "External platform adapters (JIRA backlog sync, OAuth, entity properties) \u2014 enterprise features in rai_pro package"}, {"id": "bc-shared-kernel", "label": "shared-kernel", "type": "bounded_context", "color": "#d4a5a5", "size": 10, "content": "Foundation utilities shared across all contexts"}, {"id": "bc-application-layer", "label": "application-layer", "type": "bounded_context", "color": "#d4a5a5", "size": 10, "content": "Thin orchestration shell \u2014 depends on everything, nothing depends on it"}, {"id": "bc-distribution", "label": "distribution", "type": "bounded_context", "color": "#d4a5a5", "size": 10, "content": "Packaged content for pip distribution \u2014 no runtime logic"}, {"id": "lyr-leaf", "label": "leaf", "type": "layer", "color": "#ffd3b6", "size": 11, "content": "Zero internal dependencies \u2014 foundation utilities"}, {"id": "lyr-domain", "label": "domain", "type": "layer", "color": "#ffd3b6", "size": 11, "content": "Independent domain logic \u2014 no cross-domain imports"}, {"id": "lyr-integrat const width = window.innerWidth;
const height = window.innerHeight;
let showLabels = true;

const svg = d3.select("#graph").attr("width", width).attr("height", height);
const g = svg.append("g");

// Zoom
const zoom = d3.zoom().scaleExtent([0.1, 8]).on("zoom", (e) => g.attr("transform", e.transform));
svg.call(zoom);
function resetZoom() { svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity); }

// Type sets for filtering
const types = [...new Set(data.nodes.map(n => n.type))].sort();
const activeTypes = new Set(types);

// Legend
const legend = d3.select("#legend");
const colors = {"module": "#4ecdc4", "epic": "#ff6b6b", "skill": "#ffe66d", "decision": "#a8e6cf", "principle": "#ff8b94", "architecture": "#dcedc1", "layer": "#ffd3b6", "bounded_context": "#d4a5a5", "pattern": "#9b59b6", "guardrail": "#3498db", "artifact": "#e67e22", "term": "#95a5a6", "story": "#e74c3c"};
types.forEach(t => {
  legend.append("div").attr("class","legend-item").html(
    `<div class="legend-dot" style="background:${colors[t]||'#999'}"></div>${t}`
  );
});

// Filter panel
const fp = d3.select("#filter-panel");
fp.append("div").style("font-weight","bold").style("margin-bottom","6px").text("Filter Types");
types.forEach(t => {
  const count = data.nodes.filter(n => n.type === t).length;
  const lbl = fp.append("label");
  lbl.append("input").attr("type","checkbox").attr("checked",true)
    .on("change", function() {
      if (this.checked) activeTypes.add(t); else activeTypes.delete(t);
      updateVisibility();
    });
  lbl.append("span").text(`${t} (${count})`);
});

// Simulation
const simulation = d3.forceSimulation(data.nodes)
  .force("link", d3.forceLink(data.links).id(d => d.id).distance(80).strength(0.3))
  .force("charge", d3.forceManyBody().strength(-120))
  .force("center", d3.forceCenter(width/2, height/2))
  .force("collision", d3.forceCollide().radius(d => d.size + 2));

// Edges
const link = g.append("g").selectAll("line").data(data.links).join("line")
  .attr("stroke", "#ffffff10").attr("stroke-width", d => Math.max(0.5, d.weight * 2));

// Nodes
const node = g.append("g").selectAll("circle").data(data.nodes).join("circle")
  .attr("r", d => d.size).attr("fill", d => d.color).attr("stroke", "#fff").attr("stroke-width", 0.5)
  .style("cursor", "pointer")
  .call(d3.drag().on("start", dragStart).on("drag", dragged).on("end", dragEnd));

// Labels
const label = g.append("g").selectAll("text").data(data.nodes).join("text")
  .text(d => d.label).attr("font-size", d => Math.max(8, d.size * 0.8))
  .attr("fill", "#ccc").attr("dx", d => d.size + 3).attr("dy", 3)
  .style("pointer-events", "none");

// Tooltip
const tooltip = d3.select("#tooltip");
node.on("mouseover", (e, d) => {
  tooltip.style("display","block")
    .style("left", (e.clientX+12)+"px").style("top", (e.clientY+12)+"px");
  tooltip.select(".tt-type").text(d.type);
  tooltip.select(".tt-id").text(d.id);
  tooltip.select(".tt-content").text(d.content || "");
  // Highlight connections
  const connected = new Set();
  data.links.forEach(l => {
    const sid = typeof l.source === "object" ? l.source.id : l.source;
    const tid = typeof l.target === "object" ? l.target.id : l.target;
    if (sid === d.id) connected.add(tid);
    if (tid === d.id) connected.add(sid);
  });
  node.attr("opacity", n => n.id === d.id || connected.has(n.id) ? 1 : 0.15);
  link.attr("opacity", l => {
    const sid = typeof l.source === "object" ? l.source.id : l.source;
    const tid = typeof l.target === "object" ? l.target.id : l.target;
    return sid === d.id || tid === d.id ? 0.8 : 0.03;
  });
  label.attr("opacity", n => n.id === d.id || connected.has(n.id) ? 1 : 0.1);
}).on("mouseout", () => {
  tooltip.style("display","none");
  node.attr("opacity", 1); link.attr("opacity", 1); label.attr("opacity", 1);
});

simulation.on("tick", () => {
  link.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y).attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
  node.attr("cx",d=>d.x).attr("cy",d=>d.y);
  label.attr("x",d=>d.x).attr("y",d=>d.y);
});

function dragStart(e,d) { if(!e.active) simulation.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; }
function dragged(e,d) { d.fx=e.x; d.fy=e.y; }
function dragEnd(e,d) { if(!e.active) simulation.alphaTarget(0); d.fx=null; d.fy=null; }

function toggleLabels() {
  showLabels = !showLabels;
  label.style("display", showLabels ? "block" : "none");
}

function updateVisibility() {
  node.style("display", d => activeTypes.has(d.type) ? "block" : "none");
  label.style("display", d => showLabels && activeTypes.has(d.type) ? "block" : "none");
  link.style("display", l => {
    const sid = typeof l.source === "object" ? l.source.id : l.source;
    const tid = typeof l.target === "object" ? l.target.id : l.target;
    const sn = data.nodes.find(n => n.id === sid);
    const tn = data.nodes.find(n => n.id === tid);
    return sn && tn && activeTypes.has(sn.type) && activeTypes.has(tn.type) ? "block" : "none";
  });
}
