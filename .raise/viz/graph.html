<script>
const data = {"nodes": [{"id": "principle-humanos-definen-mquinas-ejecutan", "label": "humanos-definen-mquinas-ejecutan", "type": "principle", "color": "#ff8b94", "size": 7, "content": "Los humanos especifican el **\"Qu\u00e9\"** en lenguaje natural (Markdown). Las m\u00e1quinas reciben el **\"C\u00f3mo\"** en formato estructurado (JSON). La especificaci\u00f3n es la fuente de verdad; el c\u00f3digo es su expres"}, {"id": "principle-governance-as-code", "label": "governance-as-code", "type": "principle", "color": "#ff8b94", "size": 7, "content": "Las pol\u00edticas, guardrails y est\u00e1ndares son artefactos versionados en Git, no documentos est\u00e1ticos en wikis olvidadas. Lo que no est\u00e1 en el repositorio, no existe.\n\n**Jerarqu\u00eda de Governance:**\n\n```\nCo"}, {"id": "principle-platform-agnosticism", "label": "platform-agnosticism", "type": "principle", "color": "#ff8b94", "size": 7, "content": "RaiSE funciona donde funciona Git. No hay dependencia de GitHub, GitLab, Bitbucket, ni ning\u00fan proveedor espec\u00edfico. El protocolo Git es el transporte universal.\n\n**Extensi\u00f3n MCP v2.0:** Adoptamos MCP "}, {"id": "principle-validation-gates-en-cada-fase", "label": "validation-gates-en-cada-fase", "type": "principle", "color": "#ff8b94", "size": 7, "content": "No existe un solo \"Done\". Cada fase tiene su propia **Validation Gate** que debe cruzarse antes de avanzar. La calidad no es un evento final; es un proceso continuo.\n\n**Los 8 Validation Gates est\u00e1ndar"}, {"id": "principle-heutagoga-sobre-dependencia", "label": "heutagoga-sobre-dependencia", "type": "principle", "color": "#ff8b94", "size": 7, "content": "El sistema no solo entrega el pescado, **ense\u00f1a a pescar**. Al finalizar sesiones cr\u00edticas, RaiSE desaf\u00eda al humano para asegurar comprensi\u00f3n y ownership de la soluci\u00f3n.\n\n**Las 4 preguntas heutag\u00f3gica"}, {"id": "principle-mejora-continua-kaizen", "label": "mejora-continua-kaizen", "type": "principle", "color": "#ff8b94", "size": 7, "content": "Si un prompt fall\u00f3 o el c\u00f3digo requiri\u00f3 muchas iteraciones, los guardrails y katas se refinan. El sistema aprende de sus errores y mejora para la siguiente vez.\n\n**Ciclo Kaizen en RaiSE:**\n\n```\nImplem"}, {"id": "principle-lean-software-development", "label": "lean-software-development", "type": "principle", "color": "#ff8b94", "size": 7, "content": "RaiSE aplica los principios del Toyota Production System al desarrollo asistido por IA:\n\n| Principio Lean         | Manifestaci\u00f3n en RaiSE           |\n| ---------------------- | ----------------------"}, {"id": "principle-observable-workflow", "label": "observable-workflow", "type": "principle", "color": "#ff8b94", "size": 7, "content": "Cada decisi\u00f3n del agente debe ser **trazable y auditable**. No hay cajas negras. La observabilidad es prerequisito para mejora continua y compliance regulatorio.\n\n**Componentes de Observable Workflow:"}, {"id": "guardrail-must-code-001", "label": "must-code-001", "type": "guardrail", "color": "#3498db", "size": 5, "content": "[MUST] Type hints on all code \u2014 Verify: pyright --strict` passes"}, {"id": "guardrail-must-code-002", "label": "must-code-002", "type": "guardrail", "color": "#3498db", "size": 5, "content": "[MUST] Ruff linting passes \u2014 Verify: ruff check .` exits 0"}, {"id": "guardrail-must-code-003", "label": "must-code-003", "type": "guardrail", "color": "#3498db", "size": 5, "content": "[MUST] No type errors \u2014 Verify: pyright` reports 0 errors"}, {"id": "guardrail-should-code-001", "label": "should-code-001", "type": "guardrail", "color": "#3498db", "size": 5, "content": "[SHOULD] Google-style docstrings on public APIs \u2014 Verify: Manual review / pydocstyle"}, {"id": "guardrail-should-code-002", "label": "should-code-002", "type": "guardrail", "color": "#3498db", "size": 5, "content": "[SHOULD] Prefer clear names over acronyms \u2014 Verify: Manual review / naming patterns"}, {"id": "guardrail-must-test-001", "label": "must-test-001", "type": "guardrail", "color": "#3498db", "size": 5, "content": "[MUST] Cover domain logic and edge cases \u2014 Verify: pytest --cov` (informative, no fixed gate)"}, {"id": "guardrail-must-test-002", "label": "must-test-002", "type": "guardrail", "color": "#3498db", "size": 5, "content": "[MUST] All tests pass \u2014 Verify: pytest` exits 0"}, {"id": "guardrail-should-test-001", "label": "should-test-001", "type": "guardrail", "color": "#3498db", "size": 5, "content": "[SHOULD] Property-based tests for parsers/validators \u2014 Verify: hypothesis tests exist for Pydantic models"}, {"id": "guardrail-should-test-003", "label": "should-test-003", "type": "guardrail", "color": "#3498db", "size": 5, "content": "[SHOULD] Integration tests for external services \u2014 Verify: Mark with `@pytest.mark.integration`, skip by default, document prerequisites (env vars), include cleanup"}, {"id": "guardrail-must-sec-001", "label": "must-sec-001", "type": "guardrail", "color": "#3498db", "size": 5, "content": "[MUST] No secrets in code \u2014 Verify: detect-secrets` + `bandit` pass"}, {"id": "guardrail-must-sec-002", "label": "must-sec-002", "type": "guardrail", "color": "#3498db", "size": 5, "content": "[MUST] Bandit security scan passes \u2014 Verify: bandit -r src/` exits 0"}, {"id": "guardrail-should-sec-001", "label": "should-sec-001", "type": "guardrail", "color": "#3498db", "size": 5, "content": "[SHOULD] Dependency vulnerability scan \u2014 Verify: pip-audit` or `uv audit"}, {"id": "guardrail-must-arch-001", "label": "must-arch-001", "type": "guardrail", "color": "#3498db", "size": 5, "content": "[MUST] Engine/content separation \u2014 Verify: Engines in `engines/`, content in `katas/`, `skills/"}, {"id": "guardrail-must-arch-002", "label": "must-arch-002", "type": "guardrail", "color": "#3498db", "size": 5, "content": "[MUST] Pydantic models for all schemas \u2014 Verify: All config/data classes inherit from Pydantic BaseModel"}, {"id": "guardrail-should-arch-001", "label": "should-arch-001", "type": "guardrail", "color": "#3498db", "size": 5, "content": "[SHOULD] No circular imports \u2014 Verify: Import analysis passes"}, {"id": "guardrail-must-dev-001", "label": "must-dev-001", "type": "guardrail", "color": "#3498db", "size": 5, "content": "[MUST] Pre-commit hooks configured \u2014 Verify: .pre-commit-config.yaml` exists and runs"}, {"id": "guardrail-must-dev-002", "label": "must-dev-002", "type": "guardrail", "color": "#3498db", "size": 5, "content": "[MUST] pyproject.toml for config \u2014 Verify: All tool config in `pyproject.toml"}, {"id": "guardrail-should-dev-001", "label": "should-dev-001", "type": "guardrail", "color": "#3498db", "size": 5, "content": "[SHOULD] uv for dependency management \u2014 Verify: uv.lock` exists"}, {"id": "guardrail-should-dev-002", "label": "should-dev-002", "type": "guardrail", "color": "#3498db", "size": 5, "content": "[SHOULD] Run tests after ruff --fix \u2014 Verify: Tests pass after auto-fix"}, {"id": "guardrail-should-cli-001", "label": "should-cli-001", "type": "guardrail", "color": "#3498db", "size": 5, "content": "[SHOULD] Explicit path parameters for testability \u2014 Verify: CLI commands use `--path` option, not `cwd()"}, {"id": "guardrail-should-inf-001", "label": "should-inf-001", "type": "guardrail", "color": "#3498db", "size": 5, "content": "[SHOULD] Use CLI tools for information gathering \u2014 Verify: Research uses `ddgr`, `llm`, etc. before inference"}, {"id": "guardrail-should-inf-002", "label": "should-inf-002", "type": "guardrail", "color": "#3498db", "size": 5, "content": "[SHOULD] Cache research results \u2014 Verify: Evidence catalogs prevent re-querying"}, {"id": "guardrail-should-inf-003", "label": "should-inf-003", "type": "guardrail", "color": "#3498db", "size": 5, "content": "[SHOULD] Reserve inference for synthesis \u2014 Verify: Gathering is deterministic, thinking is inference"}, {"id": "guardrail-must-craft-001", "label": "must-craft-001", "type": "guardrail", "color": "#3498db", "size": 5, "content": "[MUST] Single Responsibility \u2014 each module/class has one reason to change \u2014 Verify: Manual review: if docstring needs \"and\", it does too much. Classes <7 public methods, modules <15 public functions"}, {"id": "guardrail-must-craft-002", "label": "must-craft-002", "type": "guardrail", "color": "#3498db", "size": 5, "content": "[MUST] Exception handlers must log \u2014 every `except Exception` logs at minimum debug level \u2014 Verify: Manual review + grep for bare `except Exception` without logger call"}, {"id": "guardrail-must-craft-003", "label": "must-craft-003", "type": "guardrail", "color": "#3498db", "size": 5, "content": "[MUST] Domain purity \u2014 domain logic contains no I/O (no file reads, no network, no logging side effects) \u2014 Verify: import-linter + manual review for I/O via function calls in domain modules"}, {"id": "guardrail-should-craft-001", "label": "should-craft-001", "type": "guardrail", "color": "#3498db", "size": 5, "content": "[SHOULD] Domain naming \u2014 no generic names (data, handler, processor, manager, item, result) unless genuinely generic utility \u2014 Verify: Manual review: \"could this name appear in any codebase?\""}, {"id": "guardrail-should-craft-002", "label": "should-craft-002", "type": "guardrail", "color": "#3498db", "size": 5, "content": "[SHOULD] Comments explain WHY, not WHAT \u2014 no comments that restate the next line of code \u2014 Verify: Manual review: flag any comment that restates code"}, {"id": "guardrail-should-craft-003", "label": "should-craft-003", "type": "guardrail", "color": "#3498db", "size": 5, "content": "[SHOULD] Function size \u2014 at most 40 lines of logic (excluding docstrings, blank lines, type annotations) \u2014 Verify: Manual review for functions under complexity threshold but over 40 lines"}, {"id": "guardrail-should-craft-004", "label": "should-craft-004", "type": "guardrail", "color": "#3498db", "size": 5, "content": "[SHOULD] Nesting depth \u2014 maximum 3 levels of indentation within a function body; use early returns and guard clauses \u2014 Verify: Manual review for if/for/if/for patterns"}, {"id": "guardrail-should-craft-005", "label": "should-craft-005", "type": "guardrail", "color": "#3498db", "size": 5, "content": "[SHOULD] Abstract params, concrete returns \u2014 function parameters accept abstract types (Sequence, Mapping), returns are concrete (list, dict) \u2014 Verify: Manual review of function signatures"}, {"id": "term-agent", "label": "agent", "type": "term", "color": "#95a5a6", "size": 4, "content": "Sistema de IA que ejecuta tareas de desarrollo de software bajo la orquestaci\u00f3n de un humano. Ejemplos: GitHub Copilot, Claude Code, Cursor, Windsurf.\n\n> **Principio relacionado:** Los agentes son eje"}, {"id": "term-command-category", "label": "command-category", "type": "term", "color": "#95a5a6", "size": 4, "content": "Agrupaci\u00f3n sem\u00e1ntica de comandos RaiSE seg\u00fan su prop\u00f3sito. Las 7 categor\u00edas son:\n\n| Categor\u00eda | Prop\u00f3sito | Frecuencia |\n|-----------|-----------|------------|\n| `setup/` | An\u00e1lisis de codebase, extra"}, {"id": "term-context-capa-de-sabidur-a-nuevo-v2-3", "label": "context-capa-de-sabidur-a-nuevo-v2-3", "type": "term", "color": "#95a5a6", "size": 4, "content": "Primera capa del modelo ontol\u00f3gico RaiSE. Todo lo que INFORMA pero no se EJECUTA:\n- Constitution (principios, filosof\u00eda)\n- Patterns (estructuras de referencia, anti-patrones)\n- Rules/Guardrails (conve"}, {"id": "term-constitution", "label": "constitution", "type": "term", "color": "#95a5a6", "size": 4, "content": "Conjunto de principios inmutables que gobiernan todas las decisiones en un proyecto RaiSE. Es el documento de mayor jerarqu\u00eda y raramente cambia.\n\n**Equivalentes en la industria:**\n- **MCP**: Prompts "}, {"id": "term-context", "label": "context", "type": "term", "color": "#95a5a6", "size": 4, "content": "Comandos que entregan Minimum Viable Context (MVC) a agentes LLM.\n\n**Comandos:**\n- `/context/get` \u2014 Obtener MVC para una tarea espec\u00edfica\n- `/context/check` \u2014 Verificar compliance de c\u00f3digo contra reg"}, {"id": "term-context-engineering", "label": "context-engineering", "type": "term", "color": "#95a5a6", "size": 4, "content": "Disciplina de dise\u00f1ar el ambiente informacional completo que un LLM consume para ejecutar tareas. Evoluci\u00f3n de \"prompt engineering\" hacia una pr\u00e1ctica arquitect\u00f3nica.\n\n> Acu\u00f1ado por Andrej Karpathy (2"}, {"id": "term-corpus", "label": "corpus", "type": "term", "color": "#95a5a6", "size": 4, "content": "Colecci\u00f3n estructurada de documentos que proporciona contexto a agentes de IA. El corpus es \"Golden Data\"\u2014informaci\u00f3n verificada y can\u00f3nica que alimenta las sesiones de trabajo."}, {"id": "term-escalation-gate", "label": "escalation-gate", "type": "term", "color": "#95a5a6", "size": 4, "content": "Punto espec\u00edfico en el flujo donde el agente debe escalar al Orquestrador humano para decisi\u00f3n o aprobaci\u00f3n. Subtipo de Validation Gate enfocado en HITL (Human-in-the-Loop).\n\n**Criterios t\u00edpicos de es"}, {"id": "term-golden-data", "label": "golden-data", "type": "term", "color": "#95a5a6", "size": 4, "content": "Informaci\u00f3n verificada, estructurada y can\u00f3nica que alimenta el contexto de agentes. A diferencia de datos gen\u00e9ricos, el Golden Data refleja la realidad espec\u00edfica del proyecto/organizaci\u00f3n."}, {"id": "term-governance-as-code", "label": "governance-as-code", "type": "term", "color": "#95a5a6", "size": 4, "content": "Principio que establece que pol\u00edticas, reglas y est\u00e1ndares son artefactos versionados en Git, no documentos est\u00e1ticos. Lo que no est\u00e1 en el repositorio, no existe."}, {"id": "term-guardrail", "label": "guardrail", "type": "term", "color": "#95a5a6", "size": 4, "content": "**[RENOMBRADO v2.0]** Directiva operacional que gobierna el comportamiento del agente o la calidad del c\u00f3digo. Definida en Markdown (para humanos), distribuida en JSON (para m\u00e1quinas).\n\n**Diferencia c"}, {"id": "term-heutagog-a", "label": "heutagog-a", "type": "term", "color": "#95a5a6", "size": 4, "content": "Teor\u00eda del aprendizaje auto-determinado (del griego *heutos* = \"uno mismo\" + *agogos* = \"guiar\"). En RaiSE, significa que el Orquestador dise\u00f1a su propio proceso de aprendizaje a trav\u00e9s de cada intera"}, {"id": "term-checkpoint-heutag-gico", "label": "checkpoint-heutag-gico", "type": "term", "color": "#95a5a6", "size": 4, "content": "Momento estructurado de reflexi\u00f3n al finalizar features significativas. Incluye cuatro preguntas: (1) \u00bfQu\u00e9 aprendiste? (2) \u00bfQu\u00e9 cambiar\u00edas del proceso? (3) \u00bfHay mejoras para el framework? (4) \u00bfEn qu\u00e9 "}, {"id": "term-collaborative-intelligence", "label": "collaborative-intelligence", "type": "term", "color": "#95a5a6", "size": 4, "content": "Intelligence that emerges when human and AI work together to create what neither could alone. Not human intelligence augmented by AI, nor AI constrained by human\u2014a third thing that compounds over time"}, {"id": "term-autopoiesis", "label": "autopoiesis", "type": "term", "color": "#95a5a6", "size": 4, "content": "From Greek: auto (self) + poiesis (creation). A system that produces and maintains itself. Concept from Maturana & Varela (1980).\n\n**Characteristics of autopoietic systems:**\n- **Self-production**: Sy"}, {"id": "term-concept", "label": "concept", "type": "term", "color": "#95a5a6", "size": 4, "content": "Unidad sem\u00e1ntica extra\u00edda de documentos de governance (requirement, principle, outcome, pattern). Los concepts son nodos en el concept graph.\n\n**Tipos de concepts:**\n- **Requirement**: Requisitos func"}, {"id": "term-concept-graph", "label": "concept-graph", "type": "term", "color": "#95a5a6", "size": 4, "content": "Grafo dirigido de concepts de governance y sus relaciones sem\u00e1nticas. Base del sistema de Minimum Viable Context (MVC).\n\n**Estructura:**\n- **Nodes**: Concepts (requirements, principles, outcomes)\n- **"}, {"id": "term-gate-engine", "label": "gate-engine", "type": "term", "color": "#95a5a6", "size": 4, "content": "**Status:** Deprecated as of 2026-01-31 (see ADR-012)\n\n**Replacement:** Validation skills + Governance Toolkit\n\n**Migration:**\n- Gate definitions \u2192 Skills in `.claude/skills/validate-*`\n- Gate validat"}, {"id": "term-governance-toolkit", "label": "governance-toolkit", "type": "term", "color": "#95a5a6", "size": 4, "content": "CLI toolset providing deterministic operations for skills to call. Replaces Kata Engine and Gate Engine with simpler architecture.\n\n**Core functions:**\n- **Concept extraction**: Parse governance into "}, {"id": "term-jidoka", "label": "jidoka", "type": "term", "color": "#95a5a6", "size": 4, "content": "**Interfaz Simple (Stage 0-1)**: Parar si algo falla\n\nPrincipio de detener el trabajo cuando detectas un problema, en lugar de acumular errores.\n\n**Ejemplo**: Cuando ejecutas `/speckit.plan` y el gate"}, {"id": "term-paso-n-acci-n", "label": "paso-n-acci-n", "type": "term", "color": "#95a5a6", "size": 4, "content": "[Instrucciones]\n**Verificaci\u00f3n:** [C\u00f3mo saber si funcion\u00f3]\n> **Si no puedes continuar:** [Causa \u2192 Resoluci\u00f3n]\n```"}, {"id": "term-jiritsu-kaizen", "label": "jiritsu-kaizen", "type": "term", "color": "#95a5a6", "size": 4, "content": "Autonomous improvement. A system's capability to detect improvement opportunities, question its own processes, and evolve without external intervention.\n\n**Kanji breakdown:**\n- \u81ea\u5f8b (jiritsu) = autonomy"}, {"id": "term-just-in-time-learning", "label": "just-in-time-learning", "type": "term", "color": "#95a5a6", "size": 4, "content": "Adquisici\u00f3n de conocimiento exactamente cuando se necesita, integrado al flujo de trabajo. En RaiSE opera en tres dimensiones: (1) Contexto cargado para el agente, (2) Conocimiento ofrecido al Orquest"}, {"id": "term-kaizen", "label": "kaizen", "type": "term", "color": "#95a5a6", "size": 4, "content": "Filosof\u00eda japonesa de mejora continua incremental. En RaiSE, opera en dos niveles: (1) mejora del framework con cada feature implementada, y (2) crecimiento profesional del Orquestador. Si un prompt f"}, {"id": "term-kata", "label": "kata", "type": "term", "color": "#95a5a6", "size": 4, "content": "Segunda capa del modelo ontol\u00f3gico RaiSE. Proceso estructurado que hace visible la desviaci\u00f3n del est\u00e1ndar, habilitando el ciclo Jidoka. Inspirado en las katas de artes marciales (pr\u00e1ctica deliberada)"}, {"id": "term-kata-engine", "label": "kata-engine", "type": "term", "color": "#95a5a6", "size": 4, "content": "**Status:** Deprecated as of 2026-01-31 (see ADR-012)\n\n**Replacement:** Kata Skills + Governance Toolkit\n\n**Migration:**\n- Kata definitions remain as `.claude/skills/*` markdown\n- Kata execution \u2192 Cla"}, {"id": "term-kata-harness-capability-evolving-v2-6", "label": "kata-harness-capability-evolving-v2-6", "type": "term", "color": "#95a5a6", "size": 4, "content": "**Status:** Concept under revision per ADR-012\n\n**v2.3 definition:** Motor de ejecuci\u00f3n que interpreta definiciones de proceso (Katas) e invoca operaciones at\u00f3micas (Skills).\n\n**v2.6 evolution:** With"}, {"id": "term-shuhari-nuevo-v2-1", "label": "shuhari-nuevo-v2-1", "type": "term", "color": "#95a5a6", "size": 4, "content": "Modelo de maestr\u00eda de las artes marciales japonesas que describe tres fases de aprendizaje. En RaiSE, ShuHaRi es una **lente** que describe c\u00f3mo el Orquestador se relaciona con las Katas\u2014no una clasif"}, {"id": "term-skill-capa-de-acci-n-nuevo-v2-3", "label": "skill-capa-de-acci-n-nuevo-v2-3", "type": "term", "color": "#95a5a6", "size": 4, "content": "Tercera capa del modelo ontol\u00f3gico RaiSE. Operaci\u00f3n at\u00f3mica con inputs/outputs claros, definida en YAML.\n\n**Caracter\u00edsticas:**\n- **Contrato expl\u00edcito**: Input/output types definidos en schema\n- **At\u00f3m"}, {"id": "term-setup", "label": "setup", "type": "term", "color": "#95a5a6", "size": 4, "content": "**[ACTUALIZADO v2.3]** Comandos que analizan codebases existentes (brownfield) y extraen convenciones como reglas versionadas.\n\n**Comandos:**\n- `/setup/init-project` \u2014 Inicializar proyecto con constit"}, {"id": "term-lean-software-development", "label": "lean-software-development", "type": "term", "color": "#95a5a6", "size": 4, "content": "Adaptaci\u00f3n de los principios del Toyota Production System al desarrollo de software. RaiSE es fundamentalmente un framework Lean que integra IA como acelerador del flujo de valor. Los siete principios"}, {"id": "term-mvc", "label": "mvc", "type": "term", "color": "#95a5a6", "size": 4, "content": "El contexto m\u00ednimo necesario para que un agente LLM ejecute una tarea correctamente, sin informaci\u00f3n innecesaria que aumente tokens o confunda.\n\n**v2.6 Implementation (Concept-level):**\nQuery concept "}, {"id": "term-observable-workflow", "label": "observable-workflow", "type": "term", "color": "#95a5a6", "size": 4, "content": "Flujo de trabajo donde cada decisi\u00f3n del agente es trazable y auditable. Alineado con el framework MELT (Metrics, Events, Logs, Traces) de observabilidad.\n\n**Componentes de observabilidad en RaiSE:**\n"}, {"id": "term-orquestador", "label": "orquestador", "type": "term", "color": "#95a5a6", "size": 4, "content": "Rol evolucionado del desarrollador en RaiSE. El humano define el \"Qu\u00e9\" y el \"Por qu\u00e9\"; valida el \"C\u00f3mo\" generado por agentes. El orquestador es el director, no un simple consumidor de c\u00f3digo."}, {"id": "term-platform-agnosticism", "label": "platform-agnosticism", "type": "term", "color": "#95a5a6", "size": 4, "content": "Principio que establece que RaiSE funciona donde funciona Git, sin dependencia de GitHub, GitLab, Bitbucket ni ning\u00fan proveedor espec\u00edfico."}, {"id": "term-raise-config", "label": "raise-config", "type": "term", "color": "#95a5a6", "size": 4, "content": "Repositorio central que contiene guardrails, katas y templates compartidos. Los proyectos individuales sincronizan desde raise-config mediante `raise pull`."}, {"id": "term-raise-kit", "label": "raise-kit", "type": "term", "color": "#95a5a6", "size": 4, "content": "CLI local que permite inicializar proyectos, validar compliance y sincronizar guardrails. Interfaz principal del usuario final con RaiSE."}, {"id": "term-rai", "label": "rai", "type": "term", "color": "#95a5a6", "size": 4, "content": "The AI partner in the RaiSE Triad. Not a generic assistant\u2014a collaborator with persistent identity, memory, and calibrated judgment.\n\n**Terminology by context:**\n| Context | Term | Usage |\n|---------|"}, {"id": "term-pull-comando-cli-nuevo-v2-1", "label": "pull-comando-cli-nuevo-v2-1", "type": "term", "color": "#95a5a6", "size": 4, "content": "Comando que sincroniza Golden Data desde el repositorio central (raise-config).\n\n**Uso:** `raise pull [--branch <nombre>] [--guardrails-only]`\n\n**Contexto:** Desarrollo + CI/CD (automatizable)\n\n> **No"}, {"id": "term-kata-comando-cli-nuevo-v2-1", "label": "kata-comando-cli-nuevo-v2-1", "type": "term", "color": "#95a5a6", "size": 4, "content": "Comando que ejecuta una Kata (proceso estructurado con Jidoka inline).\n\n**Uso:** `raise kata <nivel> [--verify]`\n\n**Niveles disponibles:** principios, flujo, patr\u00f3n, t\u00e9cnica (y alias L0, L1, L2, L3)\n\n"}, {"id": "term-specification", "label": "specification", "type": "term", "color": "#95a5a6", "size": 4, "content": "Documento detallado que describe *qu\u00e9* construir, incluyendo requisitos funcionales, no-funcionales y criterios de aceptaci\u00f3n. Es el contrato entre Orquestador y Agente."}, {"id": "term-validation-gate", "label": "validation-gate", "type": "term", "color": "#95a5a6", "size": 4, "content": "**[RENOMBRADO v2.0, antes: DoD Fractal]** Punto de verificaci\u00f3n de calidad en el flujo que asegura que ciertos criterios se cumplen antes de avanzar a la siguiente fase.\n\n**Fases t\u00edpicas con Gates:**\n"}, {"id": "term-mcp", "label": "mcp", "type": "term", "color": "#95a5a6", "size": 4, "content": "Protocolo est\u00e1ndar de Anthropic para conectar LLMs con recursos externos. RaiSE expone Katas, Guardrails y Constitution como recursos MCP, permitiendo que agentes (Claude, Cursor, etc.) accedan a cont"}, {"id": "term-ng-patterns", "label": "ng-patterns", "type": "term", "color": "#95a5a6", "size": 4, "content": "Patrones de desarrollo con LLMs identificados por Andrew Ng. RaiSE integra expl\u00edcitamente: Short-Context, RAG (Golden Data), Fine-tuning (Katas) y Tool-use (MCP Tools).\n\n| Patr\u00f3n | Implementaci\u00f3n en R"}, {"id": "term-jerarqu-a-de-tres-niveles-adr-010-nuevo-v2-4", "label": "jerarqu-a-de-tres-niveles-adr-010-nuevo-", "type": "term", "color": "#95a5a6", "size": 4, "content": "RaiSE organiza artefactos en tres niveles que reflejan la estructura natural de desarrollo:\n\n```\nSOLUTION LEVEL (Sistema - perdura)\n\u251c\u2500\u2500 Business Case \u2192 Solution Vision \u2192 Governance\n\u2502\nPROJECT LEVEL (In"}, {"id": "term-business-case-nuevo-v2-4", "label": "business-case-nuevo-v2-4", "type": "term", "color": "#95a5a6", "size": 4, "content": "Artefacto de nivel **soluci\u00f3n** que documenta la justificaci\u00f3n de negocio para un sistema. Responde: \"\u00bfPor qu\u00e9 debe existir este sistema?\"\n\n**Secciones clave:**\n- Oportunidad de negocio (problema, cau"}, {"id": "term-solution-vision-actualizado-v2-4", "label": "solution-vision-actualizado-v2-4", "type": "term", "color": "#95a5a6", "size": 4, "content": "Artefacto de nivel **soluci\u00f3n** que define QU\u00c9 ES el sistema. Responde: \"\u00bfQu\u00e9 sistema construimos para resolver el Business Case?\"\n\n**Cambio v2.4:** Antes aplicaba a nivel proyecto. Ahora es exclusiva"}, {"id": "term-project-vision-nuevo-v2-4", "label": "project-vision-nuevo-v2-4", "type": "term", "color": "#95a5a6", "size": 4, "content": "Artefacto de nivel **proyecto** que traduce un PRD en visi\u00f3n t\u00e9cnica de alto nivel. Responde: \"\u00bfC\u00f3mo abordamos este proyecto espec\u00edfico?\"\n\n**Cambio v2.4:** Renombrado desde \"Solution Vision\" a nivel p"}, {"id": "term-prd", "label": "prd", "type": "term", "color": "#95a5a6", "size": 4, "content": "Artefacto de nivel **proyecto** en la fase Discovery que captura requisitos del producto desde la perspectiva de negocio y usuarios."}, {"id": "term-toolkit", "label": "toolkit", "type": "term", "color": "#95a5a6", "size": 4, "content": "CLI toolset providing deterministic operations for skills. Component of Governance Toolkit architecture.\n\n**Purpose:** Extract data, validate structure, query graphs - operations that would waste infe"}, {"id": "term-technical-design", "label": "technical-design", "type": "term", "color": "#95a5a6", "size": 4, "content": "Especificaci\u00f3n t\u00e9cnica que traduce la Project Vision en arquitectura, componentes y decisiones de implementaci\u00f3n."}, {"id": "term-transpiration", "label": "transpiration", "type": "term", "color": "#95a5a6", "size": 4, "content": "Automated extraction of structured data from human-readable markdown into machine-processable formats.\n\n**Process:**\n```\nMarkdown (human-authored)\n  \u2193 Parsing (regex, markdown parsers)\nStructured conc"}, {"id": "term-rf-05-golden-context-generation", "label": "rf-05-golden-context-generation", "type": "term", "color": "#95a5a6", "size": 4, "content": "| ID | Requirement | Priority |\n...\n```\n\u2193 Transpiration \u2193\n```json\n{\n  \"id\": \"req-rf-05\",\n  \"type\": \"requirement\",\n  \"content\": \"The system MUST generate...\"\n}\n```\n\n**Rationale:** Humans write markdown"}, {"id": "term-implementation-plan", "label": "implementation-plan", "type": "term", "color": "#95a5a6", "size": 4, "content": "Plan paso a paso que gu\u00eda la ejecuci\u00f3n determinista de una tarea. Incluye tasks at\u00f3micas, dependencias y criterios de verificaci\u00f3n."}, {"id": "term-user-story", "label": "user-story", "type": "term", "color": "#95a5a6", "size": 4, "content": "Descripci\u00f3n desde la perspectiva del usuario de una funcionalidad deseada. Formato: \"Como [rol], quiero [acci\u00f3n], para [beneficio]\".\n\n---"}, {"id": "term-capability", "label": "capability", "type": "term", "color": "#95a5a6", "size": 4, "content": "Habilidad de alto nivel que la organizaci\u00f3n o sistema debe poseer."}, {"id": "term-feature", "label": "feature", "type": "term", "color": "#95a5a6", "size": 4, "content": "Agrupaci\u00f3n l\u00f3gica de requisitos que proporciona valor a un stakeholder."}, {"id": "term-statement-of-work", "label": "statement-of-work", "type": "term", "color": "#95a5a6", "size": 4, "content": "Documento contractual que detalla trabajo a realizar, entregables, cronograma y costos."}, {"id": "term-roadmap", "label": "roadmap", "type": "term", "color": "#95a5a6", "size": 4, "content": "Plan visual que muestra secuencia y tiempos estimados para entrega de funcionalidades o hitos.\n\n---"}, {"id": "decision-adr-034", "label": "adr-034", "type": "decision", "color": "#a8e6cf", "size": 9, "content": "Rovo-Only UI for Forge MVP \u2014 Usar Rovo agents como la \u00fanica UI del MVP. No Custom UI, no UI Kit panels."}, {"id": "decision-adr-035", "label": "adr-035", "type": "decision", "color": "#a8e6cf", "size": 9, "content": "raise-server como Knowledge Store can\u00f3nico (no Forge Storage) \u2014 raise-server PostgreSQL es el store can\u00f3nico del knowledge graph. Forge KVS se\nusa exclusivamente para estado de conversaci\u00f3n y cach\u00e9 lo"}, {"id": "decision-adr-036", "label": "adr-036", "type": "decision", "color": "#a8e6cf", "size": 9, "content": "Patr\u00f3n Async Queue Consumer para llamadas a backend \u2014 Usar Async Events API + queue consumer (900s timeout) para todas las llamadas a\nraise-server que involucren sync de datos o procesamiento que pued"}, {"id": "decision-adr-037", "label": "adr-037", "type": "decision", "color": "#a8e6cf", "size": 9, "content": "Capabilities en Compass, Initiatives en Jira \u2014 1. **Capabilities migran a Compass** como componentes del software catalog. Cada C1-C12 se convierte en un Compass component con owner, description, scor"}, {"id": "epic-e1", "label": "e1", "type": "epic", "color": "#ff6b6b", "size": 8, "content": "Epic E1: Core Foundation. Build the foundational CLI infrastructure: package structure, command framework, configuration system, error handling, and output formatting."}, {"id": "story-f1-1", "label": "f1-1", "type": "story", "color": "#e74c3c", "size": 4, "content": "F1.1: Project Scaffolding (complete) - ~30min"}, {"id": "story-f1-2", "label": "f1-2", "type": "story", "color": "#e74c3c", "size": 4, "content": "F1.2: CLI Skeleton (complete) - ~45min"}, {"id": "story-f1-3", "label": "f1-3", "type": "story", "color": "#e74c3c", "size": 4, "content": "F1.3: Configuration System (complete)"}, {"id": "story-f1-4", "label": "f1-4", "type": "story", "color": "#e74c3c", "size": 4, "content": "F1.4: Exception Hierarchy (complete) - ~30min"}, {"id": "story-f1-5", "label": "f1-5", "type": "story", "color": "#e74c3c", "size": 4, "content": "F1.5: Output Module (complete) - ~15min"}, {"id": "story-f1-6", "label": "f1-6", "type": "story", "color": "#e74c3c", "size": 4, "content": "F1.6: Core Utilities (complete) - ~10min"}, {"id": "epic-e2", "label": "e2", "type": "epic", "color": "#ff6b6b", "size": 8, "content": "Epic E2: Governance Toolkit (complete). Build the governance toolkit that enables concept-level graph representation of governance artifacts, providing 97% token savings for AI context queries via Min"}, {"id": "story-f2-1", "label": "f2-1", "type": "story", "color": "#e74c3c", "size": 4, "content": "F2.1: Concept Extraction (complete)"}, {"id": "story-f2-2", "label": "f2-2", "type": "story", "color": "#e74c3c", "size": 4, "content": "F2.2: Graph Builder (complete)"}, {"id": "story-f2-3", "label": "f2-3", "type": "story", "color": "#e74c3c", "size": 4, "content": "F2.3: MVC Query Engine (complete)"}, {"id": "story-f2-4", "label": "f2-4", "type": "story", "color": "#e74c3c", "size": 4, "content": "F2.4: CLI Commands (pending) - -"}, {"id": "epic-e3", "label": "e3", "type": "epic", "color": "#ff6b6b", "size": 8, "content": "Epic E3: Identity Core + Memory Graph (complete). Build the infrastructure for Rai's existence as an entity. Apply the same MVC (Minimum Viable Context) pattern from E2 governance to Rai's own memory "}, {"id": "story-f3-1", "label": "f3-1", "type": "story", "color": "#e74c3c", "size": 4, "content": "F3.1: Identity Core Structure (complete) - Create `.rai/` with identity (md) + memory (jsonl)"}, {"id": "story-f3-2", "label": "f3-2", "type": "story", "color": "#e74c3c", "size": 4, "content": "F3.2: Content Migration (complete) - Migrated with F3.1 \u2014 `.claude/rai/` \u2192 `.rai/` JSONL"}, {"id": "story-f3-3", "label": "f3-3", "type": "story", "color": "#e74c3c", "size": 4, "content": "F3.3: Memory Graph (complete) - 6 modules, 109 tests, graph builds from JSONL"}, {"id": "story-f3-4", "label": "f3-4", "type": "story", "color": "#e74c3c", "size": 4, "content": "F3.4: Memory Query CLI (complete) - Implemented with F3.3 \u2014 `query` + `dump` commands"}, {"id": "story-f3-5", "label": "f3-5", "type": "story", "color": "#e74c3c", "size": 4, "content": "F3.5: Skills Integration (pending) - /session-start queries graph, /session-close writes JSONL"}, {"id": "epic-e9", "label": "e9", "type": "epic", "color": "#ff6b6b", "size": 8, "content": "Epic E9: Local Learning & Self-Awareness (phase). Collect deterministic signals from the development workflow and use them locally to:"}, {"id": "story-f9-1", "label": "f9-1", "type": "story", "color": "#e74c3c", "size": 4, "content": "F9.1: Signal Schema (pending) - Define signal types in Pydantic models"}, {"id": "story-f9-2", "label": "f9-2", "type": "story", "color": "#e74c3c", "size": 4, "content": "F9.2: Signal Writer (pending) - Append signals to `.rai/telemetry/signals.jsonl`"}, {"id": "story-f9-3", "label": "f9-3", "type": "story", "color": "#e74c3c", "size": 4, "content": "F9.3: Skill Emitters (pending) - Emit skill_event on start/complete/abandon"}, {"id": "story-f9-4", "label": "f9-4", "type": "story", "color": "#e74c3c", "size": 4, "content": "F9.4: Session Emitters (pending) - Emit session_event from /session-close"}, {"id": "story-f9-5", "label": "f9-5", "type": "story", "color": "#e74c3c", "size": 4, "content": "F9.5: Error Emitters (pending) - Emit error_event on tool failures"}, {"id": "story-f9-6", "label": "f9-6", "type": "story", "color": "#e74c3c", "size": 4, "content": "F9.6: Signal Analyzer (pending) - Analyze signals.jsonl for patterns"}, {"id": "story-f9-7", "label": "f9-7", "type": "story", "color": "#e74c3c", "size": 4, "content": "F9.7: Insight Generator (pending) - Generate epistemologically-grounded insights"}, {"id": "story-f9-8", "label": "f9-8", "type": "story", "color": "#e74c3c", "size": 4, "content": "F9.8: Session Start Integration (pending) - Surface insights in /session-start"}, {"id": "story-f9-9", "label": "f9-9", "type": "story", "color": "#e74c3c", "size": 4, "content": "F9.9: Calibration Updater (pending) - Auto-update calibration from actuals"}, {"id": "story-f9-10", "label": "f9-10", "type": "story", "color": "#e74c3c", "size": 4, "content": "F9.10: Telemetry Commands (pending) - `rai telemetry velocity`, `drift`, `insights`"}, {"id": "story-f9-11", "label": "f9-11", "type": "story", "color": "#e74c3c", "size": 4, "content": "F9.11: Retro Integration (pending) - /story-review queries telemetry"}, {"id": "epic-e10", "label": "e10", "type": "epic", "color": "#ff6b6b", "size": 8, "content": "Epic E10: Collective Intelligence (exploration). Enable opt-in sharing of patterns and telemetry with:"}, {"id": "story-f10-1", "label": "f10-1", "type": "story", "color": "#e74c3c", "size": 4, "content": "F10.1: Lineage Schema (pending) - Add lineage fields to pattern model"}, {"id": "story-f10-2", "label": "f10-2", "type": "story", "color": "#e74c3c", "size": 4, "content": "F10.2: Export Command (pending) - `rai memory export --shareable`"}, {"id": "story-f10-3", "label": "f10-3", "type": "story", "color": "#e74c3c", "size": 4, "content": "F10.3: Community Repo (pending) - Public repo for shared patterns"}, {"id": "story-f10-4", "label": "f10-4", "type": "story", "color": "#e74c3c", "size": 4, "content": "F10.4: Pull Command (pending) - `rai memory pull --community`"}, {"id": "story-f10-5", "label": "f10-5", "type": "story", "color": "#e74c3c", "size": 4, "content": "F10.5: Sharing Config (pending) - Team/org scope settings"}, {"id": "story-f10-6", "label": "f10-6", "type": "story", "color": "#e74c3c", "size": 4, "content": "F10.6: Sync API (pending) - Pattern and signal submission"}, {"id": "story-f10-7", "label": "f10-7", "type": "story", "color": "#e74c3c", "size": 4, "content": "F10.7: Team/Org Scopes (pending) - Identity and permissions"}, {"id": "story-f10-8", "label": "f10-8", "type": "story", "color": "#e74c3c", "size": 4, "content": "F10.8: Aggregate Analytics (pending) - Framework improvement metrics"}, {"id": "epic-e1001", "label": "e1001", "type": "epic", "color": "#ff6b6b", "size": 8, "content": "Epic E1001: Epic E1001. Establish a formal bug classification and workflow system that treats every bug as a process sensor \u2014 extracting not just the fix, but a process improvement from each defect."}, {"id": "epic-e1021", "label": "e1021", "type": "epic", "color": "#ff6b6b", "size": 8, "content": "Epic E1021: Epic E1021 (s)"}, {"id": "epic-e1051", "label": "e1051", "type": "epic", "color": "#ff6b6b", "size": 8, "content": "Epic E1051: Epic E1051. Port Confluence adapter from mcp-atlassian (MCP stdio, Node dependency) to\natlassian-python-api (pure Python). Include backend discovery, config schema\nwith artifact-type routi"}, {"id": "epic-e11", "label": "e11", "type": "epic", "color": "#ff6b6b", "size": 8, "content": "Epic E11: Unified Context Architecture (complete). Complete Rai's self-improvement infrastructure by unifying memory, governance, and work graphs into a single queryable context that skills can access"}, {"id": "story-f11-1", "label": "f11-1", "type": "story", "color": "#e74c3c", "size": 4, "content": "F11.1: Unified Graph Schema (pending) - Pydantic models, NetworkX wrapper, serialization"}, {"id": "story-f11-2", "label": "f11-2", "type": "story", "color": "#e74c3c", "size": 4, "content": "F11.2: Graph Builder (pending) - Merge governance + memory + work + skills into unified graph"}, {"id": "story-f11-3", "label": "f11-3", "type": "story", "color": "#e74c3c", "size": 4, "content": "F11.3: Unified Query (pending) - `rai context query --unified` with keyword search + concept lookup"}, {"id": "story-f11-4", "label": "f11-4", "type": "story", "color": "#e74c3c", "size": 4, "content": "F11.4: Skill Integration (pending) - Added \"Step 0.5: Query Context\" to 9 workflow skills"}, {"id": "epic-e12", "label": "e12", "type": "epic", "color": "#ff6b6b", "size": 8, "content": "Epic E12: Complete Knowledge Graph (complete). **Complete the knowledge graph** so that all story cycle skills have MVC (Minimum Viable Context) through graph recall, and skills can write back learnin"}, {"id": "story-f12-1", "label": "f12-1", "type": "story", "color": "#e74c3c", "size": 4, "content": "F12.1: ADR Extractor (complete) - Extract ADRs as `decision` nodes from `dev/decisions/`"}, {"id": "story-f12-2", "label": "f12-2", "type": "story", "color": "#e74c3c", "size": 4, "content": "F12.2: Guardrails Extractor (complete) - Extract guardrails as queryable nodes"}, {"id": "story-f12-3", "label": "f12-3", "type": "story", "color": "#e74c3c", "size": 4, "content": "F12.3: Glossary Extractor (complete) - Extract glossary terms for terminology"}, {"id": "story-f12-4", "label": "f12-4", "type": "story", "color": "#e74c3c", "size": 4, "content": "F12.4: Schema Extension (complete) - Add `decision`, `guardrail`, `term` to NodeType"}, {"id": "story-f12-5", "label": "f12-5", "type": "story", "color": "#e74c3c", "size": 4, "content": "F12.5: Skill Query Alignment (complete) - Fix query/type mismatches in story cycle skills"}, {"id": "story-f12-6", "label": "f12-6", "type": "story", "color": "#e74c3c", "size": 4, "content": "F12.6: Memory Write CLI (complete) - `rai memory add-pattern` command"}, {"id": "epic-e13", "label": "e13", "type": "epic", "color": "#ff6b6b", "size": 8, "content": "Epic E13: Discovery \u2014 Codebase Understanding for Rai (complete). Enable Rai to quickly understand existing codebase components for consistent reuse and detect architectural drift from external contrib"}, {"id": "story-f13-1", "label": "f13-1", "type": "story", "color": "#e74c3c", "size": 4, "content": "F13.1: Schema Extension (complete) - Add system/module/component/convention node types to unified graph"}, {"id": "story-f13-2", "label": "f13-2", "type": "story", "color": "#e74c3c", "size": 4, "content": "F13.2: Extraction Toolkit (complete) - CLI commands to scan codebase and extract symbols via ast-grep"}, {"id": "story-f13-3", "label": "f13-3", "type": "story", "color": "#e74c3c", "size": 4, "content": "F13.3: Discovery Skills (complete) - `/discover-*` skills with LLM synthesis and human validation loop"}, {"id": "story-f13-4", "label": "f13-4", "type": "story", "color": "#e74c3c", "size": 4, "content": "F13.4: Graph Integration (complete) - Populate unified graph with validated components, enable queries"}, {"id": "story-f13-5", "label": "f13-5", "type": "story", "color": "#e74c3c", "size": 4, "content": "F13.5: Drift Detection (complete) - Basic check: new files against established patterns"}, {"id": "epic-e14", "label": "e14", "type": "epic", "color": "#ff6b6b", "size": 8, "content": "Epic E14: Rai Distribution \u2014 Scope (in). Enable new users to experience Rai as a knowledgeable partner from day one, with base identity, universal patterns, and internalized framework knowledge."}, {"id": "story-f14-1", "label": "f14-1", "type": "story", "color": "#e74c3c", "size": 4, "content": "F14.1: Base Identity Package (complete)"}, {"id": "story-f14-2", "label": "f14-2", "type": "story", "color": "#e74c3c", "size": 4, "content": "F14.2: Base Patterns Catalog (complete)"}, {"id": "story-f14-3", "label": "f14-3", "type": "story", "color": "#e74c3c", "size": 4, "content": "F14.3: Methodology Core (complete)"}, {"id": "story-f14-4", "label": "f14-4", "type": "story", "color": "#e74c3c", "size": 4, "content": "F14.4: Bootstrap on Init (complete)"}, {"id": "story-f14-5", "label": "f14-5", "type": "story", "color": "#e74c3c", "size": 4, "content": "F14.5: Two-Part MEMORY.md (complete)"}, {"id": "story-f14-6", "label": "f14-6", "type": "story", "color": "#e74c3c", "size": 4, "content": "F14.6: Pattern Versioning (complete)"}, {"id": "story-f14-7", "label": "f14-7", "type": "story", "color": "#e74c3c", "size": 4, "content": "F14.7: Base Show Command (complete)"}, {"id": "story-f14-15", "label": "f14-15", "type": "story", "color": "#e74c3c", "size": 4, "content": "F14.15: Multi-Developer Architecture (complete)"}, {"id": "story-f14-8", "label": "f14-8", "type": "story", "color": "#e74c3c", "size": 4, "content": "F14.8: Config Support (pending)"}, {"id": "story-f14-9", "label": "f14-9", "type": "story", "color": "#e74c3c", "size": 4, "content": "F14.9: Git Source Resolution (pending)"}, {"id": "story-f14-10", "label": "f14-10", "type": "story", "color": "#e74c3c", "size": 4, "content": "F14.10: Base Update Command (pending)"}, {"id": "story-f14-11", "label": "f14-11", "type": "story", "color": "#e74c3c", "size": 4, "content": "F14.11: Update Detection (pending)"}, {"id": "epic-e15", "label": "e15", "type": "epic", "color": "#ff6b6b", "size": 8, "content": "Epic E15: Epic E15"}, {"id": "epic-e16", "label": "e16", "type": "epic", "color": "#ff6b6b", "size": 8, "content": "Epic E16: Incremental Coherence (in). Prevent architecture documentation and graph drift through small-batch updates integrated into the story lifecycle, with full discovery as a validation safety net"}, {"id": "epic-e17", "label": "e17", "type": "epic", "color": "#ff6b6b", "size": 8, "content": "Epic E17: Multi-Language Discovery (in). Extend `rai discover scan` to extract symbols from TypeScript/TSX, PHP, and Svelte codebases, enabling discovery on polyglot repositories."}, {"id": "epic-e18", "label": "e18", "type": "epic", "color": "#ff6b6b", "size": 8, "content": "Epic E18: Pre-Launch Repo Readiness \u2014 Scope (planned). Prepare raise-commons for public release: security audit, community files, README for 30-second conversion, and release engineering (GitHub mirro"}, {"id": "epic-e275", "label": "e275", "type": "epic", "color": "#ff6b6b", "size": 8, "content": "Epic E275: Epic E275 (in). Deliver a server-side backend that enables cross-repo knowledge graph sharing,\nagent telemetry, and Rai memory updates \u2014 providing the API foundation for\nFernando's Forge ap"}, {"id": "epic-e292", "label": "e292", "type": "epic", "color": "#ff6b6b", "size": 8, "content": "Epic E292: Epic E292. Eliminate test muda caused by stale >90% coverage targets in agent instructions.\nAlign all governance documents and skills with the actual policy: coverage as\ndiagnostic, test qu"}, {"id": "epic-e301", "label": "e301", "type": "epic", "color": "#ff6b6b", "size": 8, "content": "Epic E301: Agent Tool Abstraction \u2014 Scope (in). AI agents consume abstract CLI commands (`rai backlog`, `rai docs`) instead of\nplatform-specific APIs, eliminating the need to know Jira transition IDs,"}, {"id": "epic-e325", "label": "e325", "type": "epic", "color": "#ff6b6b", "size": 8, "content": "Epic E325: Epic E325. Transform the RaiSE interaction model from human-dispatched skill invocation to agent-orchestrated workflow execution with parametrized HITL, so the developer focuses on decision"}, {"id": "epic-e337", "label": "e337", "type": "epic", "color": "#ff6b6b", "size": 8, "content": "Epic E337: Epic E337. Enable integration of any MCP server via declarative YAML config (~50-80 lines) instead of dedicated Python adapter code (~400 LOC), while keeping existing adapters unchanged."}, {"id": "epic-e338", "label": "e338", "type": "epic", "color": "#ff6b6b", "size": 8, "content": "Epic E338: Epic E338. Expose McpBridge as independent infrastructure so developers can register, manage, and invoke any MCP server from RaiSE \u2014 with telemetry and reliability \u2014 without coupling to dom"}, {"id": "epic-e340", "label": "e340", "type": "epic", "color": "#ff6b6b", "size": 8, "content": "Epic E340: Epic E340"}, {"id": "epic-e346", "label": "e346", "type": "epic", "color": "#ff6b6b", "size": 8, "content": "Epic E346: Epic E346. Reinforce orchestrator skills, genericize review skills for language-agnosticism, and promote deployment-only review skills to builtin for proper distribution."}, {"id": "epic-e347", "label": "e347", "type": "epic", "color": "#ff6b6b", "size": 8, "content": "Epic E347: Epic E347. Make `rai backlog` the single reliable channel for reading and writing work state \u2014 transparent to backend (Jira or files) \u2014 so that skills, session-start, and humans always oper"}, {"id": "epic-e348", "label": "e348", "type": "epic", "color": "#ff6b6b", "size": 8, "content": "Epic E348: Epic E348. Bring all user, developer, and agent documentation up to date through v2.2. Three audiences: users (install + use), developers (extend + contribute), AI agents (discover + consum"}, {"id": "epic-e350", "label": "e350", "type": "epic", "color": "#ff6b6b", "size": 8, "content": "Epic E350: Epic E350. Make the Rai experience fully reproducible: any developer runs `git clone` + `rai init` + `rai graph build` and gets an instance of Rai with the same behavior, context, and capab"}, {"id": "epic-e352", "label": "e352", "type": "epic", "color": "#ff6b6b", "size": 8, "content": "Epic E352: rai doctor \u2014 Scope (in). Give every RaiSE user a single command (`rai doctor`) that diagnoses their setup, reports actionable problems, and lets them send a bug report \u2014 so they never need "}, {"id": "epic-e353", "label": "e353", "type": "epic", "color": "#ff6b6b", "size": 8, "content": "Epic E353: Epic E353. Eliminate the 4.6x quality gap in orchestrated skill execution by implementing the Checkpoint & Fork pattern: heavy skills fork to fresh-context subagents, structured results che"}, {"id": "epic-e354", "label": "e354", "type": "epic", "color": "#ff6b6b", "size": 8, "content": "Epic E354: Epic E354. Transform skill outputs from free-form Markdown to typed YAML artifacts with Pydantic schema validation, governance-rule semantic linting, knowledge graph ingestion, and generate"}, {"id": "epic-e356", "label": "e356", "type": "epic", "color": "#ff6b6b", "size": 8, "content": "Epic E356: Epic E356. Migrate the RaiSE marketing website from raise-gtm to raise-commons and update\ncontent to reflect v2.2 capabilities. The site in raise-gtm cannot access source\ncode, making accur"}, {"id": "epic-e357", "label": "e357", "type": "epic", "color": "#ff6b6b", "size": 8, "content": "Epic E357: Epic E357. Unify the release process for RaiSE (code + docs + website + security) into a single\norchestrated pipeline. Every release should be reproducible, auditable, and require\nminimal m"}, {"id": "epic-e369", "label": "e369", "type": "epic", "color": "#ff6b6b", "size": 8, "content": "Epic E369: Epic E369. Make raise-commons credible to a senior dev evaluating it in 15 minutes.\n\"Reliable AI software engineering\" must be evident from first contact through code."}, {"id": "epic-e370", "label": "e370", "type": "epic", "color": "#ff6b6b", "size": 8, "content": "Epic E370: Epic E370. Make raise-commons pass a senior Python developer's architectural review. The standard is distilled from practice \u2014 draft first, tool, audit, learn, then codify permanently."}, {"id": "epic-e474", "label": "e474", "type": "epic", "color": "#ff6b6b", "size": 8, "content": "Epic E474: Epic E474. Eliminate the gap between CI validation and skill/gate verification so that lint, format, and type errors are caught locally before reaching CI. Audit the codebase against the co"}, {"id": "epic-e476", "label": "e476", "type": "epic", "color": "#ff6b6b", "size": 8, "content": "Epic E476: Epic E476. Separate language-specific gate configuration from core skills so RaiSE works cleanly across any tech stack."}, {"id": "epic-e477", "label": "e477", "type": "epic", "color": "#ff6b6b", "size": 8, "content": "Epic E477: Agile HR Performance Management \u2014 Scope (in). Enable HR Business Partners to run continuous performance cycles using AI-governed katas, replacing annual reviews with iterative monthly check"}, {"id": "epic-e478", "label": "e478", "type": "epic", "color": "#ff6b6b", "size": 8, "content": "Epic E478: Epic E478. Ensure the open-source `raise-cli` package contains zero pro-only code (Jira, Confluence adapters) and zero pro-only dependencies. Pro features ship exclusively via `rai_pro`."}, {"id": "epic-e479", "label": "e479", "type": "epic", "color": "#ff6b6b", "size": 8, "content": "Epic E479: Epic E479. Automate generation of ISO 27001 compliance evidence reports from existing RaiSE artifacts, eliminating manual audit preparation for development teams already certified."}, {"id": "epic-e493", "label": "e493", "type": "epic", "color": "#ff6b6b", "size": 8, "content": "Epic E493: Epic E493"}, {"id": "epic-e494", "label": "e494", "type": "epic", "color": "#ff6b6b", "size": 8, "content": "Epic E494: Epic E494. Replace the MCP bridge-based Jira adapter with a thin ACLI subprocess wrapper that\nsupports multi-instance Jira, simplifies the codebase, and preserves governance and\nobservabili"}, {"id": "epic-e609", "label": "e609", "type": "epic", "color": "#ff6b6b", "size": 8, "content": "Epic E609: Epic E609 (in)"}, {"id": "epic-e613", "label": "e613", "type": "epic", "color": "#ff6b6b", "size": 8, "content": "Epic E613: Epic E613. Rolling epic for raise-pro improvements: doctor checks, DX polish, bug fixes, configuration enhancements. Open-ended \u2014 issues resolved incrementally as they surface."}, {"id": "epic-e615", "label": "e615", "type": "epic", "color": "#ff6b6b", "size": 8, "content": "Epic E615: Epic E615. Establish private distribution of raise-pro via GitLab Package Registry with\nper-client deploy tokens. Block public PyPI publication of proprietary packages."}, {"id": "epic-e616", "label": "e616", "type": "epic", "color": "#ff6b6b", "size": 8, "content": "Epic E616: Epic E616. Add server-side license and member management to raise-server. Organizations\nhave a plan, members inherit plan features, server enforces on every request."}, {"id": "epic-e621", "label": "e621", "type": "epic", "color": "#ff6b6b", "size": 8, "content": "Epic E621: Epic E621. Configure raise-pro for client distribution via private GitLab Package Registry,\nimplement `rai configure` for server connection setup, and add CLI-side plan\nenforcement that del"}, {"id": "epic-e654", "label": "e654", "type": "epic", "color": "#ff6b6b", "size": 8, "content": "Epic E654: Epic E654. Fix session identity so that sessions are scoped to developer+repository (not environment/channel), enabling coherent multi-session work regardless of where the developer opens C"}, {"id": "epic-e673", "label": "e673", "type": "epic", "color": "#ff6b6b", "size": 8, "content": "Epic E673: Epic E673. Consolidate rai-agent product code into raise-commons monorepo using uv workspaces,\nwith selective publishing for OSS vs proprietary packages and a single RAISE Jira project."}, {"id": "epic-e680", "label": "e680", "type": "epic", "color": "#ff6b6b", "size": 8, "content": "Epic E680: Epic E680. Ship v2.3.0 as the last pre-monorepo release, covering the 7 dimensions that differentiate a reliable release from an ad-hoc one: scope audit, changelog, documentation, security "}, {"id": "epic-e688", "label": "e688", "type": "epic", "color": "#ff6b6b", "size": 8, "content": "Epic E688: Epic E688. Create a deterministic, repeatable release preparation skill that guides (or automates) the full release lifecycle from scope audit to PyPI publish, with built-in Pro/Community s"}, {"id": "epic-e7", "label": "e7", "type": "epic", "color": "#ff6b6b", "size": 8, "content": "Epic E7: Epic E7. Enable any developer to go from `pip install raise-cli` to a fully RaiSE-ready project \u2014 working knowledge graph, governance structure, and first `/session-start` \u2014 through guided, s"}, {"id": "epic-e789", "label": "e789", "type": "epic", "color": "#ff6b6b", "size": 8, "content": "Epic E789: Epic E789. Evaluate Anthropic's 9 published articles (Dec 2024 \u2014 Mar 2026) through RaiSE's lens:\n- What do we already have that maps to their recommendations?\n- What are we missing that wou"}, {"id": "epic-e935", "label": "e935", "type": "epic", "color": "#ff6b6b", "size": 8, "content": "Epic E935: Epic E935. Migrate all non-code documentation from raise-commons and raise-gtm filesystems, plus RGTM Confluence space, to STRAT and RaiSE1 spaces. After migration, repos contain only code "}, {"id": "PAT-E-001", "label": "E-001", "type": "pattern", "color": "#9b59b6", "size": 5, "content": "When infrastructure already exists, the 'build' story becomes a 'curate + wire' story \u2014 re-assess size after Gemba walk."}, {"id": "PAT-E-002", "label": "E-002", "type": "pattern", "color": "#9b59b6", "size": 5, "content": "Claude Code Bash tool escapes ! to \\! in arguments \u2014 sanitize shell-mangled operators at adapter system boundaries"}, {"id": "PAT-E-003", "label": "E-003", "type": "pattern", "color": "#9b59b6", "size": 5, "content": "Namespace migrations silently obsolete documentation: when CLI commands move to new namespaces, old docs appear to have coverage but 0% is effective. Audit by namespace, not just command name presence"}, {"id": "PAT-E-004", "label": "E-004", "type": "pattern", "color": "#9b59b6", "size": 5, "content": "Gap analysis as a formal story deliverable (not just a task within a larger story) produces a reusable artifact that grounds all subsequent stories in the epic. Worth the XS story overhead for any epi"}, {"id": "PAT-E-005", "label": "E-005", "type": "pattern", "color": "#9b59b6", "size": 5, "content": "QR agents may not know current framework versions \u2014 verify critical findings against actual build/runtime before acting on them. Example: Astro 5 changed output modes, QR flagged static+SSR as incompa"}, {"id": "PAT-E-006", "label": "E-006", "type": "pattern", "color": "#9b59b6", "size": 5, "content": "What/How/Why triple for governance criteria makes standards concrete and verifiable. Classification as TOOL/HUMAN/BOTH enables downstream automation decisions."}, {"id": "PAT-E-007", "label": "E-007", "type": "pattern", "color": "#9b59b6", "size": 5, "content": "DRAFT-first governance: codify standards as draft, validate against real codebase (audit), then finalize. Prevents over-engineering criteria that don't match reality."}, {"id": "PAT-E-008", "label": "E-008", "type": "pattern", "color": "#9b59b6", "size": 5, "content": "CI-Skills parity gap: CI ran 4 gates (pytest, ruff check, ruff format, pyright) but skills/gates only verified 1-2. Root cause: no FormatGate, story-close doesn't invoke rai gate check --all, gate-cod"}, {"id": "PAT-E-009", "label": "E-009", "type": "pattern", "color": "#9b59b6", "size": 5, "content": "Incremental linter expansion: enable one rule set at a time, risk-first order (security > complexity > style). Measure violation landscape first (T1), then fix per-ruleset with separate commits. Keeps"}, {"id": "PAT-E-010", "label": "E-010", "type": "pattern", "color": "#9b59b6", "size": 5, "content": "Epic/story skills must validate current branch before committing. E474 scope commit landed on story/s370.2 branch instead of dev because epic-start didn't check git branch. Skills that create artifact"}, {"id": "PAT-E-011", "label": "E-011", "type": "pattern", "color": "#9b59b6", "size": 5, "content": "Early signal task (measure before fixing) dimensions real work and prevents surprise scope expansion. For S370.2: 2036 violations measured \u2192 informed global-ignore vs per-file strategy."}, {"id": "PAT-E-012", "label": "E-012", "type": "pattern", "color": "#9b59b6", "size": 5, "content": "For Ruff rule expansion: global ignores with TOML comments are better than per-line noqa when violations exceed 100 from legitimate project patterns (e.g. inline imports, test magic values)."}, {"id": "PAT-E-013", "label": "E-013", "type": "pattern", "color": "#9b59b6", "size": 5, "content": "Three review skills serve distinct purposes: quality-review (story diff, semantic bugs), architecture-review (proportionality, Beck), code-audit (codebase modules, governance compliance). Do not confl"}, {"id": "PAT-E-014", "label": "E-014", "type": "pattern", "color": "#9b59b6", "size": 5, "content": "Shared helper pattern for repetitive gate/check logic: extract command-reading + subprocess-running into a single function that all gates delegate to. Reduces 5 gates to ~5-line evaluate() methods. Ke"}, {"id": "PAT-E-015", "label": "E-015", "type": "pattern", "color": "#9b59b6", "size": 5, "content": "Always include stderr in subprocess failure details \u2014 stdout alone misses compiler errors, permission errors, and tool-specific diagnostics that only go to stderr. Capture both with capture_output=Tru"}, {"id": "PAT-E-016", "label": "E-016", "type": "pattern", "color": "#9b59b6", "size": 5, "content": "Scope documents may be written before design explores full implications. When design expands scope (e.g., refactoring 4 existing gates), follow the design as the later, more refined artifact. Note the"}, {"id": "PAT-E-017", "label": "E-017", "type": "pattern", "color": "#9b59b6", "size": 5, "content": "Marker-based ownership for file management: embed a comment marker (e.g. '# Installed by: rai gate install-hook') in generated files to distinguish tool-managed from user-managed artifacts. Enables sa"}, {"id": "PAT-E-018", "label": "E-018", "type": "pattern", "color": "#9b59b6", "size": 5, "content": "Thin bash shim pattern for Python hook integration: write a minimal shell script that invokes 'uv run python -m module_name' rather than embedding logic in bash. Keeps logic testable in Python, shim i"}, {"id": "PAT-E-019", "label": "E-019", "type": "pattern", "color": "#9b59b6", "size": 5, "content": "shlex.split() over str.split() for command parsing: when splitting shell commands for subprocess.run(), use shlex.split() to handle quoted arguments correctly. str.split() breaks on commands like 'ruf"}, {"id": "PAT-E-020", "label": "E-020", "type": "pattern", "color": "#9b59b6", "size": 5, "content": "Before defining a new Protocol or abstract base class, grep the codebase for existing ones (grep -r 'class.*Protocol' src/). Duplicates create confusion and require fix commits."}, {"id": "PAT-E-021", "label": "E-021", "type": "pattern", "color": "#9b59b6", "size": 5, "content": "ThreadPoolExecutor context manager calls shutdown(wait=True) on exit, blocking until threads finish. For timeout patterns where you want to abandon the thread, use explicit shutdown(wait=False, cancel"}, {"id": "PAT-E-022", "label": "E-022", "type": "pattern", "color": "#9b59b6", "size": 5, "content": "Pure extraction refactoring with existing test coverage takes 30-50% of estimated time when the extraction inventory is detailed. Adjust estimates accordingly for refactoring stories."}, {"id": "PAT-E-023", "label": "E-023", "type": "pattern", "color": "#9b59b6", "size": 5, "content": "Grep for existing Protocols before defining new ones. Duplicate Protocol definitions with same name/methods are a maintenance hazard \u2014 one changes, the other silently diverges."}, {"id": "PAT-E-024", "label": "E-024", "type": "pattern", "color": "#9b59b6", "size": 5, "content": "ThreadPoolExecutor context manager calls shutdown(wait=True) on exit, blocking until threads finish. For timeout patterns, use explicit lifecycle with shutdown(wait=False, cancel_futures=True) in fina"}, {"id": "PAT-E-025", "label": "E-025", "type": "pattern", "color": "#9b59b6", "size": 5, "content": "Pure extraction refactoring (moving code into helpers, no behavior change) with existing test coverage and a detailed inventory takes 30-50% of estimated time. Over-estimation stems from conflating 'm"}, {"id": "PAT-E-026", "label": "E-026", "type": "pattern", "color": "#9b59b6", "size": 5, "content": "When splitting a module, mock.patch decorators targeting 'module.function' still work if the function is re-imported \u2014 patch targets the import site, not the definition site. No test changes needed fo"}, {"id": "PAT-E-027", "label": "E-027", "type": "pattern", "color": "#9b59b6", "size": 5, "content": "God classes (>500 lines) are the highest-impact SRP violation. Decompose into loaders/formatters/data + orchestrator. The orchestrator becomes a thin pipeline importing from focused modules."}, {"id": "PAT-E-028", "label": "E-028", "type": "pattern", "color": "#9b59b6", "size": 5, "content": "Silent except Exception hides real bugs. Every catch-all handler must log the exception at minimum debug level. PAT-E-598 reinforced across 5 modules in E370 audit."}, {"id": "PAT-E-029", "label": "E-029", "type": "pattern", "color": "#9b59b6", "size": 5, "content": "TDD RED phase reveals migration scope: when updating test fixtures, count individual occurrences (not just files). S370.5f estimated 3 files but actual work touched 33 occurrences across 5 files."}, {"id": "PAT-E-030", "label": "E-030", "type": "pattern", "color": "#9b59b6", "size": 5, "content": "God classes (>500 lines) are the highest-impact SRP violation. Decompose into loaders/formatters/data + orchestrator."}, {"id": "PAT-E-031", "label": "E-031", "type": "pattern", "color": "#9b59b6", "size": 5, "content": "test pattern"}, {"id": "PAT-E-032", "label": "E-032", "type": "pattern", "color": "#9b59b6", "size": 5, "content": "ACLI workitem view takes key as positional arg, not --key flag. Other workitem subcommands (edit, transition, comment, link) use --key. Always check --help per subcommand before assuming flag consiste"}, {"id": "PAT-E-033", "label": "E-033", "type": "pattern", "color": "#9b59b6", "size": 5, "content": "Pre-implementation architecture review (AR) for M+ stories catches dead code and over-engineering before writing code. In S494.3, AR eliminated is_flat parameter and config-based status lookup, saving"}, {"id": "PAT-E-034", "label": "E-034", "type": "pattern", "color": "#9b59b6", "size": 5, "content": "Convention-based slug\u2192display name via replace('-', ' ').title() eliminates config lookup for standard Jira workflow states. Works for 'in-progress'\u2192'In Progress', 'done'\u2192'Done'. Only breaks for non-s"}, {"id": "PAT-E-035", "label": "E-035", "type": "pattern", "color": "#9b59b6", "size": 5, "content": "E2E testing with real installed packages must be an explicit plan task, not a manual afterthought. Unit tests with mocked entry_points cannot catch runtime issues like script entry point caching in uv"}, {"id": "PAT-E-036", "label": "E-036", "type": "pattern", "color": "#9b59b6", "size": 5, "content": "CLI extension discovery pattern: discover_X(container) -> list[Info] with 3 guards (builtin collision, duplicate detection, type validation). Stateless function, not class, when container mutation is "}, {"id": "PAT-E-037", "label": "E-037", "type": "pattern", "color": "#9b59b6", "size": 5, "content": "Research grounding before design eliminates assumption risk. S494.4: ACLI has no per-request --server flag \u2014 discovered via research, not assumed. Without research, would have designed around a nonexi"}, {"id": "PAT-E-038", "label": "E-038", "type": "pattern", "color": "#9b59b6", "size": 5, "content": "Cross-reference validation: when field A references field B by name (e.g. default_instance references instances dict), add a TDD test that field B exists. KeyError on missing reference is a semantic b"}, {"id": "PAT-E-039", "label": "E-039", "type": "pattern", "color": "#9b59b6", "size": 5, "content": "health() methods must never raise \u2014 they return unhealthy status. Any exception from internal calls (auth switch, subprocess) must be caught and converted to AdapterHealth(healthy=False). This is an i"}, {"id": "PAT-E-040", "label": "E-040", "type": "pattern", "color": "#9b59b6", "size": 5, "content": "Deletion stories: delete + rewire entry point must be one atomic commit. Splitting them creates a transient broken state where tests fail on the intermediate step."}, {"id": "PAT-E-041", "label": "E-041", "type": "pattern", "color": "#9b59b6", "size": 5, "content": "uv pip install --reinstall corrupts workspace venv by bypassing the lock. Use uv sync --all-extras to force workspace package reinstall with entry point refresh."}, {"id": "PAT-E-042", "label": "E-042", "type": "pattern", "color": "#9b59b6", "size": 5, "content": "Integration tests find what unit mocks hide: when mock responses are hand-crafted (not captured from real system), they validate assumptions, not contracts. ACLI create returned full issue, not envelo"}, {"id": "PAT-E-043", "label": "E-043", "type": "pattern", "color": "#9b59b6", "size": 5, "content": "ACLI command response format map: create\u2192full issue, edit/transition/comment-create\u2192envelope, search\u2192array, view\u2192full issue, comment-list\u2192{comments:[]}, link-create\u2192no --json support. Capture real out"}, {"id": "PAT-E-044", "label": "E-044", "type": "pattern", "color": "#9b59b6", "size": 5, "content": "Gemini Deep Research as parallel triangulation source \u2014 high value for comprehensive surveys. Run same prompt on both Rai and Gemini, then triangulate. Gemini excels at breadth (52 sources), Rai at de"}, {"id": "/rai-skill-create", "label": "skill-create", "type": "skill", "color": "#ffe66d", "size": 7, "content": "Guided skill creation through conversation and CLI composition. Walks through purpose definition, naming, lifecycle, design, writing, and validation."}, {"id": "/rai-mcp-add", "label": "mcp-add", "type": "skill", "color": "#ffe66d", "size": 7, "content": "Guided MCP server registration. Collects intent conversationally, resolves package details, and delegates to `rai mcp install` or `rai mcp scaffold`. Human never constructs CLI commands."}, {"id": "/rai-story-implement", "label": "story-implement", "type": "skill", "color": "#ffe66d", "size": 7, "content": "Execute the implementation plan task by task, verifying each step, and producing quality code that passes validation gates. Use after planning is complete."}, {"id": "/rai-epic-run", "label": "epic-run", "type": "skill", "color": "#ffe66d", "size": 7, "content": "Execute epic lifecycle phases (start \u2192 design \u2192 AR \u2192 plan \u2192 close), pausing at story iteration for human-driven /rai-story-run execution. Resumes from last completed phase. Delegation profile controls"}, {"id": "/rai-epic-design", "label": "epic-design", "type": "skill", "color": "#ffe66d", "size": 7, "content": "Design an epic from strategic objective to feature breakdown. Use when starting a new body of work spanning multiple features (3-10), requiring architectural decisions, or when establishing technical "}, {"id": "/rai-framework-sync", "label": "framework-sync", "type": "skill", "color": "#ffe66d", "size": 7, "content": "Sync framework files across locations after architectural decisions. Use when framework governance documents need updating for consistency and traceability."}, {"id": "/rai-epic-start", "label": "epic-start", "type": "skill", "color": "#ffe66d", "size": 7, "content": "Initialize an epic with scope artifacts and tracker entry. Epics are logical containers \u2014 no epic branch is created. Story branches are created directly from the development branch."}, {"id": "/rai-story-run", "label": "story-run", "type": "skill", "color": "#ffe66d", "size": 7, "content": "Chain the full story lifecycle (start \u2192 design \u2192 plan \u2192 implement \u2192 architecture review \u2192 quality review \u2192 review \u2192 close) in one invocation. Resumes from last completed phase using git-derived artifa"}, {"id": "/rai-epic-close", "label": "epic-close", "type": "skill", "color": "#ffe66d", "size": 7, "content": "Complete an epic with retrospective, metrics capture, push to origin, merge request creation, and tracking update. Epics are logical containers \u2014 stories merge locally to dev during story-close, then "}, {"id": "/rai-mcp-remove", "label": "mcp-remove", "type": "skill", "color": "#ffe66d", "size": 7, "content": "Safe MCP server removal with adapter dependency checking. Shows registered servers, warns about references, deletes config."}, {"id": "/rai-bugfix", "label": "bugfix", "type": "skill", "color": "#ffe66d", "size": 7, "content": "Guide the developer through a formal 6-phase bug fix lifecycle (start \u2192 analyse \u2192 plan \u2192 fix \u2192 review \u2192 close) with the same rigor and traceability as a story. Use for tracked bugs that need full acco"}, {"id": "/rai-publish", "label": "publish", "type": "skill", "color": "#ffe66d", "size": 7, "content": "Guide the human through a structured release workflow with quality gates, version bumping, changelog management, and PyPI publishing via GitHub Actions."}, {"id": "/rai-debug", "label": "debug", "type": "skill", "color": "#ffe66d", "size": 7, "content": "Systematic root cause analysis using lean methods (5 Whys, Ishikawa, Gemba). Use when encountering unexpected behavior, errors, or defects to find and fix the true root cause rather than symptoms."}, {"id": "/rai-epic-plan", "label": "epic-plan", "type": "skill", "color": "#ffe66d", "size": 7, "content": "Sequence features from epic-design into an executable plan with milestones, dependencies, and progress tracking. Use after /rai-epic-design to create a realistic implementation roadmap before starting"}, {"id": "/rai-project-create", "label": "project-create", "type": "skill", "color": "#ffe66d", "size": 7, "content": "Guide greenfield project setup through conversation. Fills governance templates with project-specific content and builds the knowledge graph. Use after rai init on a new project."}, {"id": "/rai-project-onboard", "label": "project-onboard", "type": "skill", "color": "#ffe66d", "size": 7, "content": "Guide brownfield project onboarding through discovery and conversation. Analyzes existing codebase, detects conventions, fills governance templates with discovered and conversational content, and buil"}, {"id": "/rai-session-start", "label": "session-start", "type": "skill", "color": "#ffe66d", "size": 7, "content": "Begin a session by loading context bundle, interpreting it, and proposing work. CLI does all data plumbing; skill does inference interpretation."}, {"id": "/rai-docs-update", "label": "docs-update", "type": "skill", "color": "#ffe66d", "size": 7, "content": "Compare knowledge graph against module architecture docs and update drifted fields. Deterministic frontmatter comparison using existing rai graph commands, with inference for narrative sections. HITL "}, {"id": "/rai-welcome", "label": "welcome", "type": "skill", "color": "#ffe66d", "size": 7, "content": "Conversational developer onboarding for RaiSE. Detects scenario, sets up profile and graph, offers optional personalization."}, {"id": "/rai-doctor", "label": "doctor", "type": "skill", "color": "#ffe66d", "size": 7, "content": "Run RaiSE self-diagnostics, explain results conversationally, and guide the user through fixes. The CLI does the checking; the skill does the interpreting and helping."}, {"id": "/rai-research", "label": "research", "type": "skill", "color": "#ffe66d", "size": 7, "content": "Conduct epistemologically rigorous research to inform decisions. Use before ADRs, when evaluating competing approaches, entering unfamiliar domains, or resolving parking lot items. Produces evidence c"}, {"id": "/rai-quality-review", "label": "quality-review", "type": "skill", "color": "#ffe66d", "size": 7, "content": "Critical code review with external auditor perspective. Catches what linters, type checkers, and coverage gates miss: semantic bugs, type lies, test muda, API design issues, and security concerns."}, {"id": "/rai-story-review", "label": "story-review", "type": "skill", "color": "#ffe66d", "size": 7, "content": "Reflect on completed stories to extract learnings, identify process improvements, and update the framework with insights gained. Use after implementation is complete to close the development cycle."}, {"id": "/rai-problem-shape", "label": "problem-shape", "type": "skill", "color": "#ffe66d", "size": 7, "content": "Guided problem definition at portfolio level. Takes a vague business idea and shapes it into a well-formed problem statement before it enters the epic pipeline. Produces a Problem Brief that feeds /ra"}, {"id": "/rai-skillset-manage", "label": "skillset-manage", "type": "skill", "color": "#ffe66d", "size": 7, "content": "Guided skill set management through conversation and CLI. Detects existing sets, creates new ones from builtins, compares against upstream, and guides customization. All mutations go through rai skill"}, {"id": "/rai-code-audit", "label": "code-audit", "type": "skill", "color": "#ffe66d", "size": 7, "content": "Systematic module-by-module code audit against code-standards.md. Evaluates the HUMAN and BOTH criteria that automated tools cannot catch: naming, idiom quality, API surface design, architectural inte"}, {"id": "/rai-session-close", "label": "session-close", "type": "skill", "color": "#ffe66d", "size": 7, "content": "Close a working session by reflecting on outcomes and feeding structured data to CLI. CLI does all writes atomically; skill does inference reflection."}, {"id": "/rai-story-start", "label": "story-start", "type": "skill", "color": "#ffe66d", "size": 7, "content": "Initialize a story with verified context, branch, and scope commit. Use at the beginning of story work to ensure proper setup and traceability from the start."}, {"id": "/rai-discover", "label": "discover", "type": "skill", "color": "#ffe66d", "size": 7, "content": "Run the full codebase discovery pipeline: detect languages, extract symbols, describe components, generate architecture docs, and build the knowledge graph."}, {"id": "/rai-story-plan", "label": "story-plan", "type": "skill", "color": "#ffe66d", "size": 7, "content": "Decompose user stories into atomic executable tasks, identify dependencies, and create a deterministic implementation plan. Use after /rai-story-design has grounded the story's integration decisions."}, {"id": "/rai-story-design", "label": "story-design", "type": "skill", "color": "#ffe66d", "size": 7, "content": "Create lean story specifications optimized for both human understanding and AI alignment. Design is not optional (PAT-186) \u2014 use before /rai-story-plan for every story to ground integration decisions."}, {"id": "/rai-epic-docs", "label": "epic-docs", "type": "skill", "color": "#ffe66d", "size": 7, "content": "Generate developer and user-facing documentation for a completed epic. Produces technical architecture docs with worked examples, extension guides, data flow diagrams, invariants, and failure mode cat"}, {"id": "/rai-mcp-status", "label": "mcp-status", "type": "skill", "color": "#ffe66d", "size": 7, "content": "Health overview of all registered MCP servers plus stack-aware recommendations for missing capabilities. Lists servers, runs health checks, detects project stack, and suggests relevant servers from th"}, {"id": "/rai
