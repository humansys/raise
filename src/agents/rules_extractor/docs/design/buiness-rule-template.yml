# --- Business Rule Template ---

# ID: Unique identifier for the rule (REQUIRED)
id: RULE-<TYPE><NNN> # e.g., RULE-V001, RULE-D002, RULE-C003

# Type: Classification of the rule (REQUIRED). Allowed: validation, decision, calculation, workflow, other
type: <validation | decision | calculation | workflow | other>

# Description: Human-readable summary of the rule's purpose (REQUIRED)
description: <Concise description of the business logic>

# --- Rule Specific Logic ---
# Structure depends on the 'type'. Choose ONE block below (validation, decision, calculation, workflow)

# Example for 'type: validation'
conditions: # Condition(s) triggering validation FAILURE (REQUIRED for validation)
  # Option A: Simple comparison
  type: comparison
  field: <legacy_field_name>
  operator: <== | != | < | <= | > | >= | IN | NOT IN | IS NULL | IS NOT NULL>
  value: <literal_value_or_list> # Use 'single quotes' for strings, numbers as is. e.g., "'ACTIVE'", 100, [1, 2, 3]
  # value_source: # Use instead of 'value' if dynamic (see spec)
  #   type: <lookup | field_reference | calculation_ref>
  #   ... (details depend on type)
  concept: <optional_glossary_concept_for_field>
  label: <optional_label_for_condition>
  # Option B: Nested logical combinations
  # type: logical_combination
  # operator: <AND | OR | NOT>
  # operands:
  #   - type: comparison # First operand (can be another logical_combination)
  #     field: ...
  #     operator: ...
  #     value: ...
  #   - type: comparison # Second operand (if AND/OR)
  #     field: ...
  #     operator: ...
  #     value_source:
  #       type: lookup
  #       field: <key_field>
  #       lookup_table_ref: <Reference_to_lookup_data>
action: # Action taken on validation FAILURE (REQUIRED for validation)
  type: error_handling # Or logging, state_change (see spec)
  level: <error | warning | info> # Required for error_handling
  message_template: <Error message, use {field_name} for placeholders>
  error_code: <Optional_specific_error_code>
# End of 'validation' example

# Example for 'type: decision'
# conditions: ... (Similar structure as validation, defines decision inputs/logic)
# outcomes: # List of possible outcomes based on conditions (REQUIRED for decision)
#   - when: <Label_from_a_condition_or_combination>
#     result: <Decision_outcome_value_or_object>
#   - when: <Another_Label>
#     result: ...
# outcome_type: <Optional_description_of_outcome_nature, e.g., "discount_rate">
# End of 'decision' example

# Example for 'type: calculation'
# formula: <String formula "TARGET=EXPR" or structured object> (REQUIRED for calculation)
# target_field: <Field_being_calculated> (REQUIRED for calculation)
# source_fields: # List of input fields (REQUIRED for calculation)
#   - <field_name_1>
#   - <field_name_2>
# conditions: ... (Optional: conditions under which calculation applies)
# End of 'calculation' example

# Example for 'type: workflow'
# trigger: <Event or state that triggers this rule> (REQUIRED for workflow)
# conditions: ... (Optional: conditions for this step)
# action: <Resulting_workflow_action_or_next_step> (REQUIRED for workflow)
# End of 'workflow' example

# --- Metadata (REQUIRED) ---
source_reference:
  program: <Source_program_name>
  section: <Optional_subroutine_or_paragraph>
  lines: "<StartLine>-<EndLine>" # e.g., "100-120" or just "100"
  snippet_hash: <Optional_SHA_hash_of_code_snippet>
confidence: <Float_between_0.0_and_1.0> # Confidence score from validation
extracted_timestamp: <ISO8601_Timestamp, e.g., "YYYY-MM-DDTHH:MM:SSZ">
system_version: <Version_identifier_of_legacy_codebase>

# --- Optional Metadata ---
concepts: # List of related business concepts from glossary/KG
  - <ConceptName1>
  - <ConceptName2>
tags: # List of tags for categorization
  - <tag1>
  - <tag2>
notes: <Optional_human_readable_notes_or_comments>
# --- End of Rule ---
