# GitLab CI/CD for raise-commons
# Source of truth pipeline — security scanning + quality gates

stages:
  - test
  - snyk
  - security

# --- Test Stage ---

test:
  stage: test
  image: python:3.12-slim
  before_script:
    - pip install uv
    - uv sync --dev
  script:
    - uv run pytest --tb=short -q
    - uv run ruff check src/ tests/
    - uv run ruff format --check src/ tests/
    - uv run pyright
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "dev"

# --- Snyk Stage ---

snyk:sca:
  stage: snyk
  image: node:20-slim
  before_script:
    - npm install -g snyk
    - apt-get update -qq && apt-get install -y -qq python3 python3-pip
    - pip3 install uv --break-system-packages
    - uv sync --dev
  script:
    - snyk auth $SNYK_TOKEN
    - snyk test --all-projects --json-file-output=snyk-sca-report.json || true
    - snyk monitor --all-projects
  artifacts:
    paths:
      - snyk-sca-report.json
    expire_in: 30 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "dev"

# --- Security Stage (GitLab templates) ---

include:
  - template: Jobs/SAST.gitlab-ci.yml
  - template: Jobs/Secret-Detection.gitlab-ci.yml
  - template: Jobs/Dependency-Scanning.latest.gitlab-ci.yml

variables:
  DS_ENFORCE_NEW_ANALYZER: "true"
  SAST_EXCLUDED_PATHS: "tests/, docs/, work/"
