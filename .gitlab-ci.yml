# GitLab CI/CD for raise-commons
# Source of truth pipeline — security scanning + quality gates
# Trigger: MR targeting dev, or direct commits to dev.

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "dev"
    - if: $CI_COMMIT_BRANCH == "main"

stages:
  - test
  - snyk
  - security

# --- Test Stage ---

test:
  stage: test
  image: python:3.12-slim
  before_script:
    - apt-get update -qq && apt-get install -y -qq libatomic1 git
    - pip install uv
    - uv sync --extra dev --extra mcp
  script:
    - uv run pytest --tb=short -q
    - uv run ruff check src/ tests/
    - uv run ruff format --check src/ tests/
    - uv run pyright
  rules:
    - when: always

# --- Snyk Stage ---

snyk:sca:
  stage: snyk
  image: node:20-slim
  dependencies: []
  before_script:
    - npm install -g snyk
    - apt-get update -qq && apt-get install -y -qq python3 python3-pip
    - pip3 install uv --break-system-packages
    - uv sync --dev
  script:
    - snyk test --all-projects --json-file-output=snyk-sca-report.json || true
    - snyk monitor --all-projects || true
  artifacts:
    paths:
      - snyk-sca-report.json
    expire_in: 30 days
  rules:
    - when: always

snyk:sast:
  stage: snyk
  image: node:20-slim
  dependencies: []
  variables:
    NODE_TLS_REJECT_UNAUTHORIZED: "0"
  before_script:
    - npm install -g snyk
  script:
    - snyk code test src/ --json-file-output=snyk-sast-report.json || true
  artifacts:
    paths:
      - snyk-sast-report.json
    expire_in: 30 days
  rules:
    - when: always

snyk:iac:
  stage: snyk
  image: node:20-slim
  dependencies: []
  before_script:
    - npm install -g snyk
  script:
    - snyk iac test . --exclude=archive --json-file-output=snyk-iac-report.json || true
  artifacts:
    paths:
      - snyk-iac-report.json
    expire_in: 30 days
  rules:
    - when: always

# --- Security Stage (GitLab templates + SonarQube) ---

sonarqube:scan:
  stage: security
  image:
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: [""]
  dependencies: []
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
    GIT_DEPTH: "0"
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .sonar/cache
  script:
    - sonar-scanner
  allow_failure: true
  rules:
    - when: always

include:
  - template: Jobs/SAST.gitlab-ci.yml
  - template: Jobs/Secret-Detection.gitlab-ci.yml
  - template: Jobs/Dependency-Scanning.latest.gitlab-ci.yml

variables:
  DS_ENFORCE_NEW_ANALYZER: "true"
  SAST_EXCLUDED_PATHS: "tests/, docs/, work/"
