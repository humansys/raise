[project]
name = "raise-pro"
version = "2.2.2"
description = "RaiSE Pro — Enterprise adapters for Jira, Confluence, and more"
authors = [
    {name = "Emilio Osorio", email = "emilio@humansys.ai"}
]
license = {text = "Proprietary"}
requires-python = ">=3.12"
dependencies = [
    "raise-cli",
    "atlassian-python-api>=3.41.0",
    "authlib>=1.6.9",
    "cryptography>=46.0.5",
    "requests>=2.32.4",
    "urllib3>=2.6.3",
    "certifi>=2024.7.4",
]

[tool.uv.sources]
raise-cli = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/rai_pro"]

[project.entry-points."rai.adapters.pm"]
jira = "rai_pro.adapters.acli_jira:AcliJiraAdapter"

# MCP Confluence adapter superseded by raise-cli PythonApiConfluenceAdapter (E1051)
# Code preserved in rai_pro.adapters.mcp_confluence for reference.

[project.entry-points."rai.doctor.checks"]
acli = "rai_pro.doctor.acli:AcliCheck"

[project.entry-points."rai.hooks"]
jira-sync = "rai_pro.hooks.jira_sync:JiraSyncHook"
