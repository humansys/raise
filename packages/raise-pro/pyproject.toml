[project]
name = "raise-pro"
version = "2.2.2"
description = "RaiSE Pro — Enterprise adapters for Jira, Confluence, and more"
authors = [
    {name = "Emilio Osorio", email = "emilio@humansys.ai"}
]
license = {text = "Proprietary"}
requires-python = ">=3.12"
dependencies = [
    "raise-cli",
    "atlassian-python-api>=3.41.0",
    "authlib>=1.6.9",
    "cryptography>=46.0.5",
    "requests>=2.32.4",
    "urllib3>=2.6.3",
    "certifi>=2024.7.4",
]

[tool.uv.sources]
raise-cli = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/rai_pro"]

# Legacy entry points removed in S1052.5:
# - jira adapter (superseded by raise-cli PythonApiJiraAdapter)
# - jira-sync hook (superseded by raise-cli backlog commands)
# - MCP Confluence adapter (superseded by raise-cli PythonApiConfluenceAdapter)

[project.entry-points."rai.doctor.checks"]
acli = "rai_pro.doctor.acli:AcliCheck"
