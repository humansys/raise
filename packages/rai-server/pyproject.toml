[project]
name = "rai-server"
version = "0.1.0"
description = "RaiSE Server - Shared knowledge graph backend (PRO)"
authors = [
    {name = "Emilio Osorio", email = "emilio@humansys.ai"}
]
license = {text = "Apache-2.0"}
requires-python = ">=3.12"
dependencies = [
    "rai-core==2.1.0",
    "sqlalchemy[asyncio]>=2.0.0",
    "asyncpg>=0.30.0",
    "alembic>=1.14.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/rai_server"]
