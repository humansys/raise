[project]
name = "raise-server"
version = "2.2.1"
description = "RaiSE Server - Shared knowledge graph backend (PRO)"
authors = [
    {name = "Emilio Osorio", email = "emilio@humansys.ai"}
]
license = {text = "Apache-2.0"}
requires-python = ">=3.12"
dependencies = [
    "sqlalchemy[asyncio]>=2.0.0",
    "asyncpg>=0.30.0",
    "alembic>=1.14.0",
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.34.0",
    "pydantic[email]>=2.0.0",
    "pydantic-settings>=2.7.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "httpx>=0.27",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/raise_server"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "module"
markers = [
    "e2e: End-to-end tests requiring real PostgreSQL (deselect with '-m not e2e')",
]
