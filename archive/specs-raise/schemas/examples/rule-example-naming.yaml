# Example: TypeScript Service Naming Convention
# Validates against: rule-schema.json

id: ts-service-suffix
version: "1.0.0"
status: active
category: naming
confidence: 0.95
enforcement: hard

title: "Services must end with 'Service' suffix"
intent: "Ensures consistent naming for service classes to improve codebase navigability and IDE discoverability"

pattern:
  type: regex
  query: "Service$"
  scope: "src/services/**/*.ts"

examples:
  positive:
    - code: |
        export class UserService {
          async findById(id: string): Promise<User> {
            return this.repository.findOne(id);
          }
        }
      source: "src/services/UserService.ts"
    - code: |
        export class AuthenticationService {
          async validateToken(token: string): Promise<boolean> {
            // validation logic
          }
        }
      source: "src/services/AuthenticationService.ts"
  negative:
    - code: |
        export class UserManager {
          async findById(id: string): Promise<User> {
            return this.repository.findOne(id);
          }
        }
      fix: "Rename class from 'UserManager' to 'UserService'"
    - code: |
        export class Auth {
          async validateToken(token: string): Promise<boolean> {
            // validation logic
          }
        }
      fix: "Rename class from 'Auth' to 'AuthService' or 'AuthenticationService'"

