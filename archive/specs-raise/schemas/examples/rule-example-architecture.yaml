# Example: Repository Pattern Architecture Rule
# Validates against: rule-schema.json

id: ts-repository-pattern
version: "1.0.0"
status: active
category: architecture
confidence: 0.88
enforcement: strong

title: "Data access must use Repository pattern"
intent: "Abstracts data persistence to enable testing, maintain separation of concerns, and allow storage implementation changes"

pattern:
  type: ast-grep
  query: "class $NAME { $$$ }"
  scope: "src/repositories/**/*.ts"

examples:
  positive:
    - code: |
        export class UserRepository {
          constructor(private readonly db: Database) {}

          async findById(id: string): Promise<User | null> {
            return this.db.users.findUnique({ where: { id } });
          }

          async save(user: User): Promise<User> {
            return this.db.users.create({ data: user });
          }
        }
      source: "src/repositories/UserRepository.ts"
    - code: |
        export interface IUserRepository {
          findById(id: string): Promise<User | null>;
          save(user: User): Promise<User>;
        }

        export class UserRepository implements IUserRepository {
          // implementation
        }
      source: "src/repositories/UserRepository.ts"
  negative:
    - code: |
        export class UserService {
          async getUser(id: string): Promise<User> {
            // Direct database access in service layer
            return prisma.users.findUnique({ where: { id } });
          }
        }
      fix: "Extract database access to UserRepository and inject it into UserService"
    - code: |
        // Direct SQL in controller
        app.get('/users/:id', async (req, res) => {
          const user = await db.query('SELECT * FROM users WHERE id = ?', [req.params.id]);
          res.json(user);
        });
      fix: "Create UserRepository with findById method and use it in the controller via a service"

