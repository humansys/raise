name: "CI: Package"

on:
  workflow_call:
    inputs:
      package:
        required: true
        type: string
        description: "Package name (e.g. raise-core)"
      test-path:
        required: true
        type: string
        description: "Path to package tests (e.g. packages/raise-core/tests/)"
      src-path:
        required: true
        type: string
        description: "Path to package source (e.g. packages/raise-core/src/)"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync
      - name: Run tests
        run: uv run pytest ${{ inputs.test-path }} --tb=short -q
        env:
          COLUMNS: "200"
          NO_COLOR: "1"
      - name: Lint
        run: uv run ruff check ${{ inputs.src-path }}
      - name: Format check
        run: uv run ruff format --check ${{ inputs.src-path }}
      - name: Type check
        run: uv run pyright
