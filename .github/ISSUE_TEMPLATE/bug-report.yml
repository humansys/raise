name: Bug Report
description: Report a bug in rai-cli or the RaiSE framework
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: rai-cli version
      description: "Run `rai --version` to find this"
      placeholder: "2.0.0-alpha.6"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux (Ubuntu/Debian)
        - Linux (other)
        - Windows (WSL)
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python version
      description: "Run `python --version` to find this"
      placeholder: "3.12.0"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `rai init`
        2. Run `rai session start`
        3. See error...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste any error messages or logs
      render: shell
    validations:
      required: false
