    few_shot_examples:
      - task: "Implementar componente de preprocesamiento de código"
        input: |
          Necesito crear un componente para leer archivos COBOL y dividirlos en chunks para procesamiento LLM.
        thought_process: |
          <scratchpad>
          ANÁLISIS DE REQUISITOS:
          - Objetivo principal: Crear un componente para leer y segmentar código COBOL
          - Requisitos técnicos: Lectura de archivos, segmentación en chunks, manejo de codificación
          - Restricciones: Tamaño de chunk no mayor a 500 líneas para compatibilidad con LLM
          - Patrones aplicables: Single Responsibility, Strategy para estrategias de chunking

          DISEÑO:
          1. CodeProcessor: Clase principal con responsabilidad de orquestar el proceso
          2. FileReader: Componente para lectura de archivos con manejo de codificación
          3. CodeChunker: Componente para dividir código en segmentos manejables
          4. ChunkingStrategy: Interface para diferentes estrategias de segmentación
          5. Modelo Pydantic: Para representar chunks de código con metadata

          IMPLEMENTACIÓN:
          - Clases/funciones: 
            - CodeProcessor (orquestador)
            - FileReader (lectura)
            - CodeChunker (segmentación)
            - Modelo CodeChunk (datos)
          - Interfaces: 
            - ChunkingStrategy (interface para estrategias)
            - LineBasedChunking (implementación concreta)
          - Dependencias: 
            - Python stdlib para I/O
            - Pydantic para modelos

          VALIDACIÓN:
          - ¿Cumple requisitos? Sí, permite leer y segmentar código COBOL
          - ¿Es testeable? Sí, interfaces claras permiten mocking y testing unitario
          - ¿Sigue patrones? Sí, aplica SRP y Strategy
          - ¿Es mantenible? Sí, componentes con responsabilidad única y baja cohesión
          </scratchpad>
        output: |
          <component_design>
          Componente: CodeProcessor
          Responsabilidad: Orquestar el proceso de lectura y segmentación de código COBOL/RPG
          Interfaces:
            - Entrada: Ruta al archivo de código fuente, configuración de chunking
            - Salida: Lista de objetos CodeChunk conteniendo segmentos procesados
          Dependencias:
            - FileReader para lectura de archivos
            - CodeChunker para segmentación
            - Modelo CodeChunk para representación de datos
          Implementación:
            - Arquitectura por capas con separación clara de responsabilidades
            - Configuración flexible de estrategias de chunking
            - Manejo de errores con excepciones específicas
          </component_design>

          <code_generation>
          ```python
          from pydantic import BaseModel, Field
          from typing import List, Optional, Union, Literal
          from pathlib import Path
          import os

          class CodeChunk(BaseModel):
              """Representa un segmento de código procesado con metadatos."""
              content: str = Field(..., description="Contenido del segmento de código")
              source_file: str = Field(..., description="Archivo fuente de origen")
              start_line: int = Field(..., description="Número de línea inicial")
              end_line: int = Field(..., description="Número de línea final")
              language: Literal["COBOL", "RPG"] = Field(..., description="Lenguaje del código")
              
              @property
              def line_count(self) -> int:
                  """Retorna el número de líneas en el chunk."""
                  return self.end_line - self.start_line + 1

          class ChunkingStrategy:
              """Interfaz para estrategias de segmentación de código."""
              def chunk_code(self, code_lines: List[str], file_path: str, language: str) -> List[CodeChunk]:
                  """Divide el código en chunks según la estrategia implementada."""
                  raise NotImplementedError("Las subclases deben implementar este método")

          class LineBasedChunking(ChunkingStrategy):
              """Estrategia de segmentación basada en número de líneas."""
              def __init__(self, chunk_size: int = 300, overlap: int = 0):
                  self.chunk_size = chunk_size
                  self.overlap = overlap
                  
              def chunk_code(self, code_lines: List[str], file_path: str, language: str) -> List[CodeChunk]:
                  chunks = []
                  total_lines = len(code_lines)
                  
                  for i in range(0, total_lines, self.chunk_size - self.overlap):
                      end_idx = min(i + self.chunk_size, total_lines)
                      chunk_content = "\n".join(code_lines[i:end_idx])
                      
                      chunk = CodeChunk(
                          content=chunk_content,
                          source_file=file_path,
                          start_line=i + 1,  # 1-indexed line numbers
                          end_line=end_idx,
                          language=language
                      )
                      chunks.append(chunk)
                      
                      if end_idx >= total_lines:
                          break
                          
                  return chunks

          class FileReader:
              """Componente para leer archivos de código fuente."""
              def read_file(self, file_path: Union[str, Path]) -> List[str]:
                  """Lee un archivo y retorna sus líneas."""
                  try:
                      with open(file_path, 'r', encoding='utf-8') as file:
                          return file.readlines()
                  except UnicodeDecodeError:
                      # Intentar con otras codificaciones comunes en AS/400
                      try:
                          with open(file_path, 'r', encoding='latin-1') as file:
                              return file.readlines()
                      except Exception as e:
                          raise IOError(f"Error al leer archivo {file_path}: {str(e)}")
                  except Exception as e:
                      raise IOError(f"Error al leer archivo {file_path}: {str(e)}")
                      
              def detect_language(self, file_path: Union[str, Path]) -> str:
                  """Detecta si el archivo es COBOL o RPG basado en extensión."""
                  ext = os.path.splitext(file_path)[1].lower()
                  if ext in ['.cbl', '.cob', '.cobol']:
                      return "COBOL"
                  elif ext in ['.rpg', '.rpgle']:
                      return "RPG"
                  else:
                      # Default o inferir por contenido
                      return "COBOL"  # Simplificado para el ejemplo

          class CodeProcessor:
              """Orquestador principal para procesamiento de código legacy."""
              def __init__(self, chunking_strategy: Optional[ChunkingStrategy] = None):
                  self.file_reader = FileReader()
                  self.chunking_strategy = chunking_strategy or LineBasedChunking()
                  
              def process_file(self, file_path: Union[str, Path]) -> List[CodeChunk]:
                  """Procesa un archivo y retorna los chunks generados."""
                  # Convertir a Path si es string
                  if isinstance(file_path, str):
                      file_path = Path(file_path)
                      
                  # Asegurar que existe
                  if not file_path.exists():
                      raise FileNotFoundError(f"El archivo {file_path} no existe")
                      
                  # Leer archivo
                  code_lines = self.file_reader.read_file(file_path)
                  
                  # Detectar lenguaje
                  language = self.file_reader.detect_language(file_path)
                  
                  # Segmentar código
                  chunks = self.chunking_strategy.chunk_code(
                      code_lines, 
                      str(file_path), 
                      language
                  )
                  
                  return chunks
          ```
          </code_generation>

          <implementation_review>
          Aspectos Positivos:
            - Sigue el principio de responsabilidad única separando lectura, detección y chunking
            - Implementa patrón Strategy para diferentes técnicas de segmentación
            - Usa Pydantic para modelo de datos con validación integrada
            - Incluye manejo de errores y codificaciones alternativas
            - Código tipado completamente para mejor seguridad

          Áreas de Mejora:
            - Podría añadirse preprocesamiento para filtrar líneas de comentario/boilerplate
            - La detección de lenguaje podría mejorarse con análisis de contenido
            - Considerar añadir logging estructurado para diagnóstico

          Recomendaciones:
            - Implementar tests unitarios para cada componente
            - Documentar parámetros de configuración en un README
            - Considerar añadir opción para chunking semántico (por procedimientos/divisiones)
          </implementation_review>

      - task: "Diseñar modelo Pydantic para reglas de negocio"
        input: |
          Necesito un modelo Pydantic para representar reglas de negocio extraídas de código AS/400.
        thought_process: |
          <scratchpad>
          ANÁLISIS DE REQUISITOS:
          - Objetivo principal: Crear modelo Pydantic para reglas de negocio extraídas
          - Requisitos técnicos: Campos obligatorios (id, descripción, tipo, referencia, confianza)
          - Restricciones: Validación adecuada para todos los campos
          - Patrones aplicables: Herencia para tipos específicos de reglas, validadores personalizados

          DISEÑO:
          1. BusinessRule: Modelo base con campos comunes a todas las reglas
          2. Modelos especializados: DecisionRule, ValidationRule, CalculationRule, etc.
          3. Modelos auxiliares: SourceReference, Confidence, etc.
          4. Validadores: Para campos críticos como confianza, tipo, etc.

          IMPLEMENTACIÓN:
          - Clases/funciones:
            - BusinessRule (modelo base)
            - Enumeración para tipos de regla
            - Modelos especializados por tipo
            - Validadores personalizados
          - Interfaces:
            - Métodos para convertir a/desde JSON
            - Métodos auxiliares (clasificar, filtrar, etc.)
          - Dependencias:
            - Pydantic para validación

          VALIDACIÓN:
          - ¿Cumple requisitos? Sí, incluye todos los campos requeridos
          - ¿Es testeable? Sí, los modelos Pydantic facilitan testing con casos
          - ¿Sigue patrones? Sí, usa herencia para tipos específicos
          - ¿Es mantenible? Sí, separación clara por tipo de regla
          </scratchpad>
        output: |
          <component_design>
          Componente: BusinessRuleModel
          Responsabilidad: Representar y validar reglas de negocio extraídas de código legacy
          Interfaces:
            - Entrada: Datos extraídos por LLM en formato JSON/dict
            - Salida: Objetos Pydantic validados para reglas de negocio
          Dependencias:
            - Pydantic para validación y serialización
          Implementación:
            - Modelo base BusinessRule con campos comunes
            - Enumeración para tipos de reglas
            - Modelos especializados por tipo de regla con validación específica
            - Validadores personalizados para campos críticos
          </component_design>

          <code_generation>
          ```python
          from pydantic import BaseModel, Field, validator, root_validator
          from typing import List, Optional, Dict, Union, Literal
          from enum import Enum
          import re
          from uuid import uuid4

          class RuleType(str, Enum):
              """Tipos de reglas de negocio soportados."""
              DECISION = "decision"
              VALIDATION = "validation"
              CALCULATION = "calculation"
              WORKFLOW = "workflow"
              OTHER = "other"

          class SourceReference(BaseModel):
              """Referencia al código fuente original."""
              program: str = Field(..., description="Nombre del programa fuente")
              lines: str = Field(..., description="Rango de líneas (e.g. '10-15')")
              
              @validator('lines')
              def validate_line_format(cls, v):
                  """Valida que el formato de líneas sea correcto."""
                  if not re.match(r'^\d+(-\d+)?$', v):
                      raise ValueError("El formato de líneas debe ser 'N' o 'N-M'")
                  return v
                  
              def get_line_range(self) -> tuple:
                  """Retorna el rango de líneas como una tupla (inicio, fin)."""
                  if '-' in self.lines:
                      start, end = self.lines.split('-')
                      return int(start), int(end)
                  else:
                      line = int(self.lines)
                      return line, line

          class BusinessRule(BaseModel):
              """Modelo base para reglas de negocio extraídas."""
              id: str = Field(default_factory=lambda: f"RULE-{uuid4().hex[:8].upper()}")
              description: str = Field(..., description="Descripción textual de la regla")
              type: RuleType = Field(..., description="Tipo de regla de negocio")
              source_reference: SourceReference = Field(..., description="Referencia al código fuente")
              confidence: float = Field(1.0, ge=0.0, le=1.0, description="Nivel de confianza en la extracción (0-1)")
              
              @validator('description')
              def description_not_empty(cls, v):
                  """Valida que la descripción no esté vacía."""
                  if not v or not v.strip():
                      raise ValueError("La descripción no puede estar vacía")
                  return v.strip()
                  
              @validator('confidence')
              def confidence_within_range(cls, v):
                  """Asegura que la confianza esté entre 0 y 1."""
                  if v < 0 or v > 1:
                      raise ValueError("La confianza debe estar entre 0 y 1")
                  return v
                  
              class Config:
                  """Configuración del modelo."""
                  json_encoders = {
                      RuleType: lambda v: v.value
                  }

          class DecisionRule(BusinessRule):
              """Regla que representa una decisión de negocio."""
              type: RuleType = Field(RuleType.DECISION, const=True)
              conditions: List[str] = Field(..., min_items=1, description="Condiciones de la decisión")
              outcomes: List[str] = Field(..., min_items=1, description="Resultados posibles")
              
              @root_validator
              def check_conditions_outcomes(cls, values):
                  """Valida la coherencia entre condiciones y resultados."""
                  conditions = values.get('conditions', [])
                  outcomes = values.get('outcomes', [])
                  
                  if len(conditions) < 1:
                      raise ValueError("Debe haber al menos una condición")
                  if len(outcomes) < 1:
                      raise ValueError("Debe haber al menos un resultado posible")
                      
                  return values

          class ValidationRule(BusinessRule):
              """Regla que representa una validación de datos."""
              type: RuleType = Field(RuleType.VALIDATION, const=True)
              condition: str = Field(..., description="Condición de validación")
              action: str = Field(..., description="Acción si la validación falla")

          class CalculationRule(BusinessRule):
              """Regla que representa un cálculo o fórmula."""
              type: RuleType = Field(RuleType.CALCULATION, const=True)
              formula: str = Field(..., description="Fórmula o algoritmo de cálculo")
              target_field: str = Field(..., description="Campo donde se almacena el resultado")
              source_fields: List[str] = Field(..., min_items=1, description="Campos utilizados en el cálculo")

          class WorkflowRule(BusinessRule):
              """Regla que representa un flujo de trabajo o proceso."""
              type: RuleType = Field(RuleType.WORKFLOW, const=True)
              steps: List[str] = Field(..., min_items=1, description="Pasos del flujo de trabajo")
              triggers: List[str] = Field(..., description="Eventos que disparan el flujo")

          # Tipo unión para manejo polimórfico
          RuleUnion = Union[DecisionRule, ValidationRule, CalculationRule, WorkflowRule, BusinessRule]

          # Funciones auxiliares
          def create_rule_from_dict(data: Dict) -> RuleUnion:
              """Crea una instancia de regla a partir de un diccionario, eligiendo el tipo adecuado."""
              rule_type = data.get('type', 'other')
              
              if rule_type == RuleType.DECISION.value:
                  return DecisionRule.parse_obj(data)
              elif rule_type == RuleType.VALIDATION.value:
                  return ValidationRule.parse_obj(data)
              elif rule_type == RuleType.CALCULATION.value:
                  return CalculationRule.parse_obj(data)
              elif rule_type == RuleType.WORKFLOW.value:
                  return WorkflowRule.parse_obj(data)
              else:
                  return BusinessRule.parse_obj(data)
                  
          def filter_rules_by_confidence(rules: List[RuleUnion], threshold: float = 0.7) -> Dict[str, List[RuleUnion]]:
              """Filtra reglas por nivel de confianza y retorna diccionario con 'high' y 'low'."""
              result = {
                  'high_confidence': [],
                  'low_confidence': []
              }
              
              for rule in rules:
                  if rule.confidence >= threshold:
                      result['high_confidence'].append(rule)
                  else:
                      result['low_confidence'].append(rule)
                      
              return result
          ```
