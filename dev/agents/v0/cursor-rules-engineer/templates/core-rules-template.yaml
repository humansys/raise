version: "{VERSION}" # Semantic versioning
name: "{PROJECT_NAME}"
description: "{PROJECT_DESCRIPTION}"

# Core Architecture Rules
architecture:
  principles:
    - name: "{PRINCIPLE_1}"
      rules:
        - "{RULE_1}"
        - "{RULE_2}"
      validation:
        - "{VALIDATION_1}"
        - "{VALIDATION_2}"

    - name: "{PRINCIPLE_2}"
      rules:
        - "{RULE_3}"
        - "{RULE_4}"
      validation:
        - "{VALIDATION_3}"
        - "{VALIDATION_4}"

# Domain-Specific Standards
standards:
  { DOMAIN_1 }:
    validation:
      - "{VALIDATION_RULE_1}"
      - "{VALIDATION_RULE_2}"
    logging:
      - "{LOGGING_RULE_1}"
      - "{LOGGING_RULE_2}"
    alerts:
      - "{ALERT_RULE_1}"
      - "{ALERT_RULE_2}"

  development:
    process:
      - "{PROCESS_RULE_1}"
      - "{PROCESS_RULE_2}"
    patterns:
      - "{PATTERN_1}"
      - "{PATTERN_2}"
    guidelines:
      - "{GUIDELINE_1}"
      - "{GUIDELINE_2}"

  observability:
    required:
      - "{METRIC_1}"
      - "{METRIC_2}"
    alerts:
      - "Critical: {THRESHOLD_1}"
      - "Major: {THRESHOLD_2}"
      - "Minor: {THRESHOLD_3}"

# Quality Gates
quality:
  before_implementation:
    - "{QUALITY_CHECK_1}"
    - "{QUALITY_CHECK_2}"

  during_development:
    - "{DEV_CHECK_1}"
    - "{DEV_CHECK_2}"

  before_production:
    - "{PROD_CHECK_1}"
    - "{PROD_CHECK_2}"

# Module Organization
structure:
  modules:
    - "{MODULE_RULE_1}"
    - "{MODULE_RULE_2}"
  naming:
    - "{NAMING_RULE_1}"
    - "{NAMING_RULE_2}"
  patterns:
    - "{PATTERN_RULE_1}"
    - "{PATTERN_RULE_2}"

# Testing Requirements
testing:
  coverage:
    { COMPONENT_1 }: { COVERAGE_1 }
    { COMPONENT_2 }: { COVERAGE_2 }
  validation:
    - "{TEST_RULE_1}"
    - "{TEST_RULE_2}"
  { DOMAIN_SPECIFIC }:
    - "{DOMAIN_TEST_1}"
    - "{DOMAIN_TEST_2}"

# Alert Rules
alerts:
  performance:
    - name: "{ALERT_NAME_1}"
      threshold: "{THRESHOLD_1}"
      severity: "{SEVERITY_1}"
    - name: "{ALERT_NAME_2}"
      threshold: "{THRESHOLD_2}"
      severity: "{SEVERITY_2}"
