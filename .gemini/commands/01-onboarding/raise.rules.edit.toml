description = "Guided creation or modification of a specific rule through user interaction. Implements Kata L2-C1."

prompt = """
---
description: Guided creation or modification of a specific rule through user interaction. Implements Kata L2-C1.
handoffs: 
  - label: Generate more rules
    agent: speckit.raise.rules-generate
    prompt: Analyze other patterns in the code
---

## User Input

```text
$ARGUMENTS
```

Specify the name or ID of the rule to edit (e.g., `200-clean-architecture.mdc`), or describe the requirement for a new rule.

## Outline

Goal: Adapt a set of rules to the specific needs of the project, deciding whether to keep, customize, or delete them, following Raise Kata L2-C1.

1. **Initialize Environment**:
   - Run `.specify/scripts/bash/check-prerequisites.sh --json --paths-only` to get REPO_ROOT and paths.
   - Load utility functions from `.specify/scripts/bash/common.sh`.

2. **Paso 1: Auditoría y Selección de Regla**:
   - **Acción**: Si se especificó una regla, cargarla. Si no, listar `.cursor/rules/` y pedir al usuario que seleccione una.
   - **Análisis**: Verificar que el archivo existe y es una regla válida.
   - > **Si no puedes continuar**: Regla no encontrada → Verificar que el archivo `.mdc` existe en `.cursor/rules/`. Si es nueva, referir a `/speckit.raise.rules-generate`.

3. **Paso 2: Análisis de Relevancia (Kata Step 2)**:
   - **Acción**: Buscar ejemplos de código en el repositorio que implementen o violen los patrones de la regla.
   - **Análisis**: Determinar si la regla es aplicable tal cual, necesita ajustes o debe eliminarse.
   - > **Si no puedes continuar**: Sin evidencia en código → Documentar como "Regla teórica sin evidencia actual" y preguntar al usuario si desea mantenerla para el futuro.

4. **Paso 3: Toma de Decisión Estratégica (Kata Step 3)**:
   - Presentar las opciones al usuario basándose en el análisis:
     - **Keep (3A)**: La regla se mantiene sin cambios.
     - **Customize (3B)**: Modificar el archivo `.mdc` para adaptarlo al repositorio.
     - **Delete (3C)**: Eliminar el archivo de la regla.
   - **CRITICAL**: Si se elige "Customize", se DEBE añadir una sección `## Nota de Personalización` al final en **Español** con la justificación técnica.
   - > **Si no puedes continuar**: Justificación vaga → Insistir en el "por qué" técnico (ej: "No usamos Inyección de Dependencias en este microservicio").

5. **Paso 4: Escritura y Registro (Kata L2-C1 y L2-03 Step 4.5)**:
   - Aplicar los cambios al archivo `.mdc` correspondiente.
   - **Registro**: Actualizar el índice de reglas.
   - **Lógica de Registro**: Si existe `specs/main/local-rules-index.md`, usar ese archivo; de lo contrario, usar `specs/main/ai-rules-reasoning.md`.
   - Registrar el nuevo estado (Mantenida, Personalizada, Eliminada) y la justificación en **Español**.
   - > **Si no puedes continuar**: Error de escritura → Verificar permisos en `specs/main/` y `.cursor/rules/`.

6. **Finalize**:
   - Run `.specify/scripts/bash/update-agent-context.sh gemini`.
   - Confirm update with `check_file` sobre el archivo de registro actualizado.

## High-Signaling Guidelines

- **Focus**: Governance and project-specific adaptation.
- **Language**: Instructions English; Content **SPANISH**.
- **Transparency**: Every customization MUST be technically justified.

## AI Guidance

When executing this workflow:
1. **Clear Questions**: Provide explicit options (Keep/Customize/Delete) with a recommendation based on your code analysis.
2. **Draft First**: Propose a draft before applying changes if "Customize" is chosen.
3. **Index Accuracy**: Ensure the reasoning registry is updated. Prefer `local-rules-index.md` if available for project-specific overrides.
4. **Mandatory Section**: NEVER apply a customization without the `## Nota de Personalización` section.
"""
