description = "Translate an approved PRD into a high-level Solution Vision that aligns business objectives with technical decisions."

prompt = """
---
description: Translate an approved PRD into a high-level Solution Vision that aligns business objectives with technical decisions.
handoffs: 
  - label: Create Feature Spec
    agent: speckit.specify
    prompt: Create the specification for a specific feature derived from this vision
---

## User Input

```text
$ARGUMENTS
```

You **MUST** consider the user input before proceeding (if not empty).

## Outline

Goal: Bridge the gap between PRD ("what") and Technical Design ("how") following the 11 steps of Kata `flujo-02-solution-vision`.

1. **Initialize Environment**:
   - Run `.specify/scripts/bash/check-prerequisites.sh --json --paths-only` to get REPO_ROOT and paths.
   - Load template from `.specify/templates/raise/solution/solution-vision_es.md`.

2. **Paso 1: Cargar PRD y Contexto Técnico**:
   - Cargar `specs/main/project_requirements.md`.
   - Recopilar stack, restricciones técnicas e integraciones.
   - **Verificación**: El PRD existe y hay un resumen del contexto técnico.
   - > **Si no puedes continuar**: PRD no encontrado → Ejecutar `/raise.discovery` primero. Contexto técnico desconocido → Ejecutar `/raise.analyze`.

3. **Paso 2: Instanciar Template Solution Vision**:
   - Preparar el archivo `specs/main/solution_vision.md` basado en el template.
   - **Verificación**: Existe el archivo con todas las secciones presentes.
   - > **Si no puedes continuar**: Template no encontrado → Verificar ruta `.specify/templates/raise/solution/solution-vision_es.md`.

4. **Paso 3: Sintetizar Problem Statement**:
   - Reformular el problema conectando negocio con capacidad técnica faltante.
   - **Verificación**: Es más conciso que el PRD y añade perspectiva técnica.
   - > **Si no puedes continuar**: Problem Statement técnicamente vago → Revisar con un Arquitecto para identificar el "dolor técnico" subyacente.

5. **Paso 4: Definir Visión de Alto Nivel**:
   - Articular la solución en 2-3 párrafos: valor principal, diferenciadores, resultados.
   - **Verificación**: Stakeholders de negocio y técnicos lo entienden por igual.
   - > **Si no puedes continuar**: Visión demasiado técnica → Aplicar la prueba del "elevator pitch" (explicarlo en 30s a alguien no técnico).

6. **Paso 5: Mapear Alineamiento Estratégico**:
   - Crear tabla conectando cada Business Goal del PRD con un Mecanismo Técnico.
   - **Verificación**: 100% de los goals del PRD tienen un mecanismo técnico asociado.
   - > **Si no puedes continuar**: Goals sin mecanismo claro → Identificar si falta un requisito en el PRD o una capacidad técnica.

7. **Paso 6: Documentar Impacto por Stakeholder**:
   - Mapear stakeholders del PRD a beneficios técnicos concretos (Expected Benefits).
   - **Verificación**: La tabla cubre todos los stakeholders con beneficios específicos.
   - > **Si no puedes continuar**: Beneficios genéricos → Reformular como acciones: "El usuario podrá [acción] en [tiempo] en lugar de [actual]".

8. **Paso 7: Definir MVP Scope**:
   - Traducir alcance a: Must Have (MVP), Nice to Have, Out of Scope.
   - **Verificación**: Must Have contiene máximo 3-5 items clave.
   - > **Si no puedes continuar**: MVP demasiado grande → Preguntar: "¿Si solo pudiéramos entregar UNA cosa, cuál sería?".

9. **Paso 8: Establecer Métricas de Éxito Técnicas**:
   - Traducir métricas de negocio a métricas técnicas medibles (ej: Response time P95).
   - **Verificación**: Cada métrica de negocio tiene al menos una métrica técnica medible.
   - > **Si no puedes continuar**: No medibles automáticamente → Definir cómo se instrumentará (logs, APM, etc.) antes de seguir.

10. **Paso 9: Documentar Constraints y Assumptions**:
    - Consolidar restricciones de negocio, técnicas y supuestos.
    - **Verificación**: Las restricciones son específicas (ej: cumplimiento SOC2) y no genéricas.
    - > **Si no puedes continuar**: Constraints vagas → Preguntar: "¿Qué pasaría específicamente si no se cumple?".

11. **Paso 10: Identificar Componentes de Alto Nivel**:
    - Esbozar servicios/módulos, integraciones y flujos de alto nivel.
    - **Verificación**: Existe una lista O diagrama de 3-7 componentes (no más).
    - > **Si no puedes continuar**: Demasiado detalle → Abstraer hasta tener máximo 7 componentes. El detalle va en el Plan.

12. **Paso 11: Validar con Stakeholders**:
    - Generar el contenido final en `specs/main/solution_vision.md`.
    - **Verificación**: La visión refleja necesidades de negocio y es técnicamente factible.
    - > **Si no puedes continuar**: Desacuerdo negocio vs técnico → Facilitar sesión conjunta y documentar trade-offs.

13. **Finalize & Validate**:
    - Ejecutar validación usando `.specify/gates/raise/gate-vision.md`.
    - Run `.specify/scripts/bash/update-agent-context.sh gemini`.
    - Confirm file existence with `check_file "specs/main/solution_vision.md" "Vision Generation"`.

## High-Signaling Guidelines

- **Focus**: Strategic alignment and technical feasibility.
- **Language**: Instructions English; Content **SPANISH**.
- **Traceability**: All technical decisions MUST justify a business goal.

## AI Guidance

When executing this workflow:
1. **Bridge the Gap**: Language technical for devs but clear for stakeholders.
2. **Follow Katas**: Ensure every step and Jidoka block from `flujo-02-solution-vision` is respected.
3. **No Deep Design**: Keep it at "boxes and arrows" level (3-7 components max).
4. **Gates**: Always run the reference gate at the end.
"""
